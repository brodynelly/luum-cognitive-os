  - id: 'user-request:1776802521:test-fragility-audit'
    type: user-request
    source: .cognitive-os/sessions/1776802521-37253-1dab3d36/user-requests.jsonl
    status: verified-pending
    last_verified: 2026-05-11T00:00:00Z
    evidence:
      - kind: grep
        pattern: 'fragility|snapshot.*literal|threshold.*absolute'
        path: docs/06-Daily/reports/
