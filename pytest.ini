[pytest]
testpaths = tests
pythonpath = .
timeout = 60
timeout_method = thread
# pytest-xdist installed for parallel test execution.
# Usage: python3 -m pytest tests/ -n auto (or -n 8 for 8 workers)
# NOT added to addopts by default — some tests share state (tmp dirs, registry files)
# and may fail under parallelism. Use -n auto explicitly when running the full suite.
markers =
    unit: Unit tests
    behavior: Behavior tests
    integration: Integration tests
    system: System tests
    docker: Requires Docker
    slow: Slow tests
    e2e: End-to-end tests
    eval_frameworks: Eval framework tests
    arena: Competitive arena tests
    benchmark: Performance benchmark tests
    quality: LLM-evaluated quality tests
