schema_version: product-claim-evidence/v1
adr: ADR-280
status: active
status_order:
- real
- partial-real
- partial
- aspirational
- blocked
claims:
  differentiator_behavioral_governance:
    status: partial-real
    maturity: supported_by_docs_and_primitives
    confidence: 0.82
    summary: Cognitive OS differentiates as behavioral governance plus an evidence
      layer for agentic development.
    approved_wording: Cognitive OS makes coding agents verifiable, governable, coordinated,
      and portable with executable evidence for what they did.
    evidence:
    - docs/08-References/business/product-messaging.md
    - docs/08-References/business/cos-vs-vanilla-dx-review.md
    - docs/08-References/business/value-proposition.md
    - docs/04-Concepts/architecture/agentic-kernel-philosophy.md
    - .cognitive-os/strategy/01-commercial-brief-v2.md
    boundaries:
    - Do not frame COS as another IDE, generic tracing dashboard, or model wrapper.
    - Keep cross-harness claims scoped to supported/evidenced drivers.
  claim_verification_wedge:
    status: real
    maturity: implemented_primitives
    confidence: 0.88
    summary: COS gates agent completion claims on evidence rather than accepting agent
      prose.
    approved_wording: Cognitive OS checks whether the agent actually verified the
      work it claims is done.
    evidence:
    - docs/04-Concepts/architecture/claim-verification-matrix.md
    - docs/02-Decisions/adrs/ADR-105-claim-verification-contract.md
    - scripts/orchestrator_claim_gate.py
    - scripts/verify_plan_claims.py
    - tests/contracts/test_orchestrator_claim_gate.py
    boundaries:
    - Do not claim every natural-language statement is automatically verifiable.
  cross_harness_behavioral_intelligence:
    status: partial
    maturity: architecture_and_partial_runtime
    confidence: 0.68
    summary: COS can position toward behavioral intelligence across harnesses, but
      parity is not universal.
    approved_wording: Cognitive OS records normalized evidence so teams can compare
      agent behavior across supported harnesses.
    evidence:
    - docs/04-Concepts/root/model-evolution-resilience.md
    - docs/04-Concepts/architecture/ide-agnostic-primitive-projection.md
    - docs/02-Decisions/adrs/ADR-256-primitive-contract-registry-and-runtime-evidence-ledger.md
    - docs/08-References/business/cos-vs-vanilla-dx-review.md
    boundaries:
    - Do not claim universal cross-IDE runtime parity.
    - Do not claim competitors lack all cross-IDE observability.
  cost_to_outcome:
    status: partial
    maturity: metrics_substrate
    confidence: 0.66
    summary: COS has cost, dispatch, and performance-ledger substrate for outcome-oriented
      analysis, but public numbers require fresh evidence.
    approved_wording: Cognitive OS is designed to connect agent cost to verified outcomes,
      not only token usage.
    evidence:
    - docs/02-Decisions/adrs/ADR-201-maintainer-agent-telemetry-promotion-loop.md
    - docs/04-Concepts/architecture/primitive-fitness-evaluation-contract.md
    - lib/performance_ledger.py
    - scripts/cos-performance-ledger
    boundaries:
    - Do not publish savings percentages or dollar claims without a current metrics
      report.
  replay_restore_receipts:
    status: partial-real
    maturity: implemented_substrate_with_hardening_pending
    confidence: 0.76
    summary: Shadow-git and event-substrate docs support replay/restore positioning
      with maturity caveats.
    approved_wording: Cognitive OS can attach governance events to replayable receipts
      and restore-oriented checkpoints where the substrate is enabled.
    evidence:
    - docs/02-Decisions/adrs/ADR-227-shadow-git-checkpoint-substrate.md
    - lib/shadow_git.py
    - docs/08-References/business/product-messaging.md
    - docs/08-References/business/value-proposition.md
    boundaries:
    - Avoid implying every harness and deployment mode has identical rewind semantics.
  governed_self_improvement:
    status: partial-real
    maturity: propose_only_loop
    confidence: 0.79
    summary: COS supports telemetry-guided proposals, not autonomous mutation.
    approved_wording: Cognitive OS can propose primitive improvements from telemetry
      under human approval.
    evidence:
    - docs/02-Decisions/adrs/ADR-201-maintainer-agent-telemetry-promotion-loop.md
    - docs/04-Concepts/architecture/primitive-fitness-evaluation-contract.md
    - scripts/cos-promote-from-telemetry
    - scripts/cos-maintainer-agent
    boundaries:
    - Do not claim autonomous self-improvement.
    - Do not claim automatic reconfiguration without approval.
  generic_tracing_is_not_unique:
    status: real
    maturity: documented_positioning_boundary
    confidence: 0.84
    summary: Generic cross-IDE observability and agent-step tracing are not safe unique
      differentiator claims.
    approved_wording: COS should not lead with generic tracing; it should lead with
      evidence-backed behavioral governance.
    evidence:
    - .cognitive-os/strategy/01-commercial-brief-v2.md
    - docs/08-References/business/product-messaging.md
    - docs/08-References/business/feature-reality-audit.md
    boundaries:
    - Do not claim agent-step tracing or framework-agnostic support as unique by itself.
  product_answer_primitive:
    status: real
    maturity: implemented_adr_280
    confidence: 0.86
    summary: Product/commercial questions are answerable through a manifest-backed
      evidence primitive.
    approved_wording: COS answers product questions from versioned evidence manifests
      and reports claim safety alongside the answer.
    evidence:
    - docs/02-Decisions/adrs/ADR-280-product-question-to-evidence-primitive.md
    - manifests/product-question-bank.yaml
    - manifests/product-claim-evidence.yaml
    - lib/product_answer.py
    - scripts/cos-product-answer
    boundaries:
    - Generated answers are not publication approval for volatile competitive claims.
  icp_vp_engineering:
    status: partial-real
    maturity: strategy_documented
    confidence: 0.74
    summary: Primary ICP is VP Engineering / Head of Platform in teams already using
      coding agents and feeling trust, cost, and audit pain.
    approved_wording: The strongest initial buyer is a VP Eng or Head of Platform
      managing AI-assisted development risk across a real team.
    evidence:
    - .cognitive-os/strategy/01-commercial-brief-v2.md
    - docs/08-References/business/value-proposition.md
    - docs/08-References/business/cos-vs-vanilla-dx-review.md
    boundaries:
    - Do not imply ICP validation is complete without customer discovery.
  pricing_strategy_internal_only:
    status: partial
    maturity: private_strategy_hypothesis
    confidence: 0.62
    summary: Pricing has internal strategy support but should not be treated as validated
      public pricing.
    approved_wording: Cloud and Enterprise packaging should be discussed as internal
      strategy until validated with buyers.
    evidence:
    - .cognitive-os/strategy/01-commercial-brief-v2.md
    - .cognitive-os/strategy/00-first-approach.md
    boundaries:
    - Do not publish exact price points without current pricing decision and buyer
      validation.
    - Private strategy docs are not public pricing copy.
  competitor_positioning_factcheck_required:
    status: partial
    maturity: strategy_boundary_with_factcheck_required
    confidence: 0.66
    summary: Competitive positioning should lead with behavioral governance and avoid generic tracing claims; already-analyzed tools should be answered from the local radar first, while volatile named comparisons require fresh fact-checking before publication.
    approved_wording: COS should position above generic tracing by focusing on evidence-backed behavioral governance. For previously analyzed tools, start from the local Tech Radar and external-tool manifests; use fresh verification for volatile public claims.
    evidence:
    - .cognitive-os/strategy/01-commercial-brief-v2.md
    - docs/08-References/business/feature-reality-audit.md
    - docs/08-References/business/product-messaging.md
    - docs/06-Daily/reports/external-tools-radar-INDEX.md
    - docs/08-References/root/vs-alternatives.md
    - docs/04-Concepts/root/component-sources.md
    boundaries:
    - Do not say competitors cannot do cross-IDE observability without fresh research.
    - Do not use stale named-competitor claims publicly.
    - Do not browse by default when the tool was already analyzed in the local radar corpus.
  vanilla_boundary:
    status: real
    maturity: documented_positioning_boundary
    confidence: 0.86
    summary: Vanilla IDE-agent workflows are preferred for small, low-risk, one-agent exploratory work; COS becomes valuable when governance, coordination, audit, cost, or recovery risk appears.
    approved_wording: Use vanilla for low-risk speed; add Cognitive OS when you need verifiable, coordinated, recoverable agent work.
    evidence:
    - docs/08-References/business/cos-vs-vanilla-dx-review.md
    - docs/08-References/root/vs-alternatives.md
    - docs/08-References/root/adoption-tiers.md
    - docs/04-Concepts/root/auto-repair-system.md
    boundaries:
    - Do not claim COS is always better than vanilla workflows.
    - Do not recommend the full SO for throwaway or one-agent low-risk work.
  runtime_surfaces_cli_ui_service:
    status: partial-real
    maturity: cli_first_with_partial_service_and_ui_surfaces
    confidence: 0.76
    summary: COS has CLI/operator surfaces, documented multi-surface UI direction, local cosd API work, and headless service proof drills, but full hosted/cloud service and polished dashboard claims are maturity-scoped.
    approved_wording: COS is CLI-first today, can be used through IDE and non-IDE/headless proof paths, and has cosd/service/UI work under readiness gates.
    evidence:
    - docs/00-MOCs/entrypoints/getting-started-quick.md
    - docs/00-MOCs/entrypoints/README.md
    - docs/02-Decisions/adrs/ADR-172-multi-surface-ui-architecture.md
    - docs/02-Decisions/adrs/ADR-193-cosd-local-network-api.md
    - docs/02-Decisions/adrs/ADR-194-cosd-secure-remote-api.md
    - docs/01-Build-Log/SESSION-HANDOFF-2026-05-05-headless-service-runtime.md
    - docs/04-Concepts/root/dashboard-architecture.md
    - docs/04-Concepts/root/onboarding-wizard-design.md
    boundaries:
    - Do not claim polished SaaS/web dashboard readiness without a current shipped-slice proof.
    - Do not claim provider-backed service execution without explicit auth/runtime proof.
  service_mode_readiness_partial:
    status: partial
    maturity: readiness_gate_partial
    confidence: 0.7
    summary: Service-mode launch claims are gated by ADR-211; some headless/local service proof exists, but autonomous/cloud service mode is not an unrestricted public claim.
    approved_wording: Service/headless usage is possible only within documented readiness and proof boundaries; cloud/autonomous claims remain gated.
    evidence:
    - docs/02-Decisions/adrs/ADR-211-service-mode-readiness-gate.md
    - docs/02-Decisions/adrs/ADR-193-cosd-local-network-api.md
    - docs/02-Decisions/adrs/ADR-194-cosd-secure-remote-api.md
    - docs/01-Build-Log/SESSION-HANDOFF-2026-05-05-headless-service-runtime.md
    boundaries:
    - Do not say COS can safely run as a fully autonomous hosted service unless the readiness gate is green.
    - Remote cosd exposure requires explicit allow-remote plus bearer-token auth.
  alternative_complementarity:
    status: partial-real
    maturity: documented_competitive_positioning
    confidence: 0.78
    summary: Hermes, Agent Zero, and OpenClaw have different centers of gravity; COS is complementary as the engineering governance/evidence layer rather than a direct replacement for their UX/autonomy/orchestration breadth.
    approved_wording: Use Hermes, Agent Zero, or OpenClaw for their agent/runtime strengths; add COS when engineering governance, verification, and audit receipts matter.
    evidence:
    - docs/08-References/root/vs-alternatives.md
    - docs/04-Concepts/root/component-sources.md
    - docs/08-References/business/competitive-reassessment-openclaw-hermes-2026-04.md
    - docs/06-Daily/reports/external-tools-radar-INDEX.md
    boundaries:
    - Do not claim COS fully replaces Hermes, Agent Zero, or OpenClaw.
    - Do not publish current named-feature comparisons without checking local radar freshness and external facts when needed.
  ssr_primitive_enablement_gap_backlog:
    status: partial-real
    maturity: documented_gap_backlog
    confidence: 0.78
    summary: COS has primitives that help developers convert repeated agent work into governed reusable primitives, but the developer-facing question-to-primitive path needs a clearer router, guide, and report surface.
    approved_wording: Cognitive OS helps developers turn repeated agent work into governed, tested, reusable agentic primitives; it detects and proposes improvements, while promotion stays evidence-gated and human-approved unless explicitly configured otherwise.
    evidence:
    - docs/04-Concepts/architecture/ssr-agentic-primitive-enablement-gaps.md
    - docs/04-Concepts/architecture/primitive-harvester.md
    - docs/02-Decisions/adrs/ADR-083-governed-self-improvement-loop.md
    - docs/04-Concepts/architecture/primitive-fitness-evaluation-contract.md
    - docs/04-Concepts/architecture/key-learnings-capture-self-improvement.md
    - skills/primitive-harvester/SKILL.md
    - skills/primitive-authoring/SKILL.md
    boundaries:
    - Do not claim COS autonomously rewrites itself from chat.
    - Do not claim every harness has identical primitive behavior.
    - Do not claim every repeated request automatically becomes a skill.
    - Do not treat a Key Learning as a runtime behavior change before governed promotion.

