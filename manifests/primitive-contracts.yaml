    source: hooks/skill-router-bash-gate.sh
    lifecycle_ref: hooks/skill-router-bash-gate.sh
    implementation_refs:
      - lib/skill_router.py
    intent: Route raw shell/tool activity toward the appropriate COS skill or block high-risk bypasses.
    trigger:
      kind: before_tool_call
      tool_intent: shell_command
      tools: [Bash]
      command_patterns:
        - dependency manager upgrades
        - known ad-hoc tool choices with existing COS primitives
        - commands matching high-confidence skill routing patterns
    requires:
      - inspect_shell_command
      - route_skill
      - block_tool_call
      - emit_metric
      - emit_intervention
    actions:
      preferred: warn
      fallback: documented-only
      reason_codes:
        - skill_route_available
        - dependency_update_bypass
        - tool_discovery_bypass
    evidence:
      metrics:
        - .cognitive-os/metrics/skill-routing.jsonl
      interventions:
        - .cognitive-os/metrics/primitive-interventions.jsonl
      proof_tests:
        - tests/contracts/test_skill_router_invariant.py
        - tests/contracts/test_skill_router_coverage.py
        - tests/behavior/test_skill_router_bash_gate.py
    projection:
      claude:
        fidelity: native-lifecycle-enforced
        surface: PreToolUse Bash hook
      codex:
        fidelity: governed-wrapper-enforced
        surface: Codex Bash hook plus governed guard where available
      opencode:
        fidelity: governed-wrapper-enforced
        surface: OpenCode project plugin cos-primitive-guard.js tool.execute.before plus permissions
      cursor:
        fidelity: structural-advisory
        surface: project rules/context only
      vscode-copilot:
        fidelity: structural-advisory
        surface: copilot instructions only
      shell-ci:
        fidelity: ci-enforced
        surface: shell/CI audit and routing checks
    impact:
      consumer_fleet: install-update-risk
      service_mode: harness-embedded-only

  - id: aci-observation-capture
    family: hook
    source: hooks/aci-observation-capture.sh
    lifecycle_ref: hooks/aci-observation-capture.sh
    intent: Capture agent-computer-interaction observations as runtime evidence without exposing private content.
    trigger:
      kind: after_tool_call
      tool_intent: observation_capture
      tools: [Read, Grep, Glob, LS, Bash]
    requires: [inspect_tool_result_metadata, emit_metric, emit_intervention]
    actions:
      preferred: observe
      fallback: documented-only
      reason_codes: [aci_observation_captured]
    evidence:
      metrics: [.cognitive-os/metrics/aci-observations.jsonl]
      interventions: [.cognitive-os/metrics/primitive-interventions.jsonl]
      proof_tests: [tests/contracts/test_aci_observation_capture_hook.py]
    projection: &runtime_hook_projection
      claude: {fidelity: native-lifecycle-enforced, surface: lifecycle hook}
      codex: {fidelity: structural-advisory, surface: generated instructions and governed wrapper backlog}
      opencode: {fidelity: host-plugin-lifecycle-capable, surface: future OpenCode plugin hook}
      cursor: {fidelity: structural-advisory, surface: project rules/context only}
      vscode-copilot: {fidelity: structural-advisory, surface: copilot instructions only}
      shell-ci: {fidelity: documented-only, surface: proof tests only until a shell/CI command lane is signed}
    impact: {consumer_fleet: none, service_mode: harness-embedded-only}

