schema_version: test-skip-registry.v1
owner_adr: ADR-166
policy: >-
  Skips are allowed only when they describe an explicit environment gate,
  opt-in proof lane, runtime sample precondition, or documented policy
  exemption. Reproducible product debt must use xfail(strict=True) or an
  active failing test instead of skip.
categories:
  external-dependency: Host tool, package, service, or credential is absent in the current lane.
  opt-in-lane: Test belongs to an explicit Docker, network, provider, HOME-mutating, or cost-bearing lane.
  runtime-sample-precondition: Runtime metrics or sample windows are insufficient for a statistical assertion.
  optional-runtime-state: Optional local artifacts or hooks are absent in a valid profile/lane.
  policy-exemption: Grandfathered, intentionally exempt, or self-check case documented by an audit policy.
expected_skips:
  - id: external-host-tool-or-library
    lanes: [unit, audit, contract, system, behavior, hooks, integration]
    category: external-dependency
    reason_pattern: '\b(docker|docker compose|docker-compose|jq|engram|lsof|flock|repomix|npx|PyYAML|pyyaml|git not available|curl|network|credential|daemon)\b.*(not available|required|requires|not found|unresponsive|not installed|not running|unavailable|absent|missing)|(not available|required|requires|not found|unresponsive|not installed|not running|unavailable|absent|missing).*\b(docker|docker compose|docker-compose|jq|engram|lsof|flock|repomix|npx|PyYAML|pyyaml|git|curl|network|credential|daemon)\b'
    applies_when: Host dependency is absent in laptop-safe validation.
    opt_in_lane: install dependency or run the explicit integration/Docker/provider lane.
  - id: explicit-opt-in-resource-lane
    lanes: [audit, system, behavior, integration, e2e, arena, benchmark]
    category: opt-in-lane
    reason_pattern: '(requires network access|requires Docker|requires \$HOME mutation|set [A-Z0-9_]+=(true|1) to enable|COS_ALLOW_|COGNITIVE_OS_TEST_DOCKER_UP|cost-bearing|provider smoke|Docker daemon|real Langfuse|testcontainers)'
    applies_when: The check is intentionally excluded from make test-laptop and default CI.
    opt_in_lane: test-docker, test-optional, test-laptop-integration, or a proof-drill registry entry.
  - id: runtime-sample-window
    lanes: [audit, contract, behavior, hooks]
    category: runtime-sample-precondition
    reason_pattern: '(no hook-health data|no hooks with >=|only \d+ samples|need >=|fewer than \d+ samples|not enough data|no invocations recorded|hook timing has no records|cannot compute p95|need >=2 review_by dates|Operational hook latency budget exceeded|No hooks recorded for events outside the explicit budget table)'
    applies_when: Runtime/statistical assertions need more local observations before they are meaningful.
    opt_in_lane: run runtime workload long enough to produce samples, then rerun the contract.
  - id: optional-profile-artifact-absent
    lanes: [unit, audit, contract, system, behavior, hooks]
    category: optional-runtime-state
    reason_pattern: '(not found|not present|does not exist|missing|not executable|not available|No .*found|No .*directory|empty|No real .*found|No container|not running|never started|cannot import|settings\.json not present|compose file missing|got empty parameter set)'
    applies_when: The test targets an optional profile/artifact not present in this lane.
    opt_in_lane: enable the profile or run the corresponding proof drill.
  - id: documented-policy-exemption
    lanes: [audit, contract, behavior]
    category: policy-exemption
    reason_pattern: '(grandfathered|intentionally exempt|\bexempt\b|skipping file check|is not .implemented.|status is .* skipping|self-check|own artifact|Cooldown is enforced|caught elsewhere|does not mention Contextual Trigger|references no \.sh files|deferred by registration allowlist|declares no skills|has no `model` in frontmatter|references are output paths generated by the skill)'
    applies_when: A separate audit policy or paired test owns the assertion.
    opt_in_lane: migrate to xfail(strict=True) if this becomes reproducible debt rather than an exemption.
