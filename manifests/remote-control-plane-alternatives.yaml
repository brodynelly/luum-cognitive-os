    display_name: OpenClaw
    source: github
    proof_level: official-doc
    repository: openclaw/openclaw
    language: TypeScript
    license: MIT
    license_posture: allowed
    classifications: [remote-control-plane, provider-runtime]
    remote_ingress: [telegram, discord, slack, whatsapp, signal, matrix, teams, webchat, gateway]
    provider_strategy: multi-provider-model-config-plus-cli
    credential_strategy: api-key-oauth-auth-profiles
    source_urls:
      - https://github.com/openclaw/openclaw
      - https://docs.openclaw.ai/
    notes: Local-first Gateway, channel pairing, auth profiles/failover, and sandbox policy are the strongest comparable patterns.
