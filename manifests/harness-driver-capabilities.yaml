schema_version: 1
description: >
  Driver capability matrix for projecting Cognitive OS hooks into agent
  harness settings. This is not the hook source of truth; it records what each
  harness driver can safely express today.

drivers:
  claude:
    settings_path: .claude/settings.json
    shape: nested_hooks
    supported_events:
      SessionStart:
        status: supported
      UserPromptSubmit:
        status: supported
      SubagentStart:
        status: supported
      PreCompact:
        status: supported
      PreToolUse:
        status: supported
        matcher_semantics: tool_pattern
      PostToolUse:
        status: supported
        matcher_semantics: tool_pattern
      Stop:
        status: supported
      TeammateIdle:
        status: cognitive_os_extension
      TaskCreated:
        status: cognitive_os_extension
      TaskCompleted:
        status: cognitive_os_extension

  codex:
    settings_path: .codex/hooks.json
    shape: native_lifecycle_keys
    version_baseline: "0.126.0-alpha.8"
    evidence:
      - tests/fixtures/codex-live-session/
      - lib/harness_adapter/codex.py
      - internal/provider/codex.go
    supported_events:
      SessionStart:
        status: supported
      UserPromptSubmit:
        status: supported
      Stop:
        status: supported
      PreToolUse:
        status: limited
        matcher_semantics: bash_only
        governed_fallback: scripts/cos-codex-guard.py
        governed_matchers:
          - Agent
          - Edit
          - Write
        limitation: >
          Codex tool hook coverage is treated as Bash-only until live local
          payloads prove broader coverage. The adapter emits an explicit
          codex_tool_coverage_gap parse error for non-Bash tool events.
          Agent/Edit/Write chains can be executed through the governed COS
          fallback runner instead of being projected as native Codex hooks.
      PostToolUse:
        status: limited
        matcher_semantics: bash_only
        governed_fallback: scripts/cos-codex-guard.py
        governed_matchers:
          - Agent
          - Edit
          - Write
        limitation: >
          Codex tool hook coverage is treated as Bash-only until live local
          payloads prove broader coverage. The adapter emits an explicit
          codex_tool_coverage_gap parse error for non-Bash tool events.
          Agent/Edit/Write chains can be executed through the governed COS
          fallback runner instead of being projected as native Codex hooks.
      SubagentStart:
        status: unsupported
      PreCompact:
        status: unsupported
      TeammateIdle:
        status: cognitive_os_extension
        projection: requires_cos_runner
      TaskCreated:
        status: cognitive_os_extension
        projection: requires_cos_runner
      TaskCompleted:
        status: cognitive_os_extension
        projection: requires_cos_runner

  bare_cli:
    settings_path: .cognitive-os/cos-runner-hooks.json
    shape: cos_runner_event_json
    description: >
      Bare-CLI / CI harness: cos-agent and cos-skill run in plain shell with
      no surrounding harness.  Events are emitted as canonical JSON to stdin
      of the BareCliAdapter.  Adapter file: lib/harness_adapter/bare_cli.py.
    version_baseline: "adr-064-p0"
    evidence:
      - lib/harness_adapter/bare_cli.py
      - lib/agent_runner.py
      - bin/cos-agent
      - tests/unit/test_harness_adapter_bare_cli.py
    supported_events:
      SessionStart:
        status: supported
      UserPromptSubmit:
        status: supported
      ToolUseStart:
        status: supported
      ToolUseEnd:
        status: supported
      SessionEnd:
        status: supported
      PreCompact:
        status: unsupported
        limitation: >
          Bare CLI has no native context-compaction; COS_CONTEXT_COMPRESS=1
          triggers lib.context_compressor manually if needed.
      SubagentStart:
        status: unsupported
      TeammateIdle:
        status: unsupported
      TaskCreated:
        status: unsupported
      TaskCompleted:
        status: unsupported

parity_policy:
  required_statuses:
    - supported
  advisory_statuses:
    - limited
    - cognitive_os_extension
  unsupported_statuses:
    - unsupported

  rules:
    - id: supported-events-must-project
      description: >
        If a hook is registered in the reference driver for an event that the
        target driver marks supported, the target driver should either project
        it or document an explicit exception.
    - id: limited-events-are-not-parity-failures
      description: >
        Missing hooks on limited target events are capability gaps, not parity
        regressions. They should appear in reports so the roadmap remains
        honest.
    - id: unsupported-events-must-not-be-copied-blindly
      description: >
        Do not copy unsupported event registrations into a target driver just
        to make counts match. Add a runner, adapter, or documented projection
        path first.
