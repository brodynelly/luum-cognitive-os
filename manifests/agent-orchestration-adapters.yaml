unmanifested_core_file_scan:
  scopes:
  - lib
  filename_regex: (agent|handoff|dispatch|retry|budget|daemon|team|freeze|worktree|session|queue|worker)
  allowed_suffixes:
  - .py
benchmark:
  script: scripts/agent-orchestration-benchmark.py
  status_policy:
    required_failures_block: true
    known_gap_failures_warn: true
  fixtures:
  - id: write-agent-worktree-no-stash
    required: true
    rationale: Write-agent launch must use worktree mode and suppress auto-stash snapshots.
    evidence_tests:
    - tests/behavior/test_agent_lifecycle_worktree_mode.py
    required_patterns:
    - test_agent_prelaunch_worktree_mode_prepares_context_without_stash
    - test_pre_agent_snapshot_suppressed_for_agent_worktree_marker
    - test_agent_prelaunch_defaults_to_worktree_mode
  - id: worktree-divergence-audited
    required: true
    rationale: Divergent worktrees must be detected before launch/destructive operations.
    evidence_tests:
    - tests/behavior/test_worktree_divergence_audit.py
    required_patterns:
    - stale_worktree_dirty_path
    - behind_without_local_overlap
  - id: release-freeze-active-claim-blocks
    required: true
    rationale: Release/history operations must not proceed while active agent claims
      exist.
    evidence_tests:
    - tests/behavior/test_release_freeze.py
    required_patterns:
    - active
    - claim
    - block
  - id: handoff-cycle-detected
    required: true
    rationale: Multi-agent handoff cycles must be detected rather than looping.
    evidence_tests:
    - tests/behavior/test_handoff_dispatcher_flow.py
    required_patterns:
    - HandoffCycleDetected
    - cycle
  - id: receiver-kill-mid-dispatch-receipt
    required: true
    rationale: Receiver death mid-dispatch must persist a failure receipt.
    evidence_tests:
    - tests/chaos/test_handoff_receiver_kill_mid_dispatch.py
    required_patterns:
    - SIGKILL
    - persists_failure_receipt
  - id: dispatch-budget-pre-call-refusal
    required: true
    rationale: Budget/sandbox gates must refuse before provider calls when preconditions
      fail.
    evidence_tests:
    - tests/integration/test_dispatch_gate_real_dispatch.py
    required_patterns:
    - refuses_before_provider_call
    - open_circuit_breaker
    - sandbox_required
  - id: file-ipc-cross-session-flow
    required: true
    rationale: Default local adapter must prove cross-session file IPC without external
      services.
    evidence_tests:
    - tests/behavior/test_agent_team_file_ipc_flow.py
    required_patterns:
    - two_session_file_ipc_flow
    - inbox
    - events
  - id: external-framework-adapters-declared
    required: true
    rationale: Community frameworks remain declared candidates/lab adapters, not direct
      core imports.
    evidence_tests:
    - tests/unit/test_agent_orchestration_boundary_audit.py
    required_patterns:
    - forbidden-core-orchestration-import
    - unmanifested-orchestration-core-file
