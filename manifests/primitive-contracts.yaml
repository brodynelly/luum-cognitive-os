schema_version: primitive-contracts.v1
purpose: 'Canonical portable contract registry for Cognitive OS agentic primitives.
  This registry is the ADR-256 Phase 1 bridge between primitive lifecycle/readiness
  metadata, source files, harness projection fidelity, and future runtime intervention
  evidence.

  '
fidelity_levels:
  native-lifecycle-enforced: Host lifecycle runs the primitive at the right event
    and can block/warn in the tested projection.
  governed-wrapper-enforced: COS wrapper/guard enforces when native lifecycle is incomplete
    or unavailable.
  host-plugin-lifecycle-capable: Host exposes plugin/tool lifecycle events suitable
    for enforcement, but COS has not signed runtime smoke for this primitive yet.
  structural-advisory: Project files/instructions are generated; no runtime enforcement
    is claimed.
  ci-enforced: Enforced only when the shell/CI lane runs.
  documented-only: Durable docs/contract only; no active runtime projection.
  unsupported: No safe projection or fallback is currently declared.
contracts:
- id: destructive-git-blocker
  family: hook
  source: hooks/destructive-git-blocker.sh
  lifecycle_ref: hooks/destructive-git-blocker.sh
  intent: Block destructive Git operations before execution.
  trigger:
    kind: before_tool_call
    tool_intent: shell_command
    tools:
    - Bash
    command_patterns:
    - git stash pop|drop|apply
    - git reset
    - git clean -f
    - git restore
    - git revert
    - git worktree add|remove|move|prune|repair|lock|unlock
    - git branch -D
    - git rebase
    - git push --force|-f
  requires:
  - inspect_shell_command
  - block_tool_call
  - emit_metric
  - emit_intervention
  actions:
    preferred: block
    fallback: warn
    reason_codes:
    - destructive_git_op
    - force_push
    - protected_branch_write
    - branch_context_switch
  evidence:
    metrics:
    - .cognitive-os/metrics/git-op-blocks.jsonl
    - .cognitive-os/metrics/destructive-git-bypass.jsonl
    interventions:
    - .cognitive-os/metrics/primitive-interventions.jsonl
    proof_tests:
    - tests/behavior/test_safety_mesh.py
    - tests/behavior/test_hooks_batch1.py
  projection:
    claude:
      fidelity: native-lifecycle-enforced
      surface: PreToolUse Bash hook
    codex:
      fidelity: governed-wrapper-enforced
      surface: Codex Bash hook plus governed guard where available
    opencode:
      fidelity: governed-wrapper-enforced
      surface: OpenCode project plugin cos-primitive-guard.js tool.execute.before/after
        smoke
    cursor:
      fidelity: structural-advisory
      surface: project rules/context only
    vscode-copilot:
      fidelity: structural-advisory
      surface: copilot instructions only
    shell-ci:
      fidelity: ci-enforced
      surface: shell/CI policy command lane
  impact:
    consumer_fleet: install-update-risk
    service_mode: harness-embedded-only
- id: destructive-rm-blocker
  family: hook
  source: hooks/destructive-rm-blocker.sh
  lifecycle_ref: hooks/destructive-rm-blocker.sh
  intent: Block destructive recursive file erasure and truncation patterns before
    execution.
  trigger:
    kind: before_tool_call
    tool_intent: shell_command
    tools:
    - Bash
    command_patterns:
    - rm -rf|-fr|-r|-R|--recursive
    - redirect truncation of tracked files
    - truncate -s 0
    - cp /dev/null
    - dd of= with zero or empty input
  requires:
  - inspect_shell_command
  - inspect_agent_context
  - block_tool_call
  - emit_metric
  - emit_intervention
  actions:
    preferred: block
    fallback: warn
    reason_codes:
    - destructive_rm_op
    - destructive_file_erasure
    - tracked_file_truncation
  evidence:
    metrics:
