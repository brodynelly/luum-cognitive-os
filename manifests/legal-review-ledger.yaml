schema_version: legal-review-ledger/v1
status: active
contract: |
  Append-only registry of legal reviews. Each entry records counsel
  decision, evidence path, and SHA256 of counsel memo for tamper-evidence.
  New entries MUST be appended at the end of `entries:`; existing entries
  MUST NOT be edited in-place except to fill `pending` → finalized fields
  via `cos-legal-approve` (which preserves prior state in `freeze_history`-style
  amendment if applicable). Enforced by tests/contracts/test_legal_review_ledger_append_only.py.

