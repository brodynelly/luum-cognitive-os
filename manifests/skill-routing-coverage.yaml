schema_version: skill-routing-coverage.v2
purpose: 'Per-category skill routing coverage with explicit semantic universes.

  v2 replaces v1''s flat coverage metric (which mixed categories incorrectly,

  yielding semantically false numbers). v2 separates canonical skills,

  package-bundled, runtime-projection, and auto-generated, each with its own

  routing requirement and coverage measurement.

  '
captured_on: '2026-05-05'
schema_migration_note: 'v1 reported "86.4% coverage / 160 routed / 25 unrouted" against
  a flat

  universe of 185 SKILL.md files mixing canonical, runtime-projection, and

  some package-bundled paths. The flat number was misleading: it conflated

  categories with different routing requirements, included some disabled

  skills as "unrouted" (they should be exempt), and missed 16 runtime-

  projection skills entirely (the migration agent excluded the whole

  .cognitive-os/skills/ tree thinking it was all auto-generated).

  v2 restores semantic precision and tracks each category separately.

  '
coverage_scope:
  canonical_skills:
    location: skills/*/SKILL.md
    routing_required: true
    rationale: Primary skill location, source-of-truth for the public router.
    universe_size: 162
    routed_count: 100
    routed_percent: 61.7
    disabled_count: 9
    name_mismatch_count: 3
    eligible_for_routing: 150
    eligible_routed_percent: 66.0
  package_bundled_skills:
    location: packages/*/skills/*/SKILL.md
    routing_required: true
    rationale: Skills bundled with COS packages; routable from the same router.
    universe_size: 74
    routed_count: 22
    routed_percent: 29.7
    disabled_count: 1
    name_mismatch_count: 0
    eligible_for_routing: 73
    eligible_routed_percent: 30.1
  runtime_projection_skills:
    location: .cognitive-os/skills/*/SKILL.md
    excludes_subpath: .cognitive-os/skills/auto-generated/
    routing_required: true
    classified_separately: true
    rationale: 'Runtime projection of canonical+package skills into the

      .cognitive-os/skills/ tree. Eligible for auto-routing (routing_patterns:

      in frontmatter) — explicit slash invocation works regardless. Most are

      mirrors of canonical/package skills; some are runtime-only

      installations.

      '
    universe_size: 0
    routed_count: 0
    routed_percent: 0.0
    disabled_count: 0
    name_mismatch_count: 0
    eligible_for_routing: 0
    eligible_routed_percent: 0.0
  auto_generated_skills:
    location: .cognitive-os/skills/auto-generated/*/SKILL.md
    routing_required: false
    rationale: 'Sandbox tier per ADR-133/138 (auto-skill-generator output).

      lifecycle_state: sandbox, distribution: lab. NOT in production

      routing canon. Promotion to advisory tier (and eligibility for routing

      enforcement) requires evidence per ADR-180 (lifecycle promotion

      activation).

      '
    universe_size: 0
    routed_count: 0
    routed_percent: 0.0
    disabled_count: 0
    name_mismatch_count: 0
    eligible_for_routing: 0
    eligible_routed_percent: 0.0
    note: ADR-176 SkillStore + ADR-180 promotion ladder will populate this class as
      auto-skill-generator runs and skills accumulate evidence.
exemptions:
  disabled_skills:
    rationale: 'Skills with `disable-model-invocation: true` in frontmatter. These
      are

      operator-only invocable (slash command) and explicitly NOT meant to be

      auto-suggested by the orchestrator. Routing requirement = false.

      '
    list:
    - apply-improvements
    - audit-integrity
    - bump-version
    - generate-changelog
    - optimize-skill
    - push-release
    - release-os
    - tag-release
    - validate-release
    count: 9
  name_field_mismatch:
    rationale: 'Skills where the `name:` field in frontmatter differs from the

      directory name. Adding routing_patterns would cause router orphan

      detection to fail (router registers by `name:`, disk detection uses

      directory name). Needs frontmatter cleanup BEFORE routing migration.

      Tracked separately so this doesn''t pollute the main backlog.

      '
    list:
    - dir: caveman-compress
      name_field: compress
    - dir: component-classifier
      name_field: primitive-classifier
    - dir: cost-predictor
      name_field: cost-predict
    count: 3
    fix_action: Update each SKILL.md `name:` field to match directory name, then run
      routing-pattern migration normally.
runtime_projection_pending_routing:
  status: routing_patterns_missing
  count: 0
  impact:
    explicit_slash_invocation: works
    auto_routing: incomplete
    behavior: 'Operator can invoke /<skill-name> directly; orchestrator can

      reference by full path. But UserPromptSubmit auto-suggestion via

      lib.skill_router will not include these skills until routing_patterns

      are added.

      '
  resolution_path: Runtime projection skills are ignored in git-clean validation capsules;
    coverage is enforced for tracked canonical/package skills. Runtime-only projection
    coverage must be measured by an installer/runtime health check, not this repository
    contract.
canonical_pending_routing:
  status: routing_patterns_missing
  count: 51
  impact: same as runtime_projection_pending_routing
package_bundled_pending_routing:
  status: routing_patterns_missing
  count: 51
  impact: same as runtime_projection_pending_routing
