- id: shell-ci
  display_name: Shell / CI
  status: implemented
  projection_mode: cli-and-workflows
  settings_paths:
  - .cognitive-os/shell-ci-projection.json
  - .github/workflows/cognitive-os-shell-ci.yml
  - scripts
  projected_surfaces:
  - scripts
  - workflows
  - command-drivers
  proof: temp-consumer-project-structural
  limitations:
  - Structural command/workflow projection and syntax proof only; generated commands
    may still need project dependencies at runtime.
  - The disabled repository CI workflow is not re-enabled by this harness promotion.
  next_action: Add optional runtime smoke for projected commands against representative
    consumer project stacks.
  default_command:
  - python3
  - scripts/cos_init.py
  - --default
  - --harness
  - shell-ci
