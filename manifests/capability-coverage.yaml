schema_version: capability-coverage/v1
status: active
owner: platform-safety
purpose: >
  Single generated source of truth for COS feature reality: claim -> ADR ->
  implementation -> consumer/wiring -> tests -> receipts/audits -> reality.
policy:
  adr_coverage:
    min: 230
    max: 252
    require_accepted_or_resolved_adr_covered: true
  public_claim_allowed_levels: [REAL, PARTIAL, RESOLVED]
  real_requires:
    implementation: true
    consumers: true
    tests: true
    receipt_or_audit: true
  non_real_requires_known_gaps: true
  generated_outputs:
    matrix_md: docs/07-Capabilities/capabilities/MATRIX.md
    latest_json: docs/06-Daily/reports/capability-coverage-latest.json

capabilities:
