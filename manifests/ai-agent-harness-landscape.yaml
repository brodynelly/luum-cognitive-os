schema_version: ai-agent-harness-landscape.v1
review_date: 2026-05-04
purpose: Candidate inventory for AI coding IDEs, CLIs, hosted agents, and provider/tool
  surfaces relevant to Cognitive OS harness projection. This is not an implementation
  claim.
proof_levels:
  native-lifecycle: Native lifecycle hooks/events are projected and tested.
  runtime-smoke: Account-backed runtime smoke was executed and recorded.
  structural: Project-local files/configs are generated and shape-tested from official
    docs.
  none: No local projection proof exists.
required_candidate_fields:
- id
- display_name
- category
- status
- proof_level
- availability_boundary
- projection_surface
- official_sources
