  - docs/reports/proof-drill-opt-in-run-2026-05-05.md
  risk_level: medium
  bypasses_safety_primitive: false
  description: Optional model pin for explicit Codex host provider proof drills when
    the installed CLI default model is unsupported.
- name: COS_RUN_DATABASE_CONTAINERS
