name: Scope portability

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: scope-portability-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scope-portability:
    name: Primitive scope portability contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv
          uv sync --extra testing --locked

      - name: Syntax check scope tools
        run: |
          .venv/bin/python -m py_compile \
            scripts/cos_install_projection_audit.py \
            scripts/cos-scope-both-portability-audit \
            scripts/cos-scope-projection-audit \
            scripts/primitive_scope_classifier.py \
            scripts/primitive_scope_dependency_audit.py \
            scripts/primitive_scope_health.py \
            scripts/primitive_scope_random_audit.py
          bash -n scripts/cos-status.sh scripts/cos-ci-local.sh .githooks/pre-commit

      - name: Run targeted scope portability tests
        run: |
          .venv/bin/python -m pytest \
            tests/unit/test_scope_both_portability_audit.py \
            tests/unit/test_scope_projection_audit.py \
            tests/unit/test_primitive_scope_classifier.py \
            tests/unit/test_primitive_scope_dependency_audit.py \
            tests/unit/test_primitive_scope_health.py \
            tests/unit/test_primitive_scope_random_audit.py \
            tests/contracts/test_primitive_scope_governance.py \
            tests/integration/test_install_projection_audit.py \
            tests/behavior/test_scope_portability_precommit.py \
            tests/behavior/test_cos_status.py \
            -q

      - name: Run strict primitive scope classifier
        run: |
          # --fail-contradictions is the real integrity gate (contradictions=0).
          # --fail-low-confidence / --fail-medium-confidence are NOT enforced yet:
          # the repo carries pre-existing low/medium-confidence primitives that the
          # classifier itself marks "unknown"; forcing them green would require
          # fabricating scope classifications. Low/medium-confidence burn-down is
          # tracked as follow-up debt rather than blocking CI on undecidable scopes.
          .venv/bin/python scripts/primitive_scope_classifier.py \
            --project-dir . \
            --fail-contradictions \
            --json-out .cognitive-os/reports/primitive-scope-classifier-ci.json
          scripts/primitive-scope-dependency-audit \
            --project-dir . \
            --strict \
            --json-out .cognitive-os/reports/primitive-scope-dependency-audit-ci.json
          scripts/primitive-scope-plane-audit \
            --project-dir . \
            --strict \
            --json-out .cognitive-os/reports/primitive-scope-plane-audit-ci.json
          scripts/primitive-scope-balance-audit \
            --project-dir . \
            --strict \
            --json-out .cognitive-os/reports/primitive-scope-balance-audit-ci.json
          scripts/primitive-scope-generic-os-only-audit \
            --project-dir . \
            --strict \
            --json-out .cognitive-os/reports/primitive-scope-generic-os-only-audit-ci.json
          scripts/primitive-scope-false-both-audit \
            --project-dir . \
            --strict \
            --json-out .cognitive-os/reports/primitive-scope-false-both-audit-ci.json
          scripts/primitive-scope-proof-audit \
            --project-dir . \
            --strict \
            --json-out .cognitive-os/reports/primitive-scope-proof-audit-ci.json
          scripts/primitive-behavior-depth-audit \
            --project-dir . \
            --strict \
            --json-out .cognitive-os/reports/primitive-behavior-depth-audit-ci.json
          scripts/primitive-scope-health \
            --project-dir . \
            --json-out .cognitive-os/reports/primitive-scope-health-ci.json

      - name: Run strict scope projection audits
        run: |
          scripts/cos-scope-both-portability-audit \
            --repo-root . \
            --strict \
            --json \
            --no-write
          scripts/cos-scope-projection-audit \
            --repo-root . \
            --run-install-smoke \
            --strict \
            --json \
            --no-write
          scripts/cos-install-projection-audit --json

      - name: Run scope portability status
        run: scripts/cos status --portability --json
