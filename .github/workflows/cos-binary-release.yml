name: cos-binary-release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: cmd/cos/go.mod
      - name: Install Python test dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install uv
          uv sync --extra testing
      - name: Validate release lane
        run: |
          bash -n scripts/check-local-privacy.sh .githooks/pre-commit
          scripts/check-local-privacy.sh --root . --all
          .venv/bin/python -m pytest \
            tests/unit/test_check_absolute_paths.py \
            tests/unit/test_check_local_privacy.py \
            tests/red_team/portability/test_check-local-privacy.py \
            tests/red_team/portability/test_local-privacy-hygiene.py \
            -q
          cd cmd/cos && go test ./...
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
