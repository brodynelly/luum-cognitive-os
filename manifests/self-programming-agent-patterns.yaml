schema_version: self-programming-agent-patterns/v1
status: active
owner: platform-orchestration
source_documents:
  - docs/06-Daily/reports/external-tools-radar-opensage-addendum-2026-05-09.md
  - docs/03-PoCs/research/repo-scout/deep/opensage-agent__opensage-adk-2026-05-09.md
  - docs/04-Concepts/architecture/opensage-self-programming-patterns.md
  - docs/02-Decisions/adrs/ADR-256-primitive-contract-registry-and-runtime-evidence-ledger.md
policy:
  default_runtime_adoption: false
  allowed_adoption_kinds: [pattern-only, adapter-lab]
  adapter_lab_requires:
    - primitive_authoring_gate
    - license_gate
    - credential_gate
    - sandbox_policy
    - runtime_evidence_ledger
    - rollback_receipts
  public_claim: assess_only_until_observable
patterns:
  - id: dynamic-agent-topology
    name: Dynamic agent topology
    external_reference:
      tool: opensage-adk
      source_urls:
        - https://www.opensage-agent.ai/adk.html
        - https://rdi.berkeley.edu/blog/opensage/
      claim: AI-created vertical/horizontal subagent topologies and ensembles.
    cos_surfaces:
      existing:
        - manifests/subagent-capabilities.yaml
        - manifests/agent-orchestration-adapters.yaml
        - docs/02-Decisions/adrs/ADR-203-subagent-capability-contract-and-launch-preflight.md
        - docs/02-Decisions/adrs/ADR-251-agent-orchestration-adapter-boundary.md
        - lib/agent_lifecycle.py
        - lib/agent_team.py
      planned:
        - manifests/primitive-contracts.yaml
        - .cognitive-os/metrics/primitive-interventions.jsonl
    extraction: Compare OpenSage dynamic topology with COS subagent launch, capability preflight, handoff receipts, and topology evidence.
    required_gates: [subagent_capability_preflight, launch_receipts, branch_worktree_isolation, primitive_contract]
    observable_evidence: [agent_launch_receipt, handoff_receipt, primitive_intervention]
    adoption_kind: pattern-only
    status: mapped
  - id: dynamic-tool-skill-synthesis
    name: Dynamic tool and skill synthesis
    external_reference:
      tool: opensage-adk
      source_urls:
        - https://www.opensage-agent.ai/adk.html
        - https://docs.adk.opensage-agent.ai/developer_guide/Adding-a-Sandbox/
      claim: Agents can synthesize tools and skills during execution.
    cos_surfaces:
      existing:
        - lib/dynamic_tool_creator.py
        - skills/primitive-authoring/SKILL.md
        - docs/02-Decisions/adrs/ADR-120-conversation-to-primitive-harvester.md
        - docs/02-Decisions/adrs/ADR-216-tool-discovery-pre-use-gate.md
        - lib/license_guard.py
        - lib/credential_safe_run.py
      planned:
        - manifests/primitive-contracts.yaml
        - .cognitive-os/metrics/primitive-interventions.jsonl
    extraction: Treat OpenSage as a design reference for generated tool metadata, but require COS authoring, license, credential, and discovery gates before any tool is invocable.
    required_gates: [primitive_authoring_gate, reuse_check, license_gate, credential_gate, tool_discovery_gate, sandbox_policy]
    observable_evidence: [generated_tool_registry_row, license_receipt, credential_scan_receipt, primitive_intervention]
    adoption_kind: pattern-only
    status: mapped
  - id: sandboxed-execution
    name: Sandboxed execution
    external_reference:
      tool: opensage-adk
      source_urls:
        - https://docs.adk.opensage-agent.ai/developer_guide/Adding-a-Sandbox/
        - https://www.opensage-agent.ai/adk.html
      claim: Tool-isolated execution and configurable sandbox backends.
    cos_surfaces:
      existing:
        - docs/02-Decisions/adrs/ADR-232-sandbox-adapter-tiers.md
        - manifests/sandbox-adapters.yaml
        - scripts/cos-sandbox-run
        - lib/sandbox_adapter.py
        - docs/04-Concepts/architecture/cos-service-runtime-boundary.md
        - docs/02-Decisions/adrs/ADR-211-service-mode-readiness-gate.md
      planned:
        - manifests/primitive-contracts.yaml
        - docs/06-Daily/reports/primitive-projection-fidelity-latest.json
    extraction: Use OpenSage sandbox-backend vocabulary as comparison data, while preserving COS default no-network, no-fallback, opt-in sandbox tiers.
    required_gates: [sandbox_required_flag, no_implicit_fallback, network_off_by_default, service_readiness_gate, rollback_receipts]
    observable_evidence: [sandbox_plan, dispatch_metric, service_readiness_report, primitive_intervention]
    adoption_kind: pattern-only
    status: mapped
  - id: graph-hierarchical-memory
    name: Graph and hierarchical memory
    external_reference:
      tool: opensage-adk
      source_urls:
        - https://www.opensage-agent.ai/adk.html
        - https://rdi.berkeley.edu/blog/opensage/
      claim: Dedicated memory agent, hierarchical memory, and graph-based retrieval.
    cos_surfaces:
      existing:
        - docs/04-Concepts/architecture/memory-lifecycle.md
        - lib/engram_lifecycle.py
        - lib/memory_retrieval_benchmark.py
        - docs/04-Concepts/architecture/memory-layer-evolution-sdd.md
      planned:
        - .cognitive-os/metrics/codebase-itinerary.jsonl
        - manifests/primitive-contracts.yaml
    extraction: Compare OpenSage graph memory with Engram recovery and codebase itinerary, but keep content redaction and retention policy authoritative in COS.
    required_gates: [memory_lifecycle_doctor, retention_policy, redaction_policy, codebase_itinerary_no_contents]
    observable_evidence: [memory_lifecycle_report, itinerary_row, retrieval_benchmark_result]
    adoption_kind: pattern-only
    status: mapped
  - id: real-benchmarks
    name: Real benchmark loops
    external_reference:
      tool: opensage-adk
      source_urls:
        - https://www.opensage-agent.ai/adk.html
        - https://arxiv.org/abs/2602.16891
      claim: Benchmarks such as CyberGym, Terminal-Bench, SWE-Bench Pro, and DevOps-Gym demonstrate agent behavior under workload.
    cos_surfaces:
      existing:
        - docs/04-Concepts/architecture/runtime-benchmark-mvp.md
        - docs/04-Concepts/architecture/primitive-fitness-evaluation-contract.md
        - scripts/runtime_benchmark_report.py
        - scripts/primitive_fitness_ledger.py
        - docs/06-Daily/reports/primitive-coverage-latest.json
      planned:
        - tests/contracts/test_observable_primitive_self_use.py
        - docs/06-Daily/reports/primitive-projection-fidelity-latest.json
    extraction: Use OpenSage benchmark discipline to require observable primitive use, not architecture-only claims.
    required_gates: [primitive_fitness_ledger, runtime_benchmark, behavioral_proof, trace_join]
    observable_evidence: [benchmark_result, primitive_fitness_row, trace_join_report]
    adoption_kind: pattern-only
    status: mapped
