# SCOPE: os-only
# AUTO-GENERATED seed corpus for ADR-298 routing-benchmark harness.
# Refine prompts manually as needed — the harness measures regressions,
# not absolute truth. Stable order, deterministic hash.
#
# Regenerate (LLM-assisted, full 385 skills) via:
#   scripts/cos-routing-benchmark --regenerate-corpus
#
# Schema:
#   schema_version: routing-benchmark-corpus/v1
#   skills:
#     <skill-name>:
#       description: <SKILL.md description, source of truth>
#       prompts:
#         en: [...]
#         es: [...]
#         pt: [...]
#         de: [...]
#         fr: [...]
#         it: [...]
schema_version: routing-benchmark-corpus/v1
skills:
  product-answer:
    description: |
      Answer COS product/commercial questions (differentiator, moat,
      wedge, ICP, pricing, competitors, pitch, positioning) from cached
      ADR-282 evidence cards rather than broad repo research.
    prompts:
      en:
        - "what is our differentiator?"
        - "what's the COS moat versus competitors?"
        - "give me the product pitch"
        - "what is our ICP?"
        - "answer a product question: what's our wedge?"
      es:
        - "¿cuál es nuestro diferenciador?"
        - "¿cuál es el moat de COS frente a competidores?"
        - "dame el pitch del producto"
        - "¿cuál es nuestro ICP?"
        - "responde una pregunta de producto: ¿cuál es nuestro wedge?"
      pt:
        - "qual é o nosso diferenciador?"
        - "qual é o moat do COS contra concorrentes?"
        - "me dá o pitch do produto"
        - "qual é o nosso ICP?"
        - "responde uma pergunta de produto: qual é o nosso wedge?"
      de:
        - "was ist unser Differenzierungsmerkmal?"
        - "was ist der COS-Moat gegenüber Wettbewerbern?"
        - "gib mir den Produkt-Pitch"
        - "wer ist unser ICP?"
        - "beantworte eine Produktfrage: was ist unser Wedge?"
      fr:
        - "quel est notre facteur différenciant ?"
        - "quel est le moat de COS face aux concurrents ?"
        - "donne-moi le pitch produit"
        - "quel est notre ICP ?"
        - "réponds à une question produit : quel est notre wedge ?"
      it:
        - "qual è il nostro differenziatore?"
        - "qual è il moat di COS rispetto ai concorrenti?"
        - "dammi il pitch del prodotto"
        - "qual è il nostro ICP?"
        - "rispondi a una domanda di prodotto: qual è il nostro wedge?"

  security-audit:
    description: |
      Run a security audit of the current changes: scan for secrets,
      injection risks, license-violation imports, and unsafe defaults.
    prompts:
      en:
        - "run a security audit on the current branch"
        - "scan my changes for secrets and vulnerabilities"
        - "audit this code for security issues"
        - "check for hardcoded credentials"
        - "do a security review"
      es:
        - "ejecuta una auditoría de seguridad sobre la rama actual"
        - "escanea mis cambios buscando secretos y vulnerabilidades"
        - "audita este código por problemas de seguridad"
        - "busca credenciales hardcodeadas"
        - "haz una revisión de seguridad"
      pt:
        - "roda uma auditoria de segurança na branch atual"
        - "escaneie minhas mudanças por segredos e vulnerabilidades"
        - "audite este código por problemas de segurança"
        - "verifique credenciais hardcoded"
        - "faça uma revisão de segurança"
