schema_version: remote-control-plane-alternatives.v1
review_date: 2026-05-05
purpose: >-
  Verified landscape for remote Cognitive OS control-plane and provider-adapter
  design. This is a research input, not a runtime support claim.
proof_levels:
  official-doc: Current public documentation was reviewed.
  repo-readme: GitHub repository metadata and README were reviewed.
  local-doc: Existing Cognitive OS documentation was reviewed.
  unverified: Listed item was not yet source-verified.
classification_values:
  remote-control-plane: Provides channel/chat/web/API gateway patterns.
  provider-runtime: Provides model provider, CLI, API-key, or local model routing patterns.
  coding-executor: Can run coding tasks or shell/file tools for a project workspace.
  reference-only: Useful as comparison only; not a direct COS integration candidate.
license_posture_values:
  allowed: License appears compatible with current COS license policy.
  blocked: License appears blocked by current COS license policy.
  review: License is absent, mixed, or requires legal review.
principles:
  - Do not scrape vendor credential stores, cookies, keychains, or CLI auth files.
  - Prefer official CLI invocation or documented API/OAuth/device-login flows.
  - Separate remote ingress from provider execution.
  - Treat Telegram, Discord, Slack, webhooks, and web UIs as untrusted ingress surfaces.
  - Keep all first implementations lab/propose-only until auth probes and redaction tests pass.
projects:
