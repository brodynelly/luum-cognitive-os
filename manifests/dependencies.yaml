- name: py2many
  criticality: optional
  check: py2many --version
  install:
    macos:
      manager: pip
      command: python3 -m pip install --user py2many && mkdir -p ~/.cargo/bin && ln -sf "$(python3 -m site --user-base)/bin/py2many"
        ~/.cargo/bin/py2many
    linux:
      manager: pip
      command: python3 -m pip install --user py2many && mkdir -p ~/.cargo/bin && ln -sf "$(python3 -m site --user-base)/bin/py2many"
        ~/.cargo/bin/py2many
    windows_wsl:
      manager: pip
      command: python3 -m pip install --user py2many && mkdir -p ~/.cargo/bin && ln -sf "$(python3 -m site --user-base)/bin/py2many"
        ~/.cargo/bin/py2many
  consumed_by:
  - scripts/cos-rust-transpiler-eval
  - scripts/cos_rust_transpiler_eval.py
  category: cli
  profiles:
  - rust-transpiler-lab
  scope: user
  syncable: 'no'
  auth_bound: false
  manual_url: https://github.com/py2many/py2many
  post_install: Installs with pip --user and symlinks py2many into ~/.cargo/bin, which is expected on the COS maintainer PATH.
- name: tnk
