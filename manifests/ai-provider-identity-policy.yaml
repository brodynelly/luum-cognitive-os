schema_version: ai-provider-identity-policy/v1
status: active
owner: platform-safety
purpose: >
  Prevent AI agents from inventing public authorship/contact identities for
  model providers. AI assistance is disclosed through COS provenance and
  session artifacts, not provider-looking email addresses or co-author trailers.

