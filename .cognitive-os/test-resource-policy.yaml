version: 1

defaults:
  workers: 4
  timeout_seconds: 300
  docker_policy: forbidden
  cost_policy: free_only
  artifact_policy: keep_summary

lanes:
  unit:
    workers: auto
    timeout_seconds: 900
  audit:
    workers: 4
    timeout_seconds: 360
  contract:
    workers: 4
    timeout_seconds: 420
  architecture:
    workers: 4
    timeout_seconds: 360
  system:
    workers: 4
    timeout_seconds: 360
  behavior:
    workers: 0
    timeout_seconds: 600
  hooks:
    workers: 0
    timeout_seconds: 600
  integration:
    workers: 0
    timeout_seconds: 2400
    docker_policy: forbidden
  integration-docker:
    workers: 0
    timeout_seconds: 1200
    docker_policy: required
  e2e:
    workers: 0
    timeout_seconds: 1200
    docker_policy: required
  chaos:
    workers: 0
    timeout_seconds: 1200
    docker_policy: forbidden
  red_team:
    workers: 2
    timeout_seconds: 900
    docker_policy: forbidden
  smoke:
    workers: 0
    timeout_seconds: 900
    docker_policy: allowed
  arena:
    workers: 0
    timeout_seconds: 1800
    docker_policy: allowed
    cost_policy: cost_bearing
    artifact_policy: keep_full
  benchmark:
    workers: 0
    timeout_seconds: 1800
    docker_policy: allowed
    cost_policy: cost_bearing
    artifact_policy: keep_full
  quality:
    workers: 0
    timeout_seconds: 1800
    docker_policy: allowed
    cost_policy: cost_bearing
    artifact_policy: keep_full
