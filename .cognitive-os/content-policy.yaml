# Content Policy — Enforced automatically on every write/commit
# Terms, patterns, and rules that must NEVER appear in output

version: 1
last_updated: "2026-03-27"

prohibited_terms:
  # Legal/licensing risk
  - term: "HyperAgents"
    reason: "CC-BY-NC-SA license — cannot reference as source"
  - term: "META Research"
    reason: "Avoid implying code derivation from Meta"
  - term: "facebookresearch"
    reason: "Cannot reference as code source"
  - term: "gentleman-programming"
    reason: "Wrong author attribution"

prohibited_patterns:
  # Regex patterns
  - pattern: "inspired by.*HyperAgents"
    reason: "Cannot claim inspiration from NC-licensed code"
  - pattern: "Source:.*facebookresearch"
    reason: "Cannot reference NC-licensed repos as source"
  - pattern: "adapted from.*Meta"
    reason: "Cannot claim adaptation from NC-licensed work"
  - pattern: "author:.*gentleman"
    reason: "Wrong author — should be luum"

required_values:
  # Fields that must have specific values
  - field: "author"
    value: "luum"
    files: "skills/*/SKILL.md"

content_rules:
  # General rules
  - rule: "Never present estimated costs as actual costs"
  - rule: "Never hardcode API prices — use measured data"
  - rule: "Never say 'looks good' or 'LGTM' in reviews"
