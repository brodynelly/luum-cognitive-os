schema_version: harness-implementation-phases.v1
purpose: Machine-readable rollout checklist for multi-IDE/provider harness support.
phase_order:
- ratchet-baseline
- structural-instruction-harnesses
- shell-ci-formal-harness
- qwen-devin-kimi-structural
- provider-hosted-surfaces
- account-backed-runtime-proof
phases:
  ratchet-baseline:
    status: done
    acceptance:
    - acc_fail_new_passes
    - broad_local_defaults_block_new_surfaces
  structural-instruction-harnesses:
    status: in_progress
    implemented_harnesses:
    - aider
    - amp-code
    - augment-code
    - cline
    - continue-dev
    - cursor
    - factory-droid
    - gemini-cli
    - goose
    - jetbrains-junie
    - kilo-code
    - opencode
    - qoder
    - vscode-copilot
    - warp
    - zed-ai
    acceptance:
    - acc_default_full_projection_counts
    - agents_md_native_projection_tests
    - behavior_tests_assert_generated_files
    - cos_init_temp_project_projection
    - gemini_cli_projection_tests
    - rules_mcp_structural_projection_tests
  shell-ci-formal-harness:
    status: done
    acceptance:
    - first_class_harness_or_equivalent_acc_adapter
    - workflow_syntax_tests
    - command_smoke_tests
    implemented_harnesses:
    - shell-ci
  qwen-devin-kimi-structural:
    status: in_progress
    candidate_harnesses:
    - devin
    acceptance:
    - primary_docs_confirm_project_local_config
    - temp_project_projection_driver
    - automated_structural_tests
    implemented_harnesses:
    - kimi-code
    - qwen-code
  provider-hosted-surfaces:
    status: planned
    candidate_harnesses:
    - deepseek-provider
    - google-antigravity
    - kiro
    - minimax-maxclaw
    acceptance:
    - provider_or_hosted_boundary_documented
    - no_ide_projection_claim_without_local_config
  account-backed-runtime-proof:
    status: planned
    candidate_harnesses:
    - aider
    - amp-code
    - augment-code
    - cline
    - continue-dev
    - cursor
    - factory-droid
    - gemini-cli
    - goose
    - jetbrains-junie
    - kilo-code
    - kimi-code
    - opencode
    - qoder
    - qwen-code
    - vscode-copilot
    - warp
    - devin
    - zed-ai
    acceptance:
    - optional_manual_runtime_smoke
    - reports_capture_account_boundary
    - not_required_for_default_ci
