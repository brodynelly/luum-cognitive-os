# ---------------------------------------------------------------------------
# Evolve Loop Spike (ADR-262) — opt-in, disabled by default during spike window
# ---------------------------------------------------------------------------
evolve:
  enabled: false          # spike mode: opt-in. Set to true to activate LLM extraction.
  cadence_turns: 4        # calibrated to luum session lengths from skill-events.jsonl
  confidence_threshold: 0.70  # tighter than baseline 0.72 to reduce false-positive proposals
  queue_cap: 50           # hard cap on pending proposals


# ADR-263 — Tool-Replay Budget Ledger (per-session cap + PREVIEW/REFERENCE_ONLY modes)
tool_replay_ledger:
  enabled: true
  char_cap_per_session: 20000
  item_cap_per_session: 10
  ttl_hours: 4
  max_tracked_ledgers: 64
  spillover_dir: .cognitive-os/sessions/{session_id}/spillover
  metric_log: .cognitive-os/metrics/tool-replay-ledger.jsonl

# ---------------------------------------------------------------------------
# Scheduled Tasks — Phase 4 of headless-self-improvement-proposer-plan.md
# ADR-201 gate: all scheduled runners MUST use --propose-only.
# No task here may auto-merge, auto-promote, or mutate runtime surfaces.
# ---------------------------------------------------------------------------
scheduled_tasks:
  self_improvement_proposer:
    # Cron schedule: weekly, Sunday at 02:00 UTC
    # Override via SELF_IMPROVEMENT_CRON env var or by editing this key.
    cron: "0 2 * * 0"
    script: scripts/cos-self-improvement-runner
    args:
      - --propose-only
      - --write
      - --profile
      - core
    # propose-only guarantee (ADR-201): no promotion, no merge, no mutation.
    propose_only: true
    human_approval_required: true
    output_dir: .cognitive-os/improvements/proposals
    # Runner stops if cos-boring-reliability returns non-zero.
    reliability_gate: true
    enabled: true
