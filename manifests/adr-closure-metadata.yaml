schema_version: 1
source: docs/SESSION-ADR-CLOSURE-2026-05-04.md
scope: ADR implementation closure metadata consumed by scripts/adr_implementation_ledger.py
closure_classes:
  evidence-only: Implementation exists or ADR is historically satisfied; close by evidence/status reconciliation rather than
    runtime changes.
  absorbed: Useful decision intent is covered by later ADRs or current architecture; do not revive the old implementation
    shape.
  superseded: A later ADR explicitly replaces this ADR.
  obsolete-by-context: The ADR solved a historical context that no longer applies.
  deferred: Still valid enough to preserve, but intentionally not current implementation work until the re-entry trigger occurs.
  implement-current: Still-current implementation work; ledger should continue surfacing it as attention.
