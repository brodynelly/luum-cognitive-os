schema_version: state-retention.v1
review_date: 2026-05-06
purpose: >
  Registry of mutable Cognitive OS state surfaces and their retention policy.
  Every new ledger, artifact pool, lock, or cache must declare how it is bounded,
  who owns liveness, and which reaper path prevents self-bite accumulation.
required_surface_fields:
  - id
  - kind
  - path
  - max_age
  - max_count
  - reaper
  - retention_mode
  - tombstone
  - owner_pid
  - owner_files
  - documentation
kinds:
  ledger: Append-only or mostly append-only records whose historical value decays.
  artifact-pool: Runtime artifacts created generously to preserve operator work.
  lock: Coordination state that must not outlive the owning process/session.
  cache: Derived state that can be regenerated.
reapers:
  session-end: Runs from the Stop/session-end path.
  session-start: Runs before a new session resumes work.
  manual: Operator-triggered cleanup command.
  repair-before-block: Runs only when a blocking preflight can be safely repaired before failing.
  auto-on-create-plus-one: Creator path also prunes older matching entries.
  rotation: Size/count-bounded log rotation.
retention_modes:
  observe: Audit-only; never selected by automatic execute paths.
  repair-safe: Mature archive-first cleanup allowed in session-end auto-safe mode.
  repair-before-block: Mature archive-first cleanup allowed once before an otherwise blocking preflight.
surfaces:
  - id: auto-pre-agent-stashes
    kind: artifact-pool
    path: git:refs/stash
    selector:
      subjects:
        - auto-pre-agent-
        - auto-pre-agent-toolu_
    max_age: P1H
    max_count: 2
    reaper: repair-before-block
    retention_mode: repair-before-block
    tombstone: archive-ref-and-patch
    owner_pid: false
    owner_files:
      - hooks/pre-agent-snapshot.sh
      - hooks/post-agent-snapshot-restore.sh
      - scripts/state_retention_audit.py
    documentation:
      - docs/reports/session-self-bite-pattern-2026-05-06.md
      - docs/adrs/ADR-199-state-retention-policy-and-reaper-protocol.md
    rationale: >
      These stashes preserve WIP before agent launches. They must be archived
      before removal because stash indices are mutable and may contain valuable work.
      The reaper field names the trigger point; retention_mode controls whether
      the controller may execute it automatically.

  - id: task-claims-ledger
    kind: ledger
    path: .cognitive-os/tasks/active-claims.json
    selector:
      terminal_statuses:
        - released
        - completed
        - stale
    max_age: P24H
    max_count: 100
    reaper: session-end
    retention_mode: repair-safe
    tombstone: compact-in-place
    owner_pid: false
    owner_files:
      - scripts/cos_task_claims.py
      - hooks/agent-prelaunch.sh
      - scripts/state_retention_audit.py
    documentation:
      - docs/adrs/ADR-199-state-retention-policy-and-reaper-protocol.md
    rationale: >
      Released claims should prove recent coordination but should not grow every
      time a blocked Agent launch releases its claim.

  - id: active-tasks-ledger
    kind: ledger
    path: .cognitive-os/tasks/active-tasks.json
    selector:
      terminal_statuses:
        - completed
        - completed-by-watermark
        - cancelled-zombie
        - cancelled-stale
    max_age: P7D
    max_count: 250
    reaper: session-end
    retention_mode: observe
    tombstone: compact-in-place
    owner_pid: true
    owner_files:
      - hooks/agent-prelaunch.sh
      - scripts/so-reaper.sh
      - scripts/state_retention_audit.py
    documentation:
      - docs/adrs/ADR-119-session-filesystem-reaper.md
      - docs/adrs/ADR-199-state-retention-policy-and-reaper-protocol.md
    rationale: >
      Current and recent task records are useful; stale terminal records should
      not make every status/read path slower. This remains observe until owner_pid
      liveness and task archival semantics are separately proven.

  - id: agent-bus-directories
    kind: artifact-pool
    path: .cognitive-os/agent-bus/*
    max_age: P24H
    max_count: 100
    reaper: session-end
    retention_mode: repair-safe
    tombstone: archive-directory
    owner_pid: false
    owner_files:
      - hooks/native-agent-heartbeat.sh
      - scripts/state_retention_audit.py
    documentation:
      - docs/adrs/ADR-033-native-agent-heartbeat.md
      - docs/adrs/ADR-199-state-retention-policy-and-reaper-protocol.md
    rationale: >
      Per-agent bus folders are useful while debugging recent agent runs but
      should not accumulate across many sessions without an archive boundary.

  - id: metrics-jsonl
    kind: ledger
    path: .cognitive-os/metrics/*.jsonl
    max_age: P7D
    max_count: unbounded-with-rotation
    reaper: rotation
    retention_mode: observe
    tombstone: archive-file
    owner_pid: false
    owner_files:
      - hooks
      - scripts
      - scripts/state_retention_audit.py
    documentation:
      - docs/adrs/ADR-199-state-retention-policy-and-reaper-protocol.md
    rationale: >
      Metrics are append-only evidence. They need rotation rather than deletion
      so observability remains useful without making local scans expensive.

  - id: performance-ledger-artifacts
    kind: cache
    path: .cognitive-os/ledgers/performance-ledger.sqlite
    max_age: P30D
    max_count: 1
    reaper: manual
    retention_mode: observe
    tombstone: regenerate-from-source-metrics
    owner_pid: false
    owner_files:
      - lib/performance_ledger.py
      - scripts/cos-performance-ledger
    documentation:
      - docs/adrs/ADR-201-maintainer-agent-telemetry-promotion-loop.md
    rationale: >
      The Performance Ledger SQLite store is derived from reward-signal metrics.
      It should be bounded to a single local cache file and regenerated rather
      than copied across hosts without ADR-202 classification and provenance.

  - id: performance-ledger-latest-report
    kind: cache
    path: .cognitive-os/reports/performance-ledger-latest.json
    max_age: P7D
    max_count: 1
    reaper: manual
    retention_mode: observe
    tombstone: regenerate-from-source-metrics
    owner_pid: false
    owner_files:
      - lib/performance_ledger.py
      - scripts/cos-performance-ledger
    documentation:
      - docs/adrs/ADR-201-maintainer-agent-telemetry-promotion-loop.md
    rationale: >
      The latest report is a derived summary for operators and service-mode
      gates. It is intentionally replace-in-place and should not accumulate.


  - id: run-flight-recorder-traces
    kind: artifact-pool
    path: .cognitive-os/runs/*/trace.json
    max_age: P7D
    max_count: 100
    reaper: manual
    retention_mode: observe
    tombstone: archive-file
    owner_pid: false
    owner_files:
      - lib/trace_joiner.py
      - scripts/cos-run-trace
    documentation:
      - docs/adrs/ADR-205-cross-stream-trace-joiner-and-flight-recorder.md
    rationale: >
      Run traces are derived observability artifacts for service-mode debugging.
      They retain refs to private content instead of raw payloads and should be
      bounded before any cloud/service projection.

  - id: run-flight-recorder-latest-report
    kind: cache
    path: .cognitive-os/reports/run-trace-latest.json
    max_age: P7D
    max_count: 1
    reaper: manual
    retention_mode: observe
    tombstone: regenerate-from-source-metrics
    owner_pid: false
    owner_files:
      - lib/trace_joiner.py
      - scripts/cos-run-trace
    documentation:
      - docs/adrs/ADR-205-cross-stream-trace-joiner-and-flight-recorder.md
    rationale: >
      The latest run trace report is a derived operator summary and should be
      replaced in place rather than accumulating.

  - id: runtime-locks
    kind: lock
    path: .cognitive-os/runtime/*.lock*
    max_age: P1H
    max_count: 25
    reaper: session-start
    retention_mode: observe
    tombstone: drop-if-owner-dead
    owner_pid: true
    owner_files:
      - hooks/_lib/stash-lock.sh
      - hooks/validation-lock-cleanup.sh
      - scripts/state_retention_audit.py
    documentation:
      - docs/adrs/ADR-117-stash-mutation-reversibility.md
      - docs/adrs/ADR-199-state-retention-policy-and-reaper-protocol.md
    rationale: >
      Locks protect concurrency only while their owner lives. Stale locks turn
      safety into a single-point-of-failure.

  - id: preserve-worktrees
    kind: artifact-pool
    path: git:worktree
    selector:
      branch_patterns:
        - codex/preserve-
        - preserve/
    max_age: P24H
    max_count: 5
    reaper: manual
    retention_mode: observe
    tombstone: archive-manifest-first
    owner_pid: false
    owner_files:
      - scripts/cos_work_inventory.py
      - scripts/cos_cleanup_preserved_wip.py
      - scripts/state_retention_audit.py
    documentation:
      - docs/adrs/ADR-129-safe-worktree-removal.md
      - docs/adrs/ADR-199-state-retention-policy-and-reaper-protocol.md
    rationale: >
      Preserved worktrees are intentional safety artifacts, but each must have
      an intake/cleanup path before it becomes dispatch friction.
