[project]
name = "luum-cognitive-os"
version = "0.12.0"
description = "Luum Cognitive OS — agent orchestration, memory, and tooling"
requires-python = ">=3.11"
dependencies = [
    "pyyaml>=6.0",
    "jinja2>=3.1",
]

[project.optional-dependencies]
llm = [
    "litellm>=1.0",
    # redis client speaks the Valkey wire protocol; Valkey (fork of Redis 7.2.4)
    # is the server running in OrbStack (see rules/orchestrator-mode.md).
    # The `valkey` Python package was redundant — code uses `import redis`.
    "redis>=5.0.0",
]
web = [
    "fastapi>=0.100",
    "uvicorn>=0.23",
]
observability = [
    "opik>=1.0",
    "langfuse>=3.0",
    # mlflow-skinny: lightweight mlflow without pyarrow/pandas (which fail on Python 3.14).
    # Use mlflow-skinny for tracking/observability; full mlflow requires pyarrow to build.
    "mlflow-skinny>=2.0",
]
memory = [
    "cognee>=0.1",
]
guardrails = [
    "nemoguardrails",
]
jupyter = [
    "jupyter",
    "notebook",
]
crawling = [
    "crawl4ai>=0.8.0",
]
testing = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-timeout>=2.2",
    "pytest-xdist>=3.5",
    "mutmut>=3.0",
    "pytest-smell>=1.0",
    # testcontainers: used for ephemeral Valkey in @pytest.mark.integration tests.
    # RedisContainer("valkey/valkey:7.2.4") provides an isolated Valkey instance
    # so integration tests don't depend on OrbStack being up.
    # NOTE: The orchestrator Valkey-bridge test (heartbeat → MetricEvent JSONL) was
    # evaluated but not implemented with testcontainers: it would require spawning a
    # real sub-Claude to produce heartbeats, which is expensive and out of scope.
    # testcontainers is included so future integration tests (e.g. agent_bus pub/sub)
    # can use it without a pyproject.toml change.
    "testcontainers[redis]>=4.0",
]
security = [
    # semgrep: install via `brew install semgrep` or `pip install semgrep`
    # garak: install via `pip install garak` (heavy dep, not locked here)
]
enforcement = [
    "pre-commit>=4.0",
    "ruff>=0.9.0",
    "vulture>=2.14",
    "import-linter>=2.0",
    "pytest-cov>=6.0",
    "diff-cover>=9.0",
]
dev = [
    "luum-cognitive-os[llm,web,observability,memory,guardrails,jupyter,crawling,testing,enforcement]",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
timeout = 10
addopts = "-n auto --dist worksteal -q"
markers = [
    "unit: Unit tests",
    "behavior: Behavior tests",
    "integration: Integration tests",
    "system: System tests",
    "docker: Requires Docker",
    "slow: Slow tests",
    "e2e: End-to-end tests",
]

[tool.ruff]
target-version = "py311"
line-length = 120
select = ["F401", "F841", "E711", "E712"]

[tool.vulture]
min_confidence = 80
paths = ["lib/"]

[tool.mutmut]
paths_to_mutate = ["lib/"]
test_command = "python -m pytest tests/unit/test_rate_limiter.py -x -q --no-header -p no:timeout -c /dev/null"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["lib"]
