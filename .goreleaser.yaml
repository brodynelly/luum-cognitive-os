version: 2

project_name: cognitive-os

before:
  hooks:
    - sh -c "cd cmd/cos && go test ./..."

builds:
  - id: cos
    dir: cmd/cos
    main: .
    binary: cos
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X luum-agent-os/cmd/cos/internal/cli.Version={{ .Version }}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: cos
    ids:
      - cos
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - LICENSE*
      - README.md
      - cognitive-os.yaml
      - scripts/**
      - hooks/**
      - rules/**
      - skills/**
      - templates/**
      - manifests/**
      - docs/00-MOCs/entrypoints/quickstart.md
      - docs/00-MOCs/entrypoints/getting-started.md

checksum:
  name_template: checksums.txt

snapshot:
  version_template: '{{ incpatch .Version }}-next'

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'

homebrew_casks:
  - name: cognitive-os
    ids:
      - cos
    repository:
      owner: Luum-Home
      name: homebrew-tap
      token: '{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}'
    directory: Casks
    homepage: https://github.com/Luum-Home/luum-cognitive-os
    description: Portable AI Agent Operating System — memory, quality gates, self-healing
    caveats: >-
      Cognitive OS is distributed under FSL-1.1-MIT, which is source-available and not represented by a Homebrew Cask SPDX license stanza. See LICENSE in the archive.
    binaries:
      - cos
