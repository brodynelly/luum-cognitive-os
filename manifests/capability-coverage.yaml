    reality_level: REAL
    public_claim: false
    primitive_types: [lib, protocol]
    implementation: [lib/handoff_envelope.py, lib/handoff_dispatcher.py]
    consumers: [scripts/cos]
    tests: [tests/unit/test_handoff_dispatcher.py, tests/behavior/test_handoff_dispatcher_flow.py, tests/chaos/test_handoff_receiver_kill_mid_dispatch.py]
    receipts: [handoff-receipt, handoff-cycle-detected]
    control_plane_audits: [agent-orchestration-boundary]
    known_gaps: []

