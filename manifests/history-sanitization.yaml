schema_version: history-sanitization/v1
status: active
owner: platform-safety
purpose: >
  Pre-public history sanitization policy for sensitive operator data and local
  machine paths. Dry-run is safe; execute is operator-only and destructive.

toolchain:
  primary: git-filter-repo
  install_hint: bash scripts/install-git-filter-repo.sh

rules:
  - id: operator-email
    mode: literal
    value_env: COS_HISTORY_SANITIZE_OPERATOR_EMAIL
    replacement: 2144218+MatiasNAmendola@users.noreply.github.com
    required: false
    rationale: Replace operator personal email in historical blobs without committing the raw email into this manifest.
  - id: operator-name
    mode: literal
    value_env: COS_HISTORY_SANITIZE_OPERATOR_NAME
    replacement: Maintainer
    required: false
    rationale: Replace operator personal name in historical commit metadata and blobs without committing the raw name into this manifest.
  - id: operator-home-prefix
    mode: literal
    value_env: COS_HISTORY_SANITIZE_HOME_PREFIX
    replacement: <home>
    required: false
    rationale: Replace machine-specific home directory prefixes in historical blobs.
  - id: repo-absolute-path
    mode: literal
    value_env: COS_HISTORY_SANITIZE_REPO_PATH
    replacement: <repo>
    required: false
    rationale: Replace absolute local repository paths in historical blobs.

  # Consumer-project leak rules (added 2026-05-07).
  # Each value comes from an env var so the manifest does not commit the
  # actual codename. The codename pre-existed in this repo's history because
  # it bled in from a consumer project before the project-specific terms hook
  # was config-driven. Operator runs the rewrite once with the env vars set
  # to the real codenames and replaces them with stable generic placeholders.
  - id: consumer-codename-a
    mode: literal
    value_env: COS_HISTORY_SANITIZE_CONSUMER_CODENAME_A
    replacement: <consumer-codename-a>
    required: false
    rationale: Replace consumer-project codename A leaked into history before Gate-1 hook was config-driven.
  - id: consumer-codename-b
    mode: literal
    value_env: COS_HISTORY_SANITIZE_CONSUMER_CODENAME_B
    replacement: <consumer-codename-b>
    required: false
    rationale: Replace consumer-project codename B leaked into history.
  - id: consumer-codename-c
    mode: literal
    value_env: COS_HISTORY_SANITIZE_CONSUMER_CODENAME_C
    replacement: <consumer-codename-c>
    required: false
    rationale: Replace consumer-project codename C (and its hyphenated variant via separate env-var if needed) leaked into history.
  - id: consumer-service-name
    mode: literal
    value_env: COS_HISTORY_SANITIZE_CONSUMER_SERVICE
    replacement: <consumer-service>
    required: false
    rationale: Replace consumer-project service name used in worked examples (workflows/, docs/hooks.md, packages/verification-audit/, tests/arena/) before the rename to a generic service name landed.
  - id: consumer-service-name-2
    mode: literal
    value_env: COS_HISTORY_SANITIZE_CONSUMER_SERVICE_2
    replacement: <consumer-service-2>
    required: false
    rationale: Second consumer-project service slot. Tier 1-4 audit (2026-05-07) revealed 256 history references across 5 distinct consumer service names; one slot is insufficient.
  - id: consumer-service-name-3
    mode: literal
    value_env: COS_HISTORY_SANITIZE_CONSUMER_SERVICE_3
    replacement: <consumer-service-3>
    required: false
    rationale: Third consumer-project service slot.
  - id: consumer-service-name-4
    mode: literal
    value_env: COS_HISTORY_SANITIZE_CONSUMER_SERVICE_4
    replacement: <consumer-service-4>
    required: false
    rationale: Fourth consumer-project service slot.
  - id: consumer-service-name-5
    mode: literal
    value_env: COS_HISTORY_SANITIZE_CONSUMER_SERVICE_5
    replacement: <consumer-service-5>
    required: false
    rationale: Fifth consumer-project service slot. Multiple slots cover the private service-name set found by the Tier 1-4 audit without committing those raw values to this manifest.

sensitive_history_patterns:
  - id: macos-user-home-path
    mode: regex
    pattern: /U[s]ers/[^/ ]+
    severity: warn
    rationale: Local user home paths should not appear in public history.
  - id: env-file-reference
    mode: regex
    pattern: (^|/|\s)\.env($|\s)
    severity: warn
    rationale: History references to env files need review before publication.

preserve:
  - id: license-transition
    mode: regex
    pattern: Apache License|Apache 2\.0|Apache-2\.0|FSL-1\.1|FSL-1\.1-MIT|Functional Source License
    rationale: License-transition evidence is legal/product history; do not auto-scrub unless operator deliberately chooses clean-root public history.
  - id: scanner-fixtures
    mode: regex
    pattern: \[REDACTED\]|deadbeef|FAKEKEYFORTEST
    rationale: Test fixtures and positive controls must not be sanitized as real secrets.

backup:
  require_backup_first: true
  destination_template: .cognitive-os/recovery/pre-history-sanitization-{timestamp}.git

execution:
  require_env: COS_ALLOW_DESTRUCTIVE_GIT
  require_env_value: "1"
  require_interactive_confirmation: true
  allow_in_service_mode: false
