schema_version: feature-tool-due-diligence/v1
status: active
owner: platform-safety
policy:
  build_requires_due_diligence: true
  require_external_candidates: true
  require_source_links: true
  require_benchmark_or_rationale: true
  scratch_cache: .cognitive-os/external-source-cache
  deepwiki_url_template: https://deepwiki.com/{owner}/{repo}
  external_health_sources:
    deps_dev: https://docs.deps.dev/api/v3/
    openssf_scorecard: https://github.com/ossf/scorecard
features:
  - capability_id: skill-router-retrieval-boundary
    feature_label: Skill router retrieval and adapter boundary
    owner_adr: ADR-250
    decision: BUILD
    rationale: COS owns dangerous-skill rejection and governance semantics; external retrieval can inform adapters but not own routing policy.
    maintenance_cost: medium
    benchmark: manifests/skill-router-retrieval.yaml
    candidates:
      - tool_id: dspy
        verdict: INTEGRATE
        source_links: [https://github.com/stanfordnlp/dspy]
        deepwiki_url: https://deepwiki.com/stanfordnlp/dspy
        license: MIT
        reason_not_build_replacement: Optimizes typed LM programs, not policy-owned runtime skill routing.
      - tool_id: superpowers
        verdict: INTEGRATE
        source_links: [https://github.com/obra/superpowers]
        deepwiki_url: https://deepwiki.com/obra/superpowers
        license: UNKNOWN
        reason_not_build_replacement: Methodology source for skills, not COS router implementation.
  - capability_id: agent-orchestration-boundary
    feature_label: Agent orchestration governance boundary
    owner_adr: ADR-251
    decision: BUILD
    rationale: COS owns worktree, ownership, claims, receipts, and release-freeze semantics; frameworks remain adapters/lab-only.
    maintenance_cost: high
    benchmark: manifests/agent-orchestration-adapters.yaml
    candidates:
      - tool_id: langgraph
        verdict: INTEGRATE
        source_links: [https://github.com/langchain-ai/langgraph]
        deepwiki_url: https://deepwiki.com/langchain-ai/langgraph
        license: MIT
        reason_not_build_replacement: Useful workflow framework but does not own local worktree/branch/release governance.
      - tool_id: autogen
        verdict: DEFER
        source_links: [https://github.com/microsoft/autogen]
        deepwiki_url: https://deepwiki.com/microsoft/autogen
        license: MIT
        reason_not_build_replacement: Multi-agent framework is heavier than local-first governance layer.
  - capability_id: capability-coverage-matrix
    feature_label: Capability coverage and feature reality ledger
    owner_adr: ADR-252
    decision: BUILD
    rationale: COS-specific claim/reality ledger maps ADRs, implementations, tests, receipts, and public claims; external tools provide health signals but not this semantic join.
    maintenance_cost: medium
    benchmark: manifests/capability-coverage.yaml
    candidates:
      - tool_id: openssf-scorecard
        verdict: INTEGRATE
        source_links: [https://github.com/ossf/scorecard]
        deepwiki_url: https://deepwiki.com/ossf/scorecard
        license: Apache-2.0
        reason_not_build_replacement: Scores OSS health; does not map COS feature reality to ADR/test/receipt truth.
      - tool_id: deps-dev
        verdict: INTEGRATE
        source_links: [https://github.com/google/deps.dev, https://docs.deps.dev/api/v3/]
        deepwiki_url: https://deepwiki.com/google/deps.dev
        license: Apache-2.0
        reason_not_build_replacement: Provides package metadata; not COS capability truth.
  - capability_id: web-automation-adapter
    feature_label: Web automation adapter for LLM-driven browser tasks
    owner_adr: ADR-288
    decision: INTEGRATE
    rationale: Browser automation for LLM agents is a solved problem with mature OSS; building a Playwright wrapper from scratch would reinvent the accessibility-tree + replan-loop primitives that browser-use already provides. COS retains governance via adapter (kill switch, cost tracking, event bus, dispatch router).
    maintenance_cost: low
    benchmark: docs/02-Decisions/adrs/ADR-288-web-automation-adapter-for-dispatch.md
    candidates:
      - tool_id: browser-use
        verdict: INTEGRATE
        source_links: [https://github.com/browser-use/browser-use]
        deepwiki_url: https://deepwiki.com/browser-use/browser-use
        license: MIT
        reason_not_build_replacement: Standard-of-facto for LLM-driven web automation (93.7k stars, mature accessibility-tree + replan-loop primitives). Adopting saves 8-12 weeks vs. rolling a Playwright wrapper.
      - tool_id: playwright-python
        verdict: DEFER
        source_links: [https://github.com/microsoft/playwright-python]
        deepwiki_url: https://deepwiki.com/microsoft/playwright-python
        license: Apache-2.0
        reason_not_build_replacement: Low-level browser driver; would require building all LLM-optimization layers on top.
      - tool_id: ui-tars-desktop
        verdict: DEFER
        source_links: [https://github.com/bytedance/UI-TARS-desktop]
        deepwiki_url: https://deepwiki.com/bytedance/UI-TARS-desktop
        license: Apache-2.0
        reason_not_build_replacement: Desktop GUI agent (Electron+VLM); orthogonal to web automation use case.
  - capability_id: agent-runtime-web-service
    feature_label: Agent runtime exposed as HTTP+SSE web service
    owner_adr: ADR-291
    decision: BUILD
    rationale: COS owns the agent runtime semantics, governance, claims, and provenance; the web service layer is a thin protocol facade in front of the runtime. FastAPI/uvicorn/pydantic are de-facto Python primitives for HTTP+SSE+contract validation; using them is implementation detail of the build, not adoption of an external runtime.
    maintenance_cost: low
    benchmark: docs/02-Decisions/adrs/ADR-291-agent-runtime-web-service.md
    candidates:
      - tool_id: fastapi
        verdict: INTEGRATE
        source_links: [https://github.com/tiangolo/fastapi]
        deepwiki_url: https://deepwiki.com/tiangolo/fastapi
        license: MIT
        reason_not_build_replacement: De-facto Python ASGI framework with automatic OpenAPI; building HTTP+SSE+OpenAPI from stdlib is wasted effort.
      - tool_id: uvicorn
        verdict: INTEGRATE
        source_links: [https://github.com/encode/uvicorn]
        deepwiki_url: https://deepwiki.com/encode/uvicorn
        license: BSD-3-Clause
        reason_not_build_replacement: Reference ASGI server for FastAPI; no realistic alternative for production.
      - tool_id: pydantic
        verdict: INTEGRATE
        source_links: [https://github.com/pydantic/pydantic]
        deepwiki_url: https://deepwiki.com/pydantic/pydantic
        license: MIT
        reason_not_build_replacement: De-facto Python type-validation library bundled with FastAPI; alternative would mean rewriting all request/response schemas from scratch.
      - tool_id: grpc
        verdict: DEFER
        source_links: [https://github.com/grpc/grpc]
        deepwiki_url: https://deepwiki.com/grpc/grpc
        license: Apache-2.0
        reason_not_build_replacement: Lower web/mobile client adoption; requires proto codegen pipeline; rejected in ADR-291 alternatives.
  - capability_id: python-typecheck-agentic-loop
    feature_label: Python type checking for agentic loops
    owner_adr: radar-pyrefly-2026-05-15
    decision: TRIAL
    rationale: COS has Ruff and pytest but no first-class Python static type/API-shape gate. Pyrefly is fast, MIT-licensed, stable, and has upstream guidance for agentic loops. The first SO run produced useful signal but a large baseline, so it starts advisory.
    maintenance_cost: low
    benchmark: docs/06-Daily/reports/external-tools-radar-pyrefly-addendum-2026-05-15.md
    candidates:
      - tool_id: pyrefly
        verdict: TRIAL
        source_links: [https://github.com/facebook/pyrefly, https://pyrefly.org/blog/pyrefly-agentic-loop/]
        deepwiki_url: https://deepwiki.com/facebook/pyrefly
        license: MIT
        reason_not_build_replacement: Python type checking is commodity developer tooling; COS should own policy, receipts, and ratchets rather than build a type checker.
      - tool_id: mypy
        verdict: ASSESS
        source_links: [https://github.com/python/mypy]
        deepwiki_url: https://deepwiki.com/python/mypy
        license: MIT
        reason_not_build_replacement: Mature checker but not selected for this pilot because Pyrefly has current agentic-loop guidance and faster initial local runs.
      - tool_id: pyright
        verdict: ASSESS
        source_links: [https://github.com/microsoft/pyright]
        deepwiki_url: https://deepwiki.com/microsoft/pyright
        license: MIT
        reason_not_build_replacement: Mature checker; keep as comparison candidate after Pyrefly baseline triage.

