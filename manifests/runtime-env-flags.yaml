schema_version: runtime-env-flags.v1
review_date: 2026-05-05
purpose: Public runtime environment flag registry for Cognitive OS skip, disable,
  bypass, allow, force, run, dry-run, mock, and opt-in controls. This registry starts
  with the flag families that are already documented or newly promoted to public operator
  controls; it is not an exhaustive grep dump of every local variable.
required_flag_fields:
- name
- family
- default
- allowed_values
- owner_files
- documentation
- risk_level
- bypasses_safety_primitive
families:
  hook-suppression: Per-hook session suppression for registered hooks.
  llm-dispatch: Provider routing and fallback controls.
  startup-safe-mode: Startup circuit breaker and SessionStart suppression.
  test-opt-in: Heavy, Docker, external-service, or cost-bearing test lane opt-ins.
  safety-bypass: Explicit operator bypasses for safety primitives.
  optional-service: Optional scanner, daemon, gateway, or integration enablement.
  watchdog-observability: Watchdog and hot-path observability controls.
  secret-loading: Controls whether local development secret files may be loaded.
risk_levels:
  low: Does not bypass safety or trigger external cost.
  medium: Changes runtime behavior, may hide diagnostics, or controls optional services.
  high: Bypasses safety, may affect credentials, destructive operations, or provider
    cost.
flags:
- name: COS_SKIP_DOTENV
  family: secret-loading
  default: '0'
  allowed_values:
  - '0'
  - '1'
  - 'true'
  - 'false'
  - 'yes'
  - 'no'
  - 'on'
  - 'off'
  owner_files:
  - scripts/smoke-qwen-fallback.sh
  - lib/qwen_provider.py
  documentation:
  - docs/runtime-env-flags.md
  - docs/runbooks/llm-dispatch.md
  risk_level: medium
  bypasses_safety_primitive: false
  description: When truthy, Qwen live-smoke paths must not load repo-local .env and
    must rely only on already-exported environment variables. This exists so agents
    can run live smokes without indirectly touching blocked secret files.
- name: COS_ALLOW_CREDENTIAL_SAFE_ENV
  family: secret-loading
  default: '0'
  allowed_values:
  - '0'
  - '1'
  owner_files:
  - scripts/cos-credential-safe-run
  - scripts/cos_credential_safe_run.py
  documentation:
  - docs/runtime-env-flags.md
  - docs/manual-tests/credential-safe-script-runner.md
  risk_level: high
  bypasses_safety_primitive: false
  description: Explicit operator approval flag for allowlisted credential-safe scripts
    that read selected values from a local env file without exposing secret values
    to stdout, stderr, or audit artifacts.
- name: DISABLE_HOOK_*
  family: hook-suppression
  default: unset
  allowed_values:
  - 'true'
  - '1'
  owner_files:
  - hooks/_lib/common.sh
  - rules/hook-security-profiles.md
  documentation:
  - rules/hook-security-profiles.md
  risk_level: high
  bypasses_safety_primitive: true
  description: Per-session hook suppression pattern implemented by check_disabled_env.
- name: COS_DISABLE_QWEN
  family: llm-dispatch
  default: '0'
  allowed_values:
  - '0'
  - '1'
  owner_files:
  - scripts/orchestrator.py
  documentation:
  - rules/llm-dispatch.md
  - docs/runbooks/llm-dispatch.md
  risk_level: medium
  bypasses_safety_primitive: false
  description: Skip Qwen as an LLM dispatch provider.
- name: COS_FORCE_CLAUDE_PRIMARY
  family: llm-dispatch
  default: '0'
  allowed_values:
  - '0'
  - '1'
  owner_files:
  - scripts/orchestrator.py
  documentation:
  - rules/llm-dispatch.md
  - docs/runbooks/llm-dispatch.md
  risk_level: medium
  bypasses_safety_primitive: false
  description: Force Claude-first routing for LLM dispatch.
- name: COS_DISABLE_LLM_FALLBACK
  family: llm-dispatch
  default: '0'
  allowed_values:
  - '0'
  - '1'
  owner_files:
  - scripts/orchestrator.py
  - scripts/smoke-qwen-fallback.sh
  documentation:
  - rules/llm-dispatch.md
  - docs/runbooks/llm-dispatch.md
  risk_level: medium
  bypasses_safety_primitive: false
  description: Disable fallback cascade and surface provider errors directly.
- name: COS_STARTUP_SAFE_MODE
  family: startup-safe-mode
  default: '0'
  allowed_values:
  - '0'
  - '1'
  owner_files:
  - hooks/session-init.sh
  documentation:
  - docs/adrs/ADR-104-startup-circuit-breaker.md
  risk_level: medium
  bypasses_safety_primitive: false
  description: Skip heavy SessionStart hook bodies during startup incident recovery.
- name: COS_DISABLE_SESSIONSTART_HOOKS
  family: startup-safe-mode
  default: '0'
  allowed_values:
  - '0'
  - '1'
  owner_files:
  - hooks/session-init.sh
  documentation:
  - docs/adrs/ADR-104-startup-circuit-breaker.md
  risk_level: medium
  bypasses_safety_primitive: false
  description: Disable SessionStart hook bodies for startup circuit breaker recovery.
- name: COS_RUN_HEADLESS_SERVICE_DOCKER
  family: test-opt-in
  default: '0'
  allowed_values:
  - '0'
  - '1'
  owner_files:
  - tests/integration/test_headless_service_drill.py
  documentation:
