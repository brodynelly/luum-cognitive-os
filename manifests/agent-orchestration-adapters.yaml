schema_version: agent-orchestration-adapters/v1
status: active
owner: platform-orchestration
purpose: 'Keep agent orchestration behind explicit adapters so COS owns governance,
  safety, ownership, release freeze, receipts, budgets, and telemetry while community
  orchestration frameworks can be adopted without becoming the hot-path source of
  truth.

  '
policy:
  default_adapter: cos_file_ipc_minimal
  core_must_not_import_optional_orchestration_stacks: true
  orchestration_frameworks_are_adapters: true
  cos_owns:
  - policy_and_safety_gates
  - ownership_and_liveness
  - release_freeze
  - event_receipts
  - budget_retry_circuit_breaker
  - telemetry_and_remediation_queue
  - cross_harness_normalization
  launch_paths_must_pass:
  - ADR-223
  - ADR-246
  handoff_paths_must_pass:
  - ADR-230
  - ADR-233
  provider_calls_must_pass:
  - ADR-228
forbidden_core_imports:
- module: langgraph
  rationale: optional state-graph framework; use adapter/lab only
- module: autogen
  rationale: optional multi-agent framework; use adapter/lab only
- module: crewai
  rationale: optional crew/flow framework; use adapter/lab only
- module: openai_agents
  rationale: optional provider framework; use adapter/lab only
- module: agents
  rationale: ambiguous provider framework root; use adapter/lab only
- module: semantic_kernel
  rationale: optional agent/orchestration framework; use adapter/lab only
adapters:
- id: cos_agent_reflection
  status: active
  default: false
  implementation:
  - lib/agent_reflection.py
  license_spdx: project
  footprint: zero-extra-deps-local
  hot_path_allowed: false
  community_pattern: iterative LLM self-critique loop with min/max iterations and structured output verdict (ADR-290 §5)
  benchmark_required: false
- id: cos_file_ipc_minimal
  status: active
  default: true
  implementation:
  - lib/agent_team.py
  - lib/agent_team_transport.py
  license_spdx: project
  footprint: zero-extra-deps-local-file-ipc
  hot_path_allowed: true
  community_pattern: file-backed local-first session/team coordination
  benchmark_required: true
- id: cos_handoff_envelope
  status: active
  default: false
  implementation:
  - lib/handoff_envelope.py
  - lib/handoff_dispatcher.py
  license_spdx: project
  footprint: zero-extra-deps-local
  hot_path_allowed: true
  community_pattern: typed handoff envelope, cycle dedup, receipts
  benchmark_required: true
- id: cos_dispatch_gate
  status: active
  default: false
  implementation:
  - lib/dispatch_gate.py
  - lib/dispatch.py
  - lib/retry_classifier.py
  - lib/session_budget.py
  license_spdx: project
  footprint: zero-extra-deps-local
  hot_path_allowed: true
  community_pattern: budget/retry/circuit-breaker/idempotency gate
  benchmark_required: true
- id: cos_detached_daemon
  status: opt-in
  default: false
  implementation:
  - lib/agent_daemon.py
  - scripts/cos-agent-daemon
  license_spdx: project
  footprint: local-opt-in-process
  hot_path_allowed: false
  community_pattern: tmux/file-sentinel detached agent runner
  benchmark_required: true
- id: openai_agents_sdk
  status: candidate
  default: false
  implementation: null
  license_spdx: MIT
  footprint: optional-provider-sdk
  hot_path_allowed: false
  community_pattern: agents, handoffs, sessions, tracing, guardrails
  references:
  - https://openai.github.io/openai-agents-python/
  - https://openai.github.io/openai-agents-python/handoffs/
  benchmark_required: true
- id: langgraph
  status: candidate
  default: false
  implementation: null
  license_spdx: MIT
  footprint: optional-python-graph-runtime
  hot_path_allowed: false
  community_pattern: graph/state machine multi-agent orchestration
  references:
  - https://langchain-ai.github.io/langgraph/concepts/multi_agent/
  - https://docs.langchain.com/oss/python/langchain/multi-agent
  benchmark_required: true
- id: autogen
  status: lab
  default: false
  implementation: null
  license_spdx: MIT
  footprint: optional-python-multi-agent-runtime
  hot_path_allowed: false
  community_pattern: multi-agent conversations and group chat
  references:
  - https://microsoft.github.io/autogen/stable/
  benchmark_required: true
- id: crewai
  status: lab
  default: false
  implementation: null
  license_spdx: MIT
  footprint: optional-python-agent-flow-runtime
  hot_path_allowed: false
  community_pattern: crews, tasks, flows, and process orchestration
  references:
  - https://docs.crewai.com/
  benchmark_required: true
core_surfaces:
- id: agent_lifecycle
  owner_adr: ADR-223
  kind: launch_boundary
  implementations:
  - hooks/agent-prelaunch.sh
  - scripts/cos-agent-worktree-prepare
  - scripts/cos-worktree-sweeper.sh
  - lib/agent_lifecycle.py
  required_tests:
  - tests/behavior/test_agent_lifecycle_worktree_mode.py
  required_receipts:
  - agent-prelaunch
  - worktree-marker
- id: worktree_divergence
  owner_adr: ADR-220
  kind: liveness_audit
  implementations:
  - lib/worktree_audit.py
  - scripts/cos-worktree-audit
  required_tests:
  - tests/behavior/test_worktree_divergence_audit.py
  required_receipts:
  - worktree-audit-report
- id: release_freeze
  owner_adr: ADR-246
  kind: destructive_operation_boundary
  implementations:
  - lib/release_freeze.py
  - scripts/cos-release-freeze
  required_tests:
  - tests/behavior/test_release_freeze.py
  required_receipts:
  - release-freeze-transaction
- id: dispatch_gate
  owner_adr: ADR-228
  kind: provider_call_boundary
  implementations:
  - lib/dispatch_gate.py
  - lib/dispatch.py
  - lib/retry_classifier.py
  - lib/session_budget.py
  required_tests:
  - tests/integration/test_dispatch_gate_real_dispatch.py
  - tests/unit/test_dispatch_gate.py
  - tests/unit/test_retry_classifier.py
  - tests/unit/test_session_budget.py
  required_receipts:
  - dispatch-gate-decision
  - session-budget-event
- id: handoff
  owner_adr: ADR-230
  kind: handoff_boundary
  implementations:
  - lib/handoff_envelope.py
  - lib/handoff_dispatcher.py
  required_tests:
  - tests/unit/test_handoff_dispatcher.py
  - tests/behavior/test_handoff_dispatcher_flow.py
  - tests/chaos/test_handoff_receiver_kill_mid_dispatch.py
  required_receipts:
  - handoff-receipt
  - handoff-cycle-detected
- id: cross_session_team
  owner_adr: ADR-233
  kind: cross_session_transport
  implementations:
  - lib/agent_team.py
  - lib/agent_team_transport.py
  required_tests:
  - tests/behavior/test_agent_team_file_ipc_flow.py
  - tests/integration/test_agent_team_cross_harness_contract.py
  - tests/unit/test_agent_team_transport.py
  required_receipts:
  - team-task-event
  - inbox-message
- id: detached_agent_daemon
  owner_adr: ADR-235
  kind: optional_runner
  implementations:
  - lib/agent_daemon.py
  - scripts/cos-agent-daemon
  required_tests:
  - tests/unit/test_agent_daemon.py
  - tests/behavior/test_cos_agent_daemon_cli.py
  required_receipts:
  - detached-agent-event
