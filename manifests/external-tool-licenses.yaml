# external-tool-licenses.yaml
# Operator-maintained manifest of upstream tools vendored or ported into Cognitive OS.
# Each entry corresponds to one upstream project. Fields:
#   name          - Human-readable project name
#   upstream_url  - Canonical upstream repository URL
#   spdx          - SPDX license identifier (use UNKNOWN if unconfirmed)
#   status        - ALLOWED | BLOCKED | HOLD | TRIAL-PATTERNS | PATTERN-ONLY
#   copyright     - Exact copyright line from upstream LICENSE (MISSING if not found)
#   attribution   - Attribution line to include in NOTICE
#   cos_files     - COS source files that contain ported/adapted code
#   annex_f       - Path to the Annex F compliance dossier (relative to repo root)
#   notes         - Free-form compliance notes
#
# Schema version: 1
# Last updated: 2026-05-11

schema_version: 1

