schema_version: primitive-coherence/v1
status: active
owner: platform-safety
purpose: >
  Declare cross-primitive ownership, write surfaces, and ordering constraints so
  locally-correct hooks/scripts do not become globally incoherent.

registration:
  classification_manifest: manifests/hook-registration-classification.yaml
  legacy_checker: scripts/check_hook_registration.py
  active_statuses:
    - active
  must_not_be_registered_statuses:
    - manual_trigger
    - future
    - deprecated
    - demoted
  intentional_absent_statuses:
    - candidate_promote
    - conditional_opt_in
    - demoted
    - deprecated
    - future
    - git_or_manual
    - internal_helper
    - manual_trigger
    - opt_in
    - projected_elsewhere

surfaces:
  - id: agent.launch_snapshot
    kind: launch-state
    owner: agent-lifecycle
    path: .cognitive-os/runtime
    allowed_multi_writer: true
    write_protocol: lock-required
    writers:
      - hooks/pre-agent-snapshot.sh
      - hooks/post-agent-snapshot-restore.sh
    readers:
      - hooks/agent-prelaunch.sh
      - hooks/agent-launch-confirmed.sh
    invariants:
      - mutating snapshots must never run before blocking preflight

  - id: git.branch_context
    kind: control-plane
    owner: destructive-git-blocker
    path: .git/HEAD
    allowed_multi_writer: false
    write_protocol: git-command-gated
    writers:
      - hooks/destructive-git-blocker.sh
    readers:
      - hooks/branch-ownership-lock.sh
      - hooks/direct-main-guard.sh
    invariants:
      - branch switches require explicit operator approval

  - id: history.content_rewrite
    kind: destructive-history
    owner: adr-218-history-sanitization
    path: .git/objects
    allowed_multi_writer: false
    write_protocol: backup-then-filter-repo
    implementation: lib/history_sanitization.py
    writers:
      - scripts/cos-history-sanitization
    readers:
      - scripts/cos-history-sanitization-smoke.sh
      - scripts/cos-pre-public-risk-audit
    invariants:
      - blob content-only by default
      - commit message rewrites require COS_HISTORY_SANITIZE_COMMIT_MESSAGES=1
      - metadata rewrites require COS_HISTORY_SANITIZE_METADATA=1

ordering_constraints:
  - id: agent-prelaunch-before-snapshot
    event: PreToolUse
    matcher: Agent
    after: hooks/agent-prelaunch.sh
    before: hooks/pre-agent-snapshot.sh
    severity: block
    rationale: Mutating snapshots must not run before preflight blockers.

primitive_edges:
  - from: hooks/agent-prelaunch.sh
    to: scripts/state_retention_audit.py
    kind: invokes
    recursion_allowed: false
    rationale: Prelaunch may ask state retention for inventory; state retention must not launch agents.
  - from: scripts/cos-pre-public-risk-audit
    to: scripts/primitive-coherence-audit.py
    kind: invokes
    recursion_allowed: false
    rationale: Pre-public risk may consume coherence audit results; coherence audit must remain read-only and must not invoke pre-public risk.

external_tool_boundaries:
  - tool: git
    owner: git-control-plane
    license_spdx: GPL-2.0-only
    adapter: system-git-cli
    recursion_boundary: hooks must call git through governed shell paths; git commands must not spawn COS hooks directly
    failure_policy: fail-closed for destructive git, fail-open only for read-only inventory
    allowed_callers:
      - hooks/destructive-git-blocker.sh
      - scripts/cos-history-sanitization
      - scripts/primitive-coherence-audit.py
  - tool: git-filter-repo
    owner: adr-218-history-sanitization
    license_spdx: MIT
    adapter: external-cli
    recursion_boundary: blob content-only rewrite path; no commit message rewrite unless COS_HISTORY_SANITIZE_COMMIT_MESSAGES=1 and no commit author metadata rewrite unless COS_HISTORY_SANITIZE_METADATA=1
    failure_policy: backup-or-refuse
    allowed_callers:
      - scripts/cos-history-sanitization
