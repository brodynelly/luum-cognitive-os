schema_version: documentation-truth-claims.v1
owner_adr: ADR-277
purpose: >-
  Declare documentation claims whose truth is derived from generated reports or
  manifests, so stale or contradictory prose cannot silently persist after the
  underlying implementation changes.
status_policy:
  pass: all required docs, phrases, source reports, and generated blocks match current facts
  warn: advisory-only claim has weak evidence but no contradiction
  block: required claim is missing, contradicted, or backed by a missing/stale source report
source_reports:
  consumer_projection:
    path: docs/06-Daily/reports/primitive-projection-fidelity-latest.json
    required: true
  primitive_authority:
    path: docs/06-Daily/reports/primitive-authority-latest.json
    required: true
  acc:
    path: docs/07-Capabilities/acc/latest.json
    required: false
claims:
  consumer_projection_harnesses:
    severity: high
    description: Consumer projection docs must describe current implemented native and structural harnesses, not the old Claude/Codex-only boundary.
    facts:
      harnesses_from: manifests/harness-projection.yaml
      projection_report: docs/06-Daily/reports/primitive-projection-fidelity-latest.json
    source_reports:
      - docs/06-Daily/reports/primitive-projection-fidelity-latest.json
      - docs/06-Daily/reports/primitive-readiness-ledger-scripts-latest.json
    required_docs:
      - docs/04-Concepts/architecture/consumer-project-primitive-accessibility.md
      - docs/02-Decisions/adrs/ADR-146-primitive-readiness-ledger.md
    required_phrases:
      - Structural projection is not runtime enforcement
      - implemented native and structural harnesses
    forbidden_phrases:
      - proof signs only Claude Code and OpenAI Codex default installs
      - automated for Claude/Codex default installs
      - current Claude/Codex proof boundary
      - solo Claude/Codex
      - only Claude/Codex
    generated_block:
      doc: docs/04-Concepts/architecture/consumer-project-primitive-accessibility.md
      marker: consumer_projection_harnesses
      required: true
  primitive_authority_write_effects:
    severity: high
    description: Authority docs must describe the implemented ADR-276 authority/write-effects audit and latest report, not a pending gap.
    facts:
      authority_report: docs/06-Daily/reports/primitive-authority-latest.json
      manifest: manifests/primitive-authority.yaml
    source_reports:
      - docs/06-Daily/reports/primitive-authority-latest.json
    required_docs:
      - docs/04-Concepts/architecture/primitive-authority-write-effects.md
      - docs/02-Decisions/adrs/ADR-276-primitive-authority-write-effects.md
    required_phrases:
      - manifests/primitive-authority.yaml
      - scripts/primitive_authority_audit.py
      - authority_write_effects
      - dynamic write-effects audit
    forbidden_phrases:
      - Known remaining gap
      - falta una capa explícita de authority/write-effects audit
      - no is documentado todavia
      - not implemented yet
    generated_block:
      doc: docs/04-Concepts/architecture/primitive-authority-write-effects.md
      marker: primitive_authority_write_effects
      required: true
  documentation_truth_control:
    severity: medium
    description: Documentation truth control itself must remain discoverable and wired into ACC.
    facts:
      manifest: manifests/documentation-truth-claims.yaml
      report: docs/06-Daily/reports/documentation-truth-latest.json
    source_reports:
      - docs/06-Daily/reports/documentation-truth-latest.json
    required_docs:
      - docs/04-Concepts/architecture/documentation-truth-control.md
      - docs/02-Decisions/adrs/ADR-277-documentation-truth-control.md
      - docs/00-MOCs/entrypoints/README.md
    required_phrases:
      - documentation_truth
      - documentation-truth-claims.yaml
      - documentation_truth_audit.py
    forbidden_phrases: []
    generated_block:
      doc: docs/04-Concepts/architecture/documentation-truth-control.md
      marker: documentation_truth_control
      required: true
  session_pending_protocol:
    severity: high
    description: >-
      Session-pending protocol primitives (ADR-273/274/275) — aggregator,
      verifier, audit, projector, close primitives, drift hooks, trust signal
      — must remain discoverable in the operations MOC, the architecture
      doc, and the ADR §Related sections. Stale phrases describing the
      read/write asymmetry as unresolved must not persist.
    facts:
      pending_truth_report: docs/06-Daily/reports/pending-truth-latest.json
      operational_guide_report: docs/06-Daily/reports/operational-guide-audit-latest.json
      closure_trust_report: docs/06-Daily/reports/closure-trust-baseline.json
      doc_xref_audit: scripts/cos-doc-cross-reference-audit.py
      architecture_map: docs/04-Concepts/architecture/pending-truth-architecture.md
    source_reports:
      - docs/06-Daily/reports/pending-truth-latest.json
      - docs/06-Daily/reports/operational-guide-audit-latest.json
    required_docs:
      - docs/00-MOCs/operations.md
      - docs/04-Concepts/architecture/pending-truth-architecture.md
      - docs/02-Decisions/adrs/ADR-273-pending-truth-ledger-and-bilateral-verification.md
      - docs/02-Decisions/adrs/ADR-274-operational-guide-required-for-capability-adrs.md
      - docs/02-Decisions/adrs/ADR-275-closure-and-projection-primitives.md
      - skills/CATALOG.md
      - skills/CATALOG-COMPACT.md
    required_phrases:
      - cos-pending-truth-aggregator
      - cos-pending-truth-close
      - cos-adr-close
      - cos-session-start-projector
      - cos-closure-trust-signal
      - session-pending-brief
      - session-pending-close
      - STATUS-TAXONOMY
      - pending-truth-architecture.md
      - closure-trail.jsonl
    forbidden_phrases:
      - read/write asymmetry remains unresolved
      - no atomic close primitive exists
      - manual closures are the only path
      - session-start surfaces only Engram and plans
      - projector is not yet wired into the harnesses
      - cos-pending-truth-close does not exist
      - cos-adr-close is a future follow-up
      - closure-trail is not implemented
    generated_block:
      doc: docs/04-Concepts/architecture/pending-truth-architecture.md
      marker: session_pending_protocol
      required: false
  subprocess_timeout_discipline:
    severity: medium
    description: >-
      subprocess.run timeout discipline (ADR-278) must remain documented;
      the audit, allowlist, and test-conftest safety net must be
      discoverable in their canonical locations.
    facts:
      audit_report_command: scripts/cos-subprocess-timeout-audit.py
      allowlist: manifests/subprocess-timeout-allowlist.yaml
      test_default: tests/conftest.py
    source_reports:
      - manifests/subprocess-timeout-allowlist.yaml
    required_docs:
      - docs/02-Decisions/adrs/ADR-278-subprocess-run-timeout-discipline.md
    required_phrases:
      - cos-subprocess-timeout-audit.py
      - subprocess-timeout-allowlist.yaml
      - COS_TEST_SUBPROCESS_DEFAULT_TIMEOUT
      - subprocess.run
      - timeout=
    forbidden_phrases:
      - untimed subprocess calls are harmless
      - pytest-timeout always kills hung subprocesses
      - the timeout keyword is optional in production
    generated_block:
      doc: docs/02-Decisions/adrs/ADR-278-subprocess-run-timeout-discipline.md
      marker: subprocess_timeout_discipline
      required: false
  adw_mechanism_reality:
    severity: medium
    description: >-
      ADW reference docs must describe the real ADW mechanism (skill-driven SDD
      pipeline: sdd_resume.py 8-phase DAG + SDD phase skills + batch_runner +
      cos sdd consumer lane) and must not resurrect the workflow-YAML engine
      removed 2026-04-20 with 0 production callers (lib/pipeline_executor and
      per-pipeline YAMLs under a .cognitive-os/workflows/ root).
    facts:
      phase_dag: packages/sdd-compound/lib/sdd_resume.py
      batch_runner: packages/agent-lifecycle/lib/batch_runner.py
      consumer_lane: cmd/cos/internal/cli/sdd.go
      drift_audit: docs/06-Daily/reports/agentic-layer-adw-audit-2026-06-11.md
    source_reports:
      - docs/06-Daily/reports/agentic-layer-adw-audit-2026-06-11.md
    required_docs:
      - docs/08-References/root/adw-patterns.md
    required_phrases:
      - packages/sdd-compound/lib/sdd_resume.py
      - skills/sdd-apply
      - removed 2026-04-20
      - .cognitive-os/workflows/sdd/
    forbidden_phrases:
      - lib/pipeline_executor.py
      - python3 -m lib.pipeline_executor
      - feature-pipeline.yaml
      - /run-pipeline
