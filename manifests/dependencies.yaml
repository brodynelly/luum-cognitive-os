mcp_servers:
- name: engram
  criticality: recommended
  transport: stdio
  command: npx
  args:
  - -y
  - '@anthropic/engram'
  register_to: ~/.claude/settings.json
  requires_tool: engram
  consumed_by:
  - lib/engram_client.py
  - hooks/inject-phase-context.sh
- name: aguara
  criticality: optional
  transport: stdio
  command: mcp-aguara
  args: []
  register_to: ~/.claude/settings.json
  requires_tool: aguara
  enabled_when: cognitive-os.yaml security.aguara.enabled == true
  consumed_by:
  - hooks/aguara-scan.sh
profiles:
  default:
    python_groups: []
    tools_required:
    - jq
    - git
    - uv
    - python3
    tools_recommended:
    - engram
    - gh
    mcp_servers_recommended:
    - engram
  full:
    python_groups:
    - agent-lab
    - crawling
    - embeddings
    - enforcement
    - evals-observability
    - guardrails
    - jupyter
    - llm
    - memory
    - observability
    - testing
