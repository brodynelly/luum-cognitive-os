[pytest]
testpaths = tests
pythonpath = .
timeout = 30
timeout_method = thread
# importlib import mode lets pytest import test files with duplicate basenames
# (e.g. tests/behavior/test_x.py and tests/red_team/portability/test_x.py)
# without needing __init__.py packages everywhere. Avoids the "Interrupted: 1
# error during collection" crash on a fresh clone.
addopts = --tb=line --strict-markers --import-mode=importlib
# pytest-xdist installed for parallel test execution.
# Unit tests are safe to parallelize: `make test-fast` uses -n auto.
# Integration/e2e/chaos share state (tmp dirs, PID files, hook side-effects) -- run serial.
# Markers: unit | integration | e2e | chaos | behavior | docker | slow | benchmark | quality
markers =
    unit: Unit tests
    audit: Aspirational-component audit tests (gated from default CI)
    behavior: Behavior tests
    integration: Integration tests
    system: System tests
    hook: Hook-level tests validating Claude Code hook chain behavior
    docker: Requires Docker
    slow: Slow tests
    e2e: End-to-end tests
    eval_frameworks: Eval framework tests
    arena: Competitive arena tests
    benchmark: Performance benchmark tests
    quality: LLM-evaluated quality tests
    forked: Run in an isolated subprocess (requires pytest-forked; skipped if not installed)
    chaos: Chaos / fault-injection tests
    canary: Canary tests that verify critical post-install invariants
    contract: Product contract tests that validate durable behavior
    red_team: Red-team harness tests (scenario runs, portability coverage, baseline contract)
    architecture: Architecture-level audits (clean-arch boundaries, layering)
    smoke: End-to-end smoke validation (opt-in via cos-smoke; not in default broad)
    requires_engram: Requires a reachable Engram memory backend; tests must skip gracefully when unavailable
    timeout(seconds): Per-test hard timeout override used by pytest-timeout and tests/conftest.py
    xdist_group(name): pytest-xdist worker group -- all tests with the same name run on the same worker (reduces parallel contention for shell-subprocess timing tests)
    semantic_routing: Live multilingual embedding tests for lib/semantic_skill_matcher.py (ADR-296); require fastembed installed

filterwarnings =
    # Third-party dependency deprecations are tracked at the dependency boundary; do not make product lanes noisy.
    ignore:tagMap is deprecated.*:DeprecationWarning:ldap3\.utils\.asn1
    ignore:typeMap is deprecated.*:DeprecationWarning:ldap3\.utils\.asn1
    # Keep authlib filters message-based: category filters import optional authlib and break plain pytest when authlib is absent.
    ignore:authlib\.jose module is deprecated.*
    ignore:.*AuthlibDeprecationWarning.*
    ignore:`json_encoders` is deprecated.*:DeprecationWarning:pydantic\._internal\._generate_schema
