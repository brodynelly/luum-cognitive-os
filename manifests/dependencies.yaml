schema_version: 1
python:
  required:
  - pyyaml>=6.0
  - jinja2>=3.1
  groups:
    llm:
    - redis>=5.0.0
    web:
    - fastapi>=0.100
    - uvicorn>=0.23
    - fastapi
    - flask
    observability:
    - opik>=1.0
    - langfuse>=3.0
    memory:
    - cognee>=0.1
    guardrails:
    - nemoguardrails
    - garak
    jupyter:
    - jupyter
    - notebook
    crawling:
    - crawl4ai>=0.8.0
    testing:
    - pytest>=8.0
    - pytest-asyncio>=0.23
    - pytest-timeout>=2.2
    - pytest-xdist>=3.5
    - mutmut>=3.0
    - pytest-smell>=1.0
    - pytest-rerunfailures
    - cosmic-ray
    - pytest-xdist
    - py2many
    - testcontainers
    enforcement:
    - pre-commit>=4.0
    - ruff>=0.9.0
    - vulture>=2.14
    - import-linter>=2.0
    - pytest-cov>=6.0
    - diff-cover>=9.0
    - codespell
    - semgrep
    - pip-licenses
    evals-observability:
    - arize-phoenix
    - arize-phoenix-otel
    - deepeval
    - mlflow
    - mlflow-skinny
    - ragas
    agent-lab:
    - browser-use
    - claude-agent-sdk
    - openai
    - rich
    - testcontainers
    embeddings:
    - fastembed
    - numpy
    - sentence-transformers
    advisor-mcp:
    - anthropic
    - google-generativeai
    - httpx
    - pydantic
    - python-dotenv
    - click
    - fastmcp
    services-python:
    - cognee
    - memu-ai
    security-python:
    - mcp-scan
tools:
- name: jq
  criticality: required
  check: jq --version
  install:
    macos:
      manager: brew
      command: brew install jq
    linux:
      manager: apt
      command: sudo apt-get install -y jq
    windows_wsl:
      manager: apt
      command: sudo apt-get install -y jq
  consumed_by:
  - hooks/*.sh (50+ hooks parse JSON via jq)
  - scripts/cos-init.sh
  - scripts/merge-settings.sh
  category: cli
  profiles:
  - core
  - standard
  - full
  scope: system
  syncable: 'no'
  auth_bound: false
- name: git
  criticality: required
  check: git --version
  install:
    macos:
      manager: brew
      command: brew install git
    linux:
      manager: apt
      command: sudo apt-get install -y git
    windows_wsl:
      manager: apt
      command: sudo apt-get install -y git
  consumed_by:
  - install.sh
  - scripts/setup-git-hooks.sh
  category: cli
  profiles:
  - core
  - standard
  - full
  scope: system
  syncable: 'no'
  auth_bound: false
- name: uv
  criticality: required
  check: uv --version
  install:
    macos:
      manager: brew
      command: brew install uv
    linux:
      manager: standalone
      command: curl -LsSf https://astral.sh/uv/install.sh | sh
    windows_wsl:
      manager: standalone
      command: curl -LsSf https://astral.sh/uv/install.sh | sh
  consumed_by:
  - scripts/setup.sh
  - pyproject.toml workflow
  category: package-manager
  profiles:
  - core
  - standard
  - full
  scope: user
  syncable: 'no'
  auth_bound: false
- name: python3
  criticality: required
  check: python3 --version
  min_version: '3.11'
  install:
    macos:
      manager: manual
      url: https://www.python.org/downloads/macos/
    linux:
      manager: apt
      command: sudo apt-get install -y python3 python3-venv
    windows_wsl:
      manager: apt
      command: sudo apt-get install -y python3 python3-venv
  consumed_by:
  - hooks/*.py
  - lib/*.py
  category: runtime
  profiles:
  - core
  - standard
  - full
  scope: system
  syncable: 'no'
  auth_bound: false
- name: engram
  criticality: recommended
  check: engram --version
  install:
    macos:
      manager: brew
      command: brew install gentleman-programming/tap/engram
    linux:
      manager: manual
      url: https://github.com/Gentleman-Programming/engram
    windows_wsl:
      manager: manual
      url: https://github.com/Gentleman-Programming/engram
  degraded_behavior: 'Memory features return empty results. lib/engram_client.py wraps

    the CLI with try/except and returns [] on failure.

    '
  consumed_by:
  - lib/engram_client.py
  - hooks/inject-phase-context.sh
  - hooks/subagent-context-injector.sh
  category: cli
  profiles:
  - standard
  - full
  scope: user
  syncable: state-only
  auth_bound: false
  manual_url: https://github.com/Gentleman-Programming/engram
  never_copy:
  - ~/.engram/engram.db
- name: gh
  criticality: recommended
  check: gh --version
  install:
    macos:
      manager: brew
      command: brew install gh
    linux:
      manager: apt
      command: sudo apt-get install -y gh
    windows_wsl:
      manager: manual
      url: https://cli.github.com/
  consumed_by:
  - GitHub MCP automation
  - PR/issue workflows
  category: cli
  profiles:
  - standard
  - full
  scope: user
  syncable: config-only
  auth_bound: true
  manual_url: https://cli.github.com/
  never_copy:
  - ~/.config/gh
  post_install: Authenticate manually with `gh auth login`.
- name: docker
  criticality: optional
  check: docker --version
  install:
    macos:
      manager: manual
      url: https://docs.docker.com/get-docker/
    linux:
      manager: manual
      url: https://docs.docker.com/get-docker/
    windows_wsl:
      manager: manual
      url: https://docs.docker.com/get-docker/
  consumed_by:
  - scripts/cos-bootstrap.sh
  - infra services (Langfuse, LiteLLM)
  category: container
  profiles:
  - full
  scope: system
  syncable: 'no'
  auth_bound: false
  manual_url: https://docs.docker.com/get-docker/
- name: aguara
  criticality: optional
  check: aguara --version
  install:
    macos:
      manager: go
      command: go install github.com/garagon/aguara@latest
    linux:
      manager: go
      command: go install github.com/garagon/aguara@latest
    windows_wsl:
      manager: go
      command: go install github.com/garagon/aguara@latest
  enabled_when: cognitive-os.yaml security.aguara.enabled == true
  consumed_by:
  - hooks/aguara-scan.sh
  category: security
  profiles:
  - full
  scope: user
  syncable: 'no'
  auth_bound: false
- name: mcp-scan
