    service_mode: harness-embedded-only
- id: reinvention-check
  family: hook
  source: hooks/reinvention-check.sh
  lifecycle_ref: hooks/reinvention-check.sh
  intent: Warn before creating duplicate primitives, docs, or implementation patterns
    when existing COS surfaces likely apply.
  trigger:
    kind: before_tool_call
    tool_intent: write_or_edit
    tools:
    - Write
    - Edit
    - MultiEdit
    target_patterns:
    - skills/**/SKILL.md
    - rules/**/*.md
    - hooks/**/*.sh
    - scripts/**
    - docs/02-Decisions/adrs/ADR-*.md
  requires:
  - inspect_tool_target
  - search_existing_primitives
  - emit_metric
  - emit_intervention
  actions:
    preferred: warn
    fallback: documented-only
    reason_codes:
    - possible_reinvention
    - existing_primitive_candidate
  evidence:
    metrics:
    - .cognitive-os/metrics/reinvention-checks.jsonl
    interventions:
    - .cognitive-os/metrics/primitive-interventions.jsonl
    proof_tests:
    - tests/contracts/test_reinvention_check.py
  projection:
    claude:
      fidelity: native-lifecycle-enforced
      surface: PreToolUse write/edit hook
    codex:
      fidelity: structural-advisory
      surface: generated instructions and governed wrapper backlog
    opencode:
      fidelity: governed-wrapper-enforced
      surface: OpenCode project plugin cos-primitive-guard.js tool.execute.before/after
        smoke
    cursor:
      fidelity: structural-advisory
      surface: project rules/context only
    vscode-copilot:
      fidelity: structural-advisory
      surface: copilot instructions only
    shell-ci:
      fidelity: documented-only
      surface: proof tests only until a shell/CI command lane is signed
  impact:
    consumer_fleet: none
    service_mode: harness-embedded-only
