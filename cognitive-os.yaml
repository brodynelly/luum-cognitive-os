# Cognitive OS Configuration
# This file is the single source of truth for Cognitive OS behavior.
# For SaaS: this will be editable via web dashboard.

project:
  name: luum-cognitive-os
  type: webapp              # fintech | ecommerce | saas | webapp | startup | healthcare
  # STATUS: implemented
  phase: reconstruction     # reconstruction | stabilization | production | maintenance

  # Architecture configuration — skills read from here instead of hardcoding
  # Populated by /cognitive-os-init based on detected stack; override manually as needed
  architecture:
    frameworks:
      go: ginext               # ginext | gin | echo | fiber | chi | huma
      typescript: nestjs       # nestjs | express | fastify | hono
      java: spring-boot        # spring-boot | quarkus | micronaut
    layers:
      domain: "internal/domain"
      application: "internal/application"
      infrastructure: "internal/infrastructure"
      dtos: "application/dtos"
    services_root:
      go: "backend-go/apps"
      typescript: "services"
      java: "micro-services"
    # Removed: dead config that nothing reads (session 2026-04-15)
    # service_paths: project-specific paths from another project removed
    evaluation_criteria:
      - "Follows clean architecture layers (domain/application/infrastructure)"
      - "Uses correct framework per language (see frameworks above)"
      - "DTOs in application layer, not domain layer"
      - "Dependencies flow inward (infra -> app -> domain)"
      - "Cross-service communication via SDKs, not direct imports"
      - "Constitutional gates respected for sensitive operations"

  # infrastructure: populated by /cognitive-os-init from docker-compose.yml + detection
  # infrastructure:
  #   auth:
  #     name: keycloak       # keycloak | auth0 | clerk | firebase-auth | custom
  #     port: 8070
  #   database:
  #     - name: postgresql
  #       port: 5432
  #   cache:
  #     name: valkey          # valkey (Redis-compatible, BSD-3)
  #     port: 6379
  #   messaging:
  #     name: rabbitmq       # rabbitmq | kafka | redpanda | sqs
  #     port: 5672
  #   services: []           # populated by /cognitive-os-init

environment:
  tool: devbox
  config: devbox.json
  checkpoint_dir: .cognitive-os/checkpoints

# ADR-096: Review-agent pattern configuration
review:
  sample_rate: 0.2          # Fraction of sub-agent outputs to review (0.0=never, 1.0=always)
  max_per_day: 50           # Daily budget cap; excess reviews are queued, not dispatched
  default_model: haiku      # Default reviewer model tier (overridden by cross-review matrix)
  async: true               # Write pending markers and let review-pending-sweeper dispatch in background
  always_review_kinds: []   # Task kinds that always get reviewed regardless of sample_rate
                            # e.g. ["sdd-verify", "sdd-apply"] for high-stakes phases

# ADR-099: Pre-agent snapshot configuration
snapshots:
  ttl_days: 30          # Prune snapshots older than this many days
  max_file_mb: 50       # Skip individual untracked files larger than this per snapshot
  max_total_mb: 1024    # Prune oldest snapshots when aggregate snapshot copies exceed this cap
  mode: "copy"          # "copy" (default, ADR-099) | "stash" (legacy, same as COS_LEGACY_SNAPSHOT=1)
  snapshots_dir: ".cognitive-os/snapshots"  # Relative to project root


# ADR-111: Concurrent-agent safety projection for consumer projects
concurrency_safety:
  enabled: true
  preserve_branches:
    enabled: true
    require_manifest: true
  stash_leak_alarm:
    warn_ttl_seconds: 600
    block_ttl_seconds: 3600
  plan_claims:
    require_bilateral_proof: true
  resource_leases:
    default_ttl_seconds: 1800
    critical_domains:
      - auth
      - billing
      - migrations
      - infrastructure

phases:
  reconstruction:
    description: "Full rebuild. Rewrite > patch. Follow standards strictly. Don't preserve broken patterns."
    break_existing: true
    rewrite_over_patch: true
    follow_standard_strictly: true
    skip_backwards_compat: true
    document_as_future_work: false
    auto_remediate_architecture: true

  stabilization:
    description: "Standards established. Fix remaining issues. Start enforcing coverage."
    break_existing: false
    rewrite_over_patch: true
    follow_standard_strictly: true
    skip_backwards_compat: false
    document_as_future_work: false
    auto_remediate_architecture: true

  production:
    description: "Live system. Incremental changes only. Feature flags required."
    break_existing: false
    rewrite_over_patch: false
    follow_standard_strictly: true
    skip_backwards_compat: true
    document_as_future_work: true
    auto_remediate_architecture: false

  maintenance:
    description: "Stable. Bug fixes and security patches only."
    break_existing: false
    rewrite_over_patch: false
    follow_standard_strictly: true
    skip_backwards_compat: true
    document_as_future_work: true
    auto_remediate_architecture: false

quality:
  coverage:
    minimum: 80                    # Global minimum coverage %
    block_pr: true                 # Block PRs below threshold
    per_package: true              # Enforce per package, not just global
    exclude:                       # Packages to exclude from coverage
      - "*/mocks/*"
      - "*/test/*"
      - "cmd/*"

  # Removed: dead config that nothing reads (session 2026-04-15)
  # quality.presets (fintech/healthcare/ecommerce/startup) removed

  auto_verify: true                 # Run acceptance criteria verification on agent completion
  exhaustive_prompts: true           # Enable completeness check on agent launch
  completeness_check: true           # Advisory pre-launch prompt validation
  verification_retries: 3            # Max retries on verification failure

  gates:                           # Quality gates (override per project)
    # Example for Go:
    # - name: compilation
    #   required: true
    #   command: "go build ./..."
    # - name: lint
    #   required: true
    #   command: "golangci-lint run ./..."
    # Example for Node.js:
    # - name: compilation
    #   required: true
    #   command: "npx tsc --noEmit"
    # - name: lint
    #   required: true
    #   command: "npx eslint ."
    # Populated by /cognitive-os-init based on detected stack
    []

# ADR-038 Wave 2 — 4-layer context budget (Google ADK pattern, Gap #2)
# Enforcement arrives in Wave 3 (Pydantic TrustReport). Declared here as schema.
context_budget:
  static_max_tokens: 4000      # preamble + KNOWN TRAPS + WORKING DIR (always loaded)
  turn_max_tokens: 8000        # per tool-use round
  user_max_tokens: 12000       # accumulated user-facing content per task
  cache_max_tokens: 32000      # MCP/engram retrievals

sessions:
  concurrency: true                # Enable multi-session support
  isolation: per-session           # Each session gets its own tasks/metrics
  lock_strategy: advisory          # Advisory locking (warn, not block)
  lock_timeout_seconds: 300        # Lock auto-expires after 5 minutes
  cleanup_on_exit: true            # Remove session directory on exit
  merge_metrics_on_exit: true      # Append session metrics to global on exit
  max_concurrent: 10               # Maximum simultaneous sessions

models:
  gateways:
    bifrost:
      enabled: false           # disabled in docker-compose (migrated to litellm pip)
      url: ${BIFROST_URL:-http://localhost:8081}
      priority: 1              # Primary gateway (lowest latency)
      supported_providers:
        - openai
        - anthropic
        - google
        - groq
        - mistral
        - cohere
        - bedrock
    litellm:
      enabled: true
      url: ${LITELLM_URL:-http://localhost:4000}
      priority: 2              # Fallback gateway (feature-rich)
      api_key_env: LITELLM_MASTER_KEY
  routing:
    default: sonnet
    design: opus
    implementation: sonnet
    debugging: opus
    documentation: haiku
    archiving: haiku
  providers:
    openrouter:
      enabled: true
      api_key_env: OPENROUTER_API_KEY
      free_tier:
        auto_select: openrouter/free
        preferred:
          - qwen/qwen3-32b:free
          - nvidia/llama-3.1-nemotron-ultra-253b:free
      use_as_fallback: true
      fallback_trigger: budget_exhausted

memory:
  provider: engram
  sync:
    auto_export: true              # Export on session end
    auto_import: true              # Import on session start
  memu:
    enabled: false                 # Opt-in: requires docker compose --profile memory
    url: ${COGNITIVE_OS_MEMU_URL:-http://localhost:8765}
    sync_categories:
      - cognitive-os/errors
      - cognitive-os/repairs
      - cognitive-os/decisions
      - cognitive-os/discoveries
    proactive_loading: true

skills:
  auto_generate: true              # Auto-generate skills from complex tasks
  registry_update: true            # Update registry after changes
  adaptation: true                 # Track feedback and adapt
  loading:
    strategy: progressive          # progressive | full
    level1_budget: 4000            # tokens for micro catalog (always loaded)
    level2_budget: 30000           # tokens for active skills (on demand)
    max_active: 5                  # max simultaneous loaded skills
    catalog: CATALOG-MICRO.md      # Level-1 micro skill index
    compact_catalog: CATALOG-COMPACT.md # Level-1.5 discovery index

rules:
  loading:
    strategy: compact              # compact | full
    compact_file: RULES-COMPACT.md # compressed rule index
    contextual_triggers:           # full rule loaded when trigger matches
      # --- Existing triggers ---
      auto-repair: "auto-repair|auto_repair|circuit.breaker|remediation|error|failure|crash|sre"
      squad-protocol: "/squad-report|/retrospective"
      definition-of-done: "done|complete|finished|dod|definition of done"
      agent-quality: "quality|minimum|maximum|exhaustive|acceptance criteria|verification"
      acceptance-criteria: "acceptance criteria|verify|verification|measurable"
      session-concurrency: "session|concurrent|lock|multi-session"
      self-improvement-protocol: "self-improve|self-improvement|kpi threshold|pattern detection"

      # --- Verification & Trust (Section 3) ---
      trust-score: "trust.score|trust.report|confidence.score|self.doubt|verification.evidence"
      anti-hallucination: "hallucination|fabricat|claim.valid|ground.truth|cross.verif"
      confidence-gate: "confidence.gate|low.confidence|score.below|block.low"

      # --- Impact Assessment (Section 5) ---
      blast-radius: "blast.radius|impact.analysis|scope.estimate|affected.files|proportional"
      sandbox-sampling: "sandbox|sample.first|bulk.change|100.files|large.scope|epic.task"
      impact-analysis: "impact.analysis|change.impact|importers|downstream|blast.radius"
      scope-proportionality: "proportional|disproportionate|too.many.files|fix.delet"

      # --- Agent Governance (Section 7) ---
      agent-security: "permission|privilege|access.control|least.privilege|blocked.path|agent.security"
      agent-kpis: "kpi|okr|agent.performance|weekly.review|metric.threshold"
      agent-identity: "agent.identity|audit.trail|trust.level|delegation.rule"
      consequence-system: "consequence|promote|degrade|disable.skill|okr.driven"

      # --- Prompt Engineering (Section 8) ---
      closed-loop-prompts: "success.criteria|fallback.action|halt.and.wait|retry.loop|escalat|closed.loop"
      split-and-resume: "needs_clarification|clarification.answer|mid.task.ambig|split.and.resume"
      clarification-gate: "clarification.gate|ambiguous.prompt|vague.prompt|prompt.score"

      # --- Context Efficiency (Section 9) ---
      context-optimization: "context.window|token.budget|progressive.loading|compaction|context.optim"
      context-management: "context.capacity|save.and.summarize|pre.compaction|context.manag"
      capability-levels: "capability.level|auto.disable|model.capability|safety.net"

      # --- Security (Section 10) ---
      credential-management: "credential|secret|env.var|api.key|password.manage|token.rotate"
      license-policy: "license|agpl|sspl|gpl|copyleft|open.source.license|license.check"
      security-scanning: "semgrep|sast|security.scan|vulnerab|security.finding"
      pentesting-readiness: "pentest|security.test|prompt.injection|permission.escalat"

      # --- Cost & Resources (Section 11) ---
      resource-governance: "budget|monthly.limit|model.downgrade|cost.cap|resource.govern"
      token-economy: "token.economy|cost.transparen|waste.prevent|cheapest.model"
      decomposition: "decompos|break.down|sub.task|cost.aware|task.split"
      cost-prediction: "cost.predict|estimate.cost|how.much.will|budget.forecast"
      estimation-calibration: "estimat|calibrat|planning.poker|effort.estimate|how.long"

      # --- Persistence & Recovery (Section 14) ---
      fault-tolerance: "fault.tolerance|resilience|checkpoint|recover|resume.task|idempotent"
      engram-organization: "engram|topic.key|prefix.system|memory.organiz"
      crash-recovery: "crash.recovery|auto.checkpoint|orphaned.stash|session.crash"

      # --- Change Safety (Section 15) ---
      cognitive-os-changes: "cognitive.os.change|os.modif|hook.change|rule.change|skill.change"
      capability-protection: "capability.snapshot|capability.diff|feature.loss|unintended.removal"
      auto-rollback: "auto.rollback|rollback|revert|verify.fail.3|retry.exhaust"

      # --- Monitoring & Observability (Section 16) ---
      performance-monitoring: "performance.monitor|latency|throughput|p50|p95|p99|bottleneck"
      doc-sync: "doc.sync|stale.doc|documentation.drift|doc.freshness"

      # --- Autonomous Systems (Section 17) ---
      singularity: "singularity|autonomous.loop|mape.k|daemon|codebase.health"

      # --- Standalone contextual rules ---
      error-learning: "error.pattern|error.recur|mistake.report|pdca|error.learn"
      model-routing: "model.routing|routing.table|model.select|opus.vs.sonnet"
      adversarial-review: "adversarial.review|code.review|zero.finding|review.protocol"
      step-files: "step.file|long.running|resumable|checkpoint.step"
      rate-limiting: "rate.limit|token.flood|tool.usage.limit|cooldown"
      non-blocking-retry: "non.blocking.retry|deferred.retry|retry.scheduler|rate.limit.queue"

      # Project-specific triggers (add via /cognitive-os-init or manually):
      # go-architecture: "*.go"
      # constitutional-gates: "payment|transfer|card"
      # architecture: "cross-service|bff|microservice"
      # services-config: "port|connection|refused"
      # testing-local: "test|jest|wiremock"

# Removed: dead config that nothing reads (session 2026-04-15)
# cost.metering (track_per_skill/rule/agent, report_interval) removed
# cost.optimization (auto_unload, compress_rules, cache_skill_catalog) removed

definition_of_done:
  trivial:                               # < 20 lines, 1 file
    - code_compiles
    - no_lint_errors

  small:                                 # 1-3 files, single service
    - code_compiles
    - unit_tests_pass
    - no_lint_errors

  medium:                                # multi-file, single service, new feature
    - code_compiles
    - unit_tests_added
    - coverage_maintained
    - lint_clean
    - docs_updated

  large:                                 # multi-service, new integration
    - readiness_check_pass
    - code_compiles
    - unit_tests_80_percent
    - integration_tests
    - architecture_compliance
    - docs_updated
    - adversarial_review

  critical:                              # security, payments, data migration
    - readiness_check_pass
    - code_compiles
    - unit_tests_80_percent
    - integration_tests
    - architecture_compliance
    - docs_updated
    - adversarial_review
    - security_review
    - idempotency_verified
    - audit_trail_present
    - rollback_tested

hooks:
  # Removed: dead config that nothing reads (session 2026-04-15)
  # error_learning, dod_gate, tool_loop_detection, pre_compaction_flush,
  # auto_test_on_edit, block_prod_urls, auto_refine, auto_verify removed
  skill_metrics: true
  completeness_check: true           # Warn on vague agent prompts before launch

auto_refine:
  enabled: true
  max_retries: 3
  tracking_dir: metrics/auto-refine    # relative to .cognitive-os/

# Removed: dead config that nothing reads (session 2026-04-15)
# advisor.* (enabled, model, executor_model, max_uses, tasks) removed

# ADR-047 — Session Lifecycle Management (Phase A: log-only)
# All three flags default OFF/log-only so this section is strictly additive.
# STATUS: implemented (runtime.killswitch_respected)
runtime:
  # STATUS: implemented
  reaper:
    enabled: true
  # STATUS: implemented
  session_watchdog:
    enabled: true           # Phase A: log-only; set false to disable entirely
    mode: "log-only"        # "log-only" | "enforce" | "off"
    ttl_hours: 6            # sessions older than this are IDLE_OVER_TTL candidates
    idle_cpu_threshold: 5.0 # cpu% below this = idle (percent). Unified with Phase B _CPU_IDLE_THRESHOLD_PCT per rules/decision-depth-gate.md invariant (Phase A superset of Phase B).
    idle_samples_required: 3  # consecutive idle samples before marking (daemon mode)
  # STATUS: aspirational
  ttft_watchdog:
    enabled: false          # Phase A: not yet wired to hooks
    max_sec: 480            # 8 min — TTFT alert threshold
  # STATUS: aspirational
  engram_mcp:
    wrapper_enabled: false  # Phase A: semaphore not yet deployed
    max_concurrent: 4
    wait_sec: 15

expansion:
  # Stage 2 PreToolUse[Agent] selective expansion. See ADR-075.
  # Tier-0 (always-on): ~9 rules. Tier-1 (default): ~95 rules. Tier-2 (on-demand): ~8 rules.
  # Set to [0] for minimum context (~10-15K tokens), [0,1] for standard (~30-50K),
  # [0,1,2] for full expansion (backward compat, ~106K tokens).
  tier_filter: [0, 1]

resources:
  # STATUS: implemented
  budget:
    monthly_limit_usd: 200
    daily_alert_usd: 10
    per_session_target_usd: 0.50
    per_agent_max_usd: 2.00
    # Downgrade chain: opus -> sonnet -> haiku -> openrouter/free -> BLOCK
    downgrade_chain: [opus, sonnet, haiku, "openrouter/free"]

  infrastructure:
    auto_scale: true
    smart_start: true              # Lazy-load Docker services when skills need them
    skill_service_map:
      agent-kpis: [mlflow]             # Phase 1: mlflow (pip) for agent metrics
      observability-trace: [mlflow]    # Phase 1: mlflow (pip) for agent metrics
      sdd-apply: [litellm]            # MIGRATED Phase 2: removed bifrost, litellm runs as pip library
      sdd-verify: [litellm]           # MIGRATED Phase 2: removed bifrost, litellm runs as pip library
      sdd-pipeline: [litellm]         # MIGRATED Phase 2: removed bifrost, litellm runs as pip library
      model-routing: [litellm]        # MIGRATED Phase 2: removed bifrost, litellm runs as pip library
      guardrails-validator: [nemo-guardrails]  # MIGRATED Phase 2: runs as pip library in-process
      content-policy: [nemo-guardrails]        # MIGRATED Phase 2: runs as pip library in-process
      memu-sync: [memu]               # MIGRATED Phase 2: runs as pip library
      cognee-search: [cognee]          # MIGRATED Phase 2: runs as pip library
      jupyter-sandbox: [jupyter]       # MIGRATED Phase 2: runs as pip install
      agent-bus: [valkey]
      agent-communication: [valkey]
    services:
      # ADR-058 (2026-04-24): former observability trace-UI service entry
      # removed. Migrated to Phoenix (pip). See `phoenix:` below and ADR-058.
      # ADR-060 (2026-04-24): local-only optional-services policy — the
      # former cloud-only observability entry was removed entirely. Phoenix
      # (pip) is the single observability surface. See ADR-060 and
      # infrastructure-service-catalog.md §Operating Rule.
      nemo_guardrails:
        mode: pip                  # MIGRATED: pip install nemoguardrails>=0.10. Use RailsConfig + LLMRails in-process.
        enabled: false             # ADR-060: opt-in only. Docker path: --profile guardrails
        profile: guardrails        # docker compose --profile guardrails up
        idle_timeout_minutes: 15
      bifrost:
        mode: disabled             # MIGRATED Phase 2: removed in favor of litellm pip library. Bifrost had 11us latency but litellm covers 90% of use cases.
        idle_timeout_minutes: 30
      litellm:
        mode: pip                  # MIGRATED Phase 2: pip install litellm>=1.0. Use litellm.completion() directly or `litellm --config config.yaml` as local process.
      valkey:
        mode: on_demand            # Phase 3: keep as optional Docker. File fallback (agent_bus.py) handles single-session use.
        idle_timeout_minutes: 30
        review_by: 2026-10-01      # Sunset policy (catalog §Sunset Policy) — optional local backend; file fallback always valid
        env_vars:
          VALKEY_URL: "redis://localhost:6379"       # Primary override (agent_bus.py, agent_dashboard.py, agent_output_to_bus.py)
          COS_VALKEY_URL: "redis://localhost:6379"   # Alias — checked if VALKEY_URL unset
      cognee:
        mode: pip                  # MIGRATED Phase 2: pip install cognee>=0.1. Use Python API in-process instead of HTTP server.
        enabled: false             # ADR-060: opt-in only. Docker path: --profile memory
        profile: memory            # docker compose --profile memory up (shared with memu)
        idle_timeout_minutes: 15
        config:
          graph_backend: "${COGNEE_GRAPH_BACKEND:-networkx}"
          vector_store: "${COGNEE_VECTOR_STORE:-lancedb}"
          mcp_enabled: true
      mlflow:
        mode: pip                  # Agent metrics mirror (pip install mlflow-skinny>=2.0)
        config:
          backend_store_uri: "sqlite:///mlflow.db"
          host: "0.0.0.0"
          port: 5000
      phoenix:
        mode: pip                  # ADR-058 (2026-04-24): Arize Phoenix LLM-native trace UI. pip install arize-phoenix>=7.0. Run: phoenix serve (UI at localhost:6006).
        # ADR-058 license correction (2026-05-06): arize-phoenix server is Elastic License 2.0 (since ~v4),
        # NOT Apache 2.0 as originally stated. Operator-installed runtime; not bundled in COS releases.
        # Optional OTel bridge/client packages in the observability lane are Apache 2.0.
        # If a future COS Cloud hosts Phoenix centrally for customers, an Arize commercial license is
        # required (ELv2 "managed service" prohibition). Local-only / operator-installed = within ELv2 scope.
        license: ELv2-server-Apache2-SDK
        review_by: 2026-08-15      # ADR-058 Phase 1/2 adoption window — validates Phoenix covers the former trace-UI role.
        config:
          host: "0.0.0.0"
          port: 6006
          otel_endpoint: "http://localhost:6006/v1/traces"
      memu:
        mode: pip                  # MIGRATED: pip install memu>=2.0. Run: python -m memu.server
        idle_timeout_minutes: 15
        review_by: 2026-06-01      # Sunset policy — MemU sunset deadline, see catalog §Memory "MemU review 2026-06-01"
      # --- Agent Testing & Evaluation (Python packages, not Docker services) ---
      deepeval:
        status: planned                # Python package, not a Docker service
        mode: cli
        config:
          provider: "${DEEPEVAL_LLM_PROVIDER:-anthropic}"
          role: "unit testing, trajectory eval, red teaming"
      ragas:
        status: planned                # Python package, not a Docker service
        mode: cli
        config:
          provider: "${RAGAS_LLM_PROVIDER:-anthropic}"
          role: "memory quality, retrieval eval, synthetic test gen"
      promptfoo:
        status: planned                # Python package / npm CLI, not a Docker service
        mode: cli
        config:
          role: "prompt regression, red teaming CI/CD gate"
      # --- UI & Compute ---
      automaker:
        mode: on_demand
        idle_timeout_minutes: 30
        profile: ui                    # docker compose --profile ui
        review_by: 2026-09-01          # Sunset policy (catalog §Sunset Policy) — optional UI extension; needs product proof path
      jupyter:
        mode: pip                  # MIGRATED: pip install jupyter>=1.0 notebook>=7.0. Run: jupyter lab
        enabled: false             # ADR-060: opt-in only. Docker path: --profile jupyter
        profile: jupyter           # docker compose --profile jupyter up
        idle_timeout_minutes: 30

  compute:
    max_parallel_agents: 5
    agent_timeout_seconds: 300
    batch_size: 5
    prefer_sequential: false

  tokens:
    model_downgrade_threshold_percent: 80
    auto_summarize_at_percent: 70
    skill_cache_ttl_seconds: 300
    rule_compression: aggressive
    result_truncation:
      enabled: true
      max_chars: 5000
      head_chars: 2000
      tail_chars: 1000
      never_truncate_patterns:
        - "FAIL"
        - "ERROR"
        - "panic"
        - "PASS"
        - "coverage:"

  # Removed: dead config that nothing reads (session 2026-04-15)
  # resources.optimization (governor_interval, auto_run, auto_execute) removed

model_capability:
  level: 3                             # 1=basic, 2=good, 3=excellent, 4=autonomous, 5=autonomous+
  auto_disable:
    3: [context-management]
    4: [clarification-gate, assumption-tracking, confidence-gate, model-routing, blast-radius]
    5: [epic-task-detector, scope-proportionality, trust-score-validator,
        claim-validator, tool-loop-detector, consequence-evaluator, infra-intent-detector,
        pre-cleanup-snapshot, architecture-compliance, auto-skill-generator]

# STATUS: implemented
orchestration:
  # Controls which working directory is injected into sub-agent prompts by
  # agent-working-dir-inject.sh (PreToolUse:Agent).
  # isolated_worktree — default: write agents get dedicated ADR-223 worktrees via agent-prelaunch; no main HEAD shift
  # current          — no injection; sub-agent inherits the parent's cwd (worktree if inside one)
