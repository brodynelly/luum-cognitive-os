schema_version: harness-projection.v1
purpose: Declares harness/IDE projection status for Cognitive OS consumer-project
  ACC proof.
status_values:
  implemented: Projection proof exists and ACC may execute it. This means structural
    projection unless proof_level says runtime-smoke or native-lifecycle.
proof_levels:
  structural: Project-local files/configs are generated and shape-tested from official
    docs; runtime execution is not claimed.
  runtime-smoke: A real account-backed or CLI/IDE runtime smoke has been executed
    and recorded.
  native-lifecycle: Native lifecycle hooks/events are projected and tested for the
    harness.
  planned: Harness is in product scope but native projection proof is not implemented
    yet.
  unsupported: Harness is intentionally out of scope for now.
harnesses:
- id: claude
  display_name: Claude Code
  status: implemented
  projection_mode: native-settings
  default_command:
  - python3
  - scripts/cos_init.py
  - --default
  - --harness
  - claude
  settings_paths:
  - .claude/settings.json
  projected_surfaces:
  - hooks
  - rules
  - skills
  proof: temp-consumer-project
  proof_level: native-lifecycle
  limitations:
  - Proof currently covers default profile, not full profile.
  next_action: Keep default/full projection tests current and add promotion proof
    for candidate primitives.
