[pytest]
testpaths = tests
pythonpath = .
timeout = 60
timeout_method = thread
addopts = --tb=line --strict-markers
# pytest-xdist installed for parallel test execution.
# Unit tests are safe to parallelize: `make test-fast` uses -n auto.
# Integration/e2e/chaos share state (tmp dirs, PID files, hook side-effects) — run serial.
# Markers: unit | integration | e2e | chaos | behavior | docker | slow | benchmark | quality
markers =
    unit: Unit tests
    behavior: Behavior tests
    integration: Integration tests
    system: System tests
    docker: Requires Docker
    slow: Slow tests
    e2e: End-to-end tests
    eval_frameworks: Eval framework tests
    arena: Competitive arena tests
    benchmark: Performance benchmark tests
    quality: LLM-evaluated quality tests
    forked: Run in an isolated subprocess (requires pytest-forked; skipped if not installed)
    chaos: Chaos / fault-injection tests
    canary: Canary tests that verify critical post-install invariants
    contract: Product contract tests that validate durable behavior
    timeout(seconds): Per-test hard timeout override used by pytest-timeout and tests/conftest.py
    xdist_group(name): pytest-xdist worker group — all tests with the same name run on the same worker (reduces parallel contention for shell-subprocess timing tests)
