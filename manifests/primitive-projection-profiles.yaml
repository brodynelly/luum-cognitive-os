schema_version: primitive-projection-profiles.v1
purpose: Machine-readable projection profile contract for ACC. Profiles describe which consumer-project primitive surfaces are proven by cos_init.py and which SO-local scripts are profile/install drivers rather than files copied into consumer projects.
profiles:
  default:
    description: Lean default consumer-project profile generated by cos_init.py.
    command_template: python3 scripts/cos_init.py --default --harness {harness}
    distribution: default
    projected_families:
      - hooks
      - skills
      - rules
  full:
    description: Full consumer-project profile generated by cos_init.py for maximum primitive availability.
    command_template: python3 scripts/cos_init.py --full --harness {harness}
    distribution: full
    projected_families:
      - hooks
      - skills
      - rules
projection_classes:
  shared:
    description: Projected in at least one implemented harness/profile and safe to count as consumer-project available.
  default:
    description: Projected by default profile for implemented harnesses.
  full:
    description: Projected only by full profile for implemented harnesses.
  profile-driver:
    description: SO-local installer/profile/settings/doctor script whose consumer proof is successful profile projection, not copying the script into the consumer project.
  maintainer-only:
    description: SO maintainer surface; do not count as consumer-project available unless an explicit projection contract is added.
profile_driver_scripts:
  - path: scripts/apply-efficiency-profile.sh
    class: profile-driver
    source_manifest: manifests/primitive-readiness-protected-install-surfaces.yaml
  - path: scripts/set-security-profile.sh
    class: profile-driver
    source_manifest: manifests/primitive-readiness-protected-install-surfaces.yaml
  - path: scripts/generate-project-settings.sh
    class: profile-driver
    source_manifest: manifests/primitive-readiness-protected-install-surfaces.yaml
  - path: scripts/cos-init.sh
    class: profile-driver
    source_manifest: manifests/primitive-readiness-protected-install-surfaces.yaml
  - path: scripts/cos_init.py
    class: profile-driver
    source_manifest: manifests/primitive-readiness-protected-install-surfaces.yaml
  - path: scripts/cos-bootstrap.sh
    class: profile-driver
    source_manifest: manifests/primitive-readiness-protected-install-surfaces.yaml
  - path: scripts/setup.sh
    class: profile-driver
    source_manifest: manifests/primitive-readiness-protected-install-surfaces.yaml
  - path: scripts/upgrade.sh
    class: profile-driver
    source_manifest: manifests/primitive-readiness-protected-install-surfaces.yaml
  - path: scripts/uninstall.sh
    class: profile-driver
    source_manifest: manifests/primitive-readiness-protected-install-surfaces.yaml
  - path: scripts/create-release.sh
    class: profile-driver
    source_manifest: manifests/primitive-readiness-protected-install-surfaces.yaml
  - path: scripts/cos-core-skills-check.sh
    class: profile-driver
    source_manifest: manifests/primitive-readiness-protected-install-surfaces.yaml
  - path: scripts/deps-update.sh
    class: profile-driver
    source_manifest: manifests/primitive-readiness-protected-install-surfaces.yaml
  - path: scripts/install-garak.sh
    class: profile-driver
    source_manifest: manifests/primitive-readiness-protected-install-surfaces.yaml
  - path: scripts/install-promptfoo.sh
    class: profile-driver
    source_manifest: manifests/primitive-readiness-protected-install-surfaces.yaml
  - path: scripts/cos-config-audit.sh
    class: profile-driver
    source_manifest: manifests/primitive-readiness-protected-install-surfaces.yaml
  - path: scripts/cos-weekly-config-audit.sh
    class: profile-driver
    source_manifest: manifests/primitive-readiness-protected-install-surfaces.yaml
  - path: scripts/cos-doctor-memory-lifecycle.sh
    class: profile-driver
    source_manifest: manifests/primitive-readiness-protected-install-surfaces.yaml
  - path: scripts/cos-doctor-tools.sh
    class: profile-driver
    source_manifest: manifests/primitive-readiness-protected-install-surfaces.yaml
  - path: scripts/cos-doctor-harness.sh
    class: profile-driver
    source_manifest: manifests/primitive-readiness-protected-install-surfaces.yaml
maintainer_only_defaults:
  - pattern: scripts/*
    rationale: Scripts remain SO-local unless projected by cos_init.py or listed as profile-driver scripts above.
