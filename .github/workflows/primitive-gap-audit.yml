name: Primitive Gap Audit

on:
  schedule:
    - cron: '30 12 * * MON'  # every Monday 12:30 UTC, after public metrics
  workflow_dispatch: {}

jobs:
  primitive-gap-snapshot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - name: Generate primitive gap snapshot
        run: |
          python3 scripts/primitive_gap_snapshot.py \
            --trend \
            --trend-path docs/reports/primitive-gap-history.jsonl \
            --markdown docs/reports/primitive-gap-latest.md \
            --regression-report docs/reports/primitive-gap-regressions.md \
            --fail-on-regression \
            --json > docs/reports/primitive-gap-latest.json

      - name: Run documentation duplicate audit
        run: |
          python3 scripts/docs_duplicate_audit.py \
            --baseline docs/reports/docs-duplicate-baseline.json \
            --markdown docs/reports/docs-duplicate-latest.md \
            --fail-new \
            --json > docs/reports/docs-duplicate-latest.json

      - name: Run primitive row audit
        run: |
          python3 scripts/primitive_row_audit.py \
            --json-out docs/reports/primitive-row-audit-latest.json \
            --md-out docs/reports/primitive-row-audit-latest.md

      - name: Run claim-to-proof audit
        run: |
          python3 scripts/claim_proof_audit.py \
            --json-out docs/reports/claim-proof-latest.json \
            --md-out docs/reports/claim-proof-latest.md \
            --fail-unmapped

      - name: Generate reduction backlog
        run: |
          python3 scripts/reduction_backlog.py \
            --row-audit docs/reports/primitive-row-audit-latest.json \
            --claim-audit docs/reports/claim-proof-latest.json \
            --json-out docs/reports/reduction-backlog-latest.json \
            --md-out docs/reports/reduction-backlog-latest.md \
            --fail-nonzero

      - name: Plan hook surface reduction
        run: |
          python3 scripts/primitive_surface_reduce.py \
            --family hooks \
            --plan \
            --json-out docs/reports/primitive-surface-reduction-latest.json \
            --md-out docs/reports/primitive-surface-reduction-latest.md

      - name: Map primitive consumers
        run: |
          python3 scripts/primitive_usage_map.py \
            --target-family scripts \
            --json-out docs/reports/primitive-usage-map-latest.json \
            --md-out docs/reports/primitive-usage-map-latest.md

      - name: Generate generic primitive coverage reports
        run: |
          python3 scripts/primitive_coverage.py \
            --adapter cognitive-os \
            --format json \
            --out docs/reports/primitive-coverage-latest.json
          python3 scripts/primitive_coverage.py \
            --adapter cognitive-os \
            --format markdown \
            --out docs/reports/primitive-coverage-latest.md
          python3 scripts/primitive_coverage.py \
            --adapter cognitive-os \
            --format sarif \
            --out docs/reports/primitive-coverage-latest.sarif

      - name: Upload primitive gap snapshot artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: primitive-gap-snapshot
          path: |
            docs/reports/primitive-gap-latest.json
            docs/reports/primitive-gap-latest.md
            docs/reports/primitive-gap-regressions.md
            docs/reports/primitive-gap-history.jsonl
            docs/reports/docs-duplicate-baseline.json
            docs/reports/docs-duplicate-latest.json
            docs/reports/docs-duplicate-latest.md
            docs/reports/primitive-row-audit-latest.json
            docs/reports/primitive-row-audit-latest.md
            docs/reports/claim-proof-latest.json
            docs/reports/claim-proof-latest.md
            docs/reports/reduction-backlog-latest.json
            docs/reports/reduction-backlog-latest.md
            docs/reports/primitive-surface-reduction-latest.json
            docs/reports/primitive-surface-reduction-latest.md
            docs/reports/primitive-usage-map-latest.json
            docs/reports/primitive-usage-map-latest.md
            docs/reports/primitive-coverage-latest.json
            docs/reports/primitive-coverage-latest.md
            docs/reports/primitive-coverage-latest.sarif

      - name: Commit primitive gap trend
        run: |
          git config user.name "cognitive-os-bot"
          git config user.email "bot@luum.ai"
          git add \
            docs/reports/primitive-gap-latest.json \
            docs/reports/primitive-gap-latest.md \
            docs/reports/primitive-gap-regressions.md \
            docs/reports/primitive-gap-history.jsonl \
            docs/reports/docs-duplicate-latest.json \
            docs/reports/docs-duplicate-latest.md \
            docs/reports/primitive-row-audit-latest.json \
            docs/reports/primitive-row-audit-latest.md \
            docs/reports/claim-proof-latest.json \
            docs/reports/claim-proof-latest.md \
            docs/reports/reduction-backlog-latest.json \
            docs/reports/reduction-backlog-latest.md \
            docs/reports/primitive-surface-reduction-latest.json \
            docs/reports/primitive-surface-reduction-latest.md \
            docs/reports/primitive-usage-map-latest.json \
            docs/reports/primitive-usage-map-latest.md \
            docs/reports/primitive-coverage-latest.json \
            docs/reports/primitive-coverage-latest.md \
            docs/reports/primitive-coverage-latest.sarif
          git diff --staged --quiet || git commit -m "chore(audit): weekly primitive gap snapshot $(date -u +%Y-%m-%d)"
          git push
