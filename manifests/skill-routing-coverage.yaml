schema_version: skill-routing-coverage.v2
purpose: |
  Per-category skill routing coverage with explicit semantic universes.
  v2 replaces v1's flat coverage metric (which mixed categories incorrectly,
  yielding semantically false numbers). v2 separates canonical skills,
  package-bundled, runtime-projection, and auto-generated, each with its own
  routing requirement and coverage measurement.
captured_on: '2026-05-05'
schema_migration_note: |
  v1 reported "86.4% coverage / 160 routed / 25 unrouted" against a flat
  universe of 185 SKILL.md files mixing canonical, runtime-projection, and
  some package-bundled paths. The flat number was misleading: it conflated
  categories with different routing requirements, included some disabled
  skills as "unrouted" (they should be exempt), and missed 16 runtime-
  projection skills entirely (the migration agent excluded the whole
  .cognitive-os/skills/ tree thinking it was all auto-generated).
  v2 restores semantic precision and tracks each category separately.

# ─────────────────────────────────────────────────────────────────────────
# Coverage scope: explicit universes per category
# ─────────────────────────────────────────────────────────────────────────
coverage_scope:

  canonical_skills:
    location: skills/*/SKILL.md
    routing_required: true
    rationale: Primary skill location, source-of-truth for the public router.
    universe_size: 162
    routed_count: 83
    routed_percent: 51.2
    disabled_count: 9
    name_mismatch_count: 3
    eligible_for_routing: 150  # universe - disabled - name_mismatch
    eligible_routed_percent: 54.7

  package_bundled_skills:
    location: packages/*/skills/*/SKILL.md
    routing_required: true
    rationale: Skills bundled with COS packages; routable from the same router.
    universe_size: 74
    routed_count: 21
    routed_percent: 28.4
    disabled_count: 1
    name_mismatch_count: 0
    eligible_for_routing: 73
    eligible_routed_percent: 28.8

  runtime_projection_skills:
    location: .cognitive-os/skills/*/SKILL.md
    excludes_subpath: .cognitive-os/skills/auto-generated/
    routing_required: true
    classified_separately: true
    rationale: |
      Runtime projection of canonical+package skills into the
      .cognitive-os/skills/ tree. Eligible for auto-routing (routing_patterns:
      in frontmatter) — explicit slash invocation works regardless. Most are
      mirrors of canonical/package skills; some are runtime-only
      installations.
    universe_size: 154
    routed_count: 62
    routed_percent: 40.3
    disabled_count: 9
    name_mismatch_count: 2
    eligible_for_routing: 143
    eligible_routed_percent: 42.7

  auto_generated_skills:
    location: .cognitive-os/skills/auto-generated/*/SKILL.md
    routing_required: false
    rationale: |
      Sandbox tier per ADR-133/138 (auto-skill-generator output).
      lifecycle_state: sandbox, distribution: lab. NOT in production
      routing canon. Promotion to advisory tier (and eligibility for routing
      enforcement) requires evidence per ADR-180 (lifecycle promotion
      activation).
    universe_size: 0  # currently no skills in auto-generated path
    routed_count: 0
    routed_percent: 0.0
    disabled_count: 0
    name_mismatch_count: 0
    eligible_for_routing: 0
    eligible_routed_percent: 0.0
    note: ADR-176 SkillStore + ADR-180 promotion ladder will populate this
      class as auto-skill-generator runs and skills accumulate evidence.

# ─────────────────────────────────────────────────────────────────────────
# Exemptions: skills that exist but are intentionally not routed
# ─────────────────────────────────────────────────────────────────────────
exemptions:

  disabled_skills:
    rationale: |
      Skills with `disable-model-invocation: true` in frontmatter. These are
      operator-only invocable (slash command) and explicitly NOT meant to be
      auto-suggested by the orchestrator. Routing requirement = false.
    list:
      - apply-improvements
      - audit-integrity     # validator skill — slash-invoke only
      - bump-version
      - generate-changelog
      - optimize-skill
      - push-release
      - release-os
      - tag-release
      - validate-release
    count: 9

  name_field_mismatch:
    rationale: |
      Skills where the `name:` field in frontmatter differs from the
      directory name. Adding routing_patterns would cause router orphan
      detection to fail (router registers by `name:`, disk detection uses
      directory name). Needs frontmatter cleanup BEFORE routing migration.
      Tracked separately so this doesn't pollute the main backlog.
    list:
      - dir: caveman-compress
        name_field: compress
      - dir: component-classifier
        name_field: primitive-classifier
      - dir: cost-predictor
        name_field: cost-predict
    count: 3
    fix_action: Update each SKILL.md `name:` field to match directory name,
      then run routing-pattern migration normally.

# ─────────────────────────────────────────────────────────────────────────
# Backlog: skills awaiting routing_patterns: migration
# ─────────────────────────────────────────────────────────────────────────
runtime_projection_pending_routing:
  status: routing_patterns_missing
  count: 82  # 143 eligible - 61 eligible routed = 82 pending
  impact:
    explicit_slash_invocation: works
    auto_routing: incomplete
    behavior: |
      Operator can invoke /<skill-name> directly; orchestrator can
      reference by full path. But UserPromptSubmit auto-suggestion via
      lib.skill_router will not include these skills until routing_patterns
      are added.
  resolution_path: |
    Run a migration agent (similar to ADR-174 batch) targeted exclusively
    at .cognitive-os/skills/*/SKILL.md (not under auto-generated/) to add
    routing_patterns: blocks. Use lib.routing_pattern_deriver. Update this
    manifest's runtime_projection_skills.routed_count after completion.

canonical_pending_routing:
  status: routing_patterns_missing
  count: 68  # 150 eligible - 82 eligible routed = 68 pending
  impact: same as runtime_projection_pending_routing

package_bundled_pending_routing:
  status: routing_patterns_missing
  count: 52  # 74 - 21 routed - 1 disabled = 52 pending
  impact: same as runtime_projection_pending_routing

# ─────────────────────────────────────────────────────────────────────────
# Router orphans: skills referenced by router but missing on disk
# ─────────────────────────────────────────────────────────────────────────
primary_router_orphan_allowlist:
  - skill: sdd-new
    routing_class: meta-command
    rationale: Intentional command handled by an orchestration pipeline
      rather than a SKILL.md directory.

# ─────────────────────────────────────────────────────────────────────────
# Profile-aware routing (carried over from v1, still valid)
# ─────────────────────────────────────────────────────────────────────────
profile_routing:
  status: active-profile-aware-ratchet
  profiles:
    lean:
      projected_skills:
        - add-skill
        - adr-tombstone
        - cognitive-os-init
        - cognitive-os-status
      min_routeable_percent: 100
    standard:
      projected_skills:
        - add-skill
        - adr-tombstone
        - agent-kpis
        - code-review
        - cognitive-os-init
        - cognitive-os-status
      min_routeable_percent: 100
    strict:
      projected_skills:
        - add-skill
        - adr-tombstone
        - agent-kpis
        - audit-integrity
        - code-review
        - component-reality-check
        - cognitive-os-init
        - cognitive-os-status
        - security-audit
        - test-contract-repair
      min_routeable_percent: 100
    lab:
      projected_skills:
        - add-skill
        - adr-tombstone
        - agent-kpis
        - arena
        - audit-integrity
        - code-review
        - component-reality-check
        - cognitive-os-init
        - cognitive-os-status
        - security-audit
        - test-contract-repair
      min_routeable_percent: 100

profiles:
  lean:
    min_coverage_percent: 100
  standard:
    min_coverage_percent: 100
  strict:
    min_coverage_percent: 100
  lab:
    min_coverage_percent: 90

# ─────────────────────────────────────────────────────────────────────────
# v1 backward-compat shim (kept so existing tests keep passing during
# migration; will be removed after tests are updated to v2 categorical)
# ─────────────────────────────────────────────────────────────────────────
baseline:
  captured_on: '2026-05-05'
  scope: legacy-flat-aggregate
  note: |
    DEPRECATED — kept only for backward compat with existing tests.
    Use coverage_scope.<category> for accurate measurements.
    The flat number below sums canonical + runtime-projection (excluding
    auto-generated) and treats name_mismatch skills as "not routed" until
    they are fixed.
  min_routed_skill_count: 145  # 83 canonical + 62 runtime-projection
  min_routed_skill_coverage_percent: 45.9  # 145 / (162+154) = 45.9%
  skill_roots:
    - skills/*/SKILL.md
    - .cognitive-os/skills/*/SKILL.md
  max_unrouted_skill_count: 200  # generous; per-category limits live in coverage_scope

profile_note:
  status: pending-profile-aware-ratchet
  canonical_mapping:
    lean:
      - default
      - core
    standard:
      - default+team-extensions
      - core+team
    strict:
      - full
      - core+team+maintainer
    lab:
      - opt-in
      - lab

# Legacy unrouted_skill_allowlist kept as flat union of category backlogs
