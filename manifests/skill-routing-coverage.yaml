baseline:
  captured_on: '2026-05-05'
  scope: legacy-flat-aggregate
  note: 'DEPRECATED — kept only for backward compat with existing tests.

    Use coverage_scope.<category> for accurate measurements.

    The flat number below is a de-duplicated first-party router

    floor across skills/ and .cognitive-os/skills/ (excluding auto-generated),

    kept only as a legacy regression ratchet while category metrics carry truth.

    '
  min_routed_skill_count: 153
  min_routed_skill_coverage_percent: 94.4
  skill_roots:
  - skills/*/SKILL.md
  - .cognitive-os/skills/*/SKILL.md
  max_unrouted_skill_count: 9
