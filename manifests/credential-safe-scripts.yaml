schema_version: credential-safe-scripts.v1
review_date: 2026-05-05
purpose: >-
  Allowlisted local scripts that may be run through a credential-safe wrapper
  which reads selected values from a local env file, passes only approved keys
  to the child process, forces safe runtime flags, redacts stdout/stderr, and
  writes an audit record without secret material.
required_script_fields:
  - id
  - description
  - command
  - command_integrity
  - allowed_env_keys
  - allowed_env_files
  - inherited_env_keys
  - forced_env
  - blocked_env_keys
  - documentation
  - risk_level
  - requires_explicit_approval
  - audit_log
invariants:
  - no_arbitrary_commands
  - pinned_command_integrity
  - no_shell_eval_of_env_file
  - allowlisted_env_keys_only
  - allowlisted_env_files_only
  - sanitized_child_environment
  - bounded_model_visible_output
  - force_child_dotenv_skip_when_applicable
  - redact_stdout_stderr_before_model_output
  - no_secret_values_in_audit
  - explicit_operator_approval_required
scripts:
  - id: qwen-fallback-smoke
    description: >-
      Run the Qwen fallback smoke using credentials loaded by the wrapper from
      the local env file while forcing the child script not to read .env itself.
    command:
      - bash
      - scripts/smoke-qwen-fallback.sh
    command_integrity:
      path: scripts/smoke-qwen-fallback.sh
      sha256: 413b9292047fcdef1b07aad61bb5cc60fd1face7fe80f59be07d16b75519bbce
    allowed_env_keys:
      - ALIBABA_QWEN_API_KEY
      - ALIBABA_QWEN_BASE_URL
      - ALIBABA_QWEN_WORKSPACE_ID
    allowed_env_files:
      - .env
    inherited_env_keys:
      - PATH
      - HOME
      - USER
      - TMPDIR
      - LANG
      - LC_ALL
      - PYTHONPATH
      - VIRTUAL_ENV
    forced_env:
      COS_SKIP_DOTENV: "1"
      _COS_QWEN_DOTENV_LOADED: "1"
    blocked_env_keys:
      - OTHER_SECRET
      - API_TOKEN
      - GITHUB_TOKEN
      - ANTHROPIC_API_KEY
      - OPENAI_API_KEY
    documentation:
      - docs/09-Quality/manual-tests/credential-safe-script-runner.md
      - docs/05-Methodology/runbooks/llm-dispatch.md
    risk_level: high
    requires_explicit_approval: true
    max_output_chars: 20000
    audit_log: .cognitive-os/metrics/credential-safe-runs.jsonl
