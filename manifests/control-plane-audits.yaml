schema_version: control-plane-audits/v1
status: active
owner: platform-safety
policy: detect-first-remediate-second

outputs:
  latest_report: .cognitive-os/reports/control-plane/latest.json
  remediation_queue: .cognitive-os/tasks/control-plane-remediation.jsonl
  metrics_stream: .cognitive-os/metrics/control-plane-audit.jsonl
  state_file: .cognitive-os/runtime/control-plane-audit/findings-state.json

metrics:
  - findings_by_adr
  - time_to_detect
  - time_to_remediate
  - recurrence_count
  - false_positive_rate

remediation:
  doctrine: detect -> propose -> apply only declared safe classes -> measure result
  safe_classes:
    - stale-generated-report
    - missing-generated-index
    - cache-runtime-garbage
  safe_fixes: {}

lanes:
  hook-fast:
    description: Fast non-mutating checks safe for lifecycle hooks.
    max_seconds: 20
    audits:
      - primitive-coherence
      - primitive-behavior
      - postmortem-regressions
  hourly:
    description: Periodic local sweep for primitive drift and postmortem regressions.
    max_seconds: 60
    audits:
      - primitive-coherence
      - primitive-behavior
      - postmortem-regressions
  pre-public:
    description: Pre-public release-readiness sweep.
    max_seconds: 180
    audits:
      - primitive-coherence
      - primitive-behavior
      - postmortem-regressions
      - pre-public-risk

audits:
  primitive-coherence:
    adr: ADR-240
    command: [python3, scripts/primitive-coherence-audit.py, --json]
    expected_schema: primitive-coherence-audit/v1
    consumes_sensitive_values: false
    mutates: false
  primitive-behavior:
    adr: ADR-249
    command: [python3, scripts/primitive-behavior-audit.py, --json]
    expected_schema: primitive-behavior-audit/v1
    consumes_sensitive_values: false
    mutates: false
  postmortem-regressions:
    adr: ADR-247
    command: [python3, scripts/cos-postmortem-regression-audit, --json]
    expected_schema: postmortem-regression-audit/v1
    consumes_sensitive_values: false
    mutates: false
  pre-public-risk:
    adr: ADR-218
    command: [python3, scripts/cos-pre-public-risk-audit, --json]
    expected_schema: pre-public-risk-audit/v1
    consumes_sensitive_values: true
    sensitive_value_sources:
      env_prefixes:
        - COS_HISTORY_SANITIZE_
    mutates: false
