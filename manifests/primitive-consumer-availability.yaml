patterns:
- pattern: scripts/**
  status: so-local-only
  rationale: Scripts are SO-local by default unless exact rows or projection manifests
    classify them as consumer surfaces.
- pattern: hooks/_lib/**
  status: so-local-only
  rationale: Hook libraries are support files projected with hooks, not standalone
    consumer capabilities.
- pattern: hooks/*.sh
  status: so-local-only
  rationale: Unprojected hooks are local optional/runtime surfaces unless cos_init
    projection proves them.
- pattern: rules/*.md
  status: so-local-only
  rationale: Unprojected rules are doctrine/context surfaces unless default/full projection
    proves them.
- pattern: skills/**/SKILL.md
  status: so-local-only
  rationale: Unprojected repo skills are repo-only or maintainer surfaces unless default/full
    projection proves them.
- pattern: .codex/skills/**/SKILL.md
  status: so-local-only
  rationale: Codex workspace skills are local authoring aids, not consumer-project
    projection surfaces.
