# SCOPE: os-only
# Routing model candidate manifest (ADR-298).
#
# Every entry MUST declare an adapter, weights, license, and role.
# License gate: any entry whose license is not in
#   {MIT, BSD, BSD-2-Clause, BSD-3-Clause, Apache, Apache-2.0}
# is REFUSED by the harness before download/load. See ADR-298 + ADR-006.
#
# To add a candidate:
#   1. Append an entry below with verified upstream license string.
#   2. Run `scripts/cos-routing-benchmark --models <new-id>`.
#   3. Append the resulting report path to the model-selection ADR.
schema_version: routing-benchmark-models/v1
models:
  - id: baseline-minilm
    adapter: fastembed-bi-encoder
    model_name: sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2
    license: Apache-2.0
    role: bi-encoder
    note: |
      Current production matcher (ADR-296). Baseline against which all
      candidates must be compared. ~220 MB ONNX INT8.

  - id: bge-m3
    adapter: fastembed-bi-encoder
    model_name: BAAI/bge-m3
    license: MIT
    role: bi-encoder
    note: |
      Multilingual (100+ langs), 1024-dim. Larger (~2.3 GB) but strong
      cross-lingual retrieval per upstream evals. Untested locally.

  - id: multilingual-e5-large
    adapter: fastembed-bi-encoder
    model_name: intfloat/multilingual-e5-large
    license: MIT
    role: bi-encoder
    note: |
      560M params, 1024-dim, 94 languages. Confirmed in FastEmbed
      registry (TextEmbedding.list_supported_models). ~2.24 GB on disk.

  - id: multilingual-mpnet-base
    adapter: fastembed-bi-encoder
    model_name: sentence-transformers/paraphrase-multilingual-mpnet-base-v2
    license: Apache-2.0
    role: bi-encoder
    note: |
      Apache 2.0, ~1.0 GB, 768-dim, 50+ langs. Confirmed in FastEmbed
      registry. Direct upgrade candidate from baseline-minilm (same family,
      larger). Added 2026-05-13 after first benchmark run revealed
      baseline PT/FR precision@1 below 0.75.

  - id: qwen3-embedding-0.6b
    adapter: fastembed-bi-encoder
    model_name: Qwen/Qwen3-Embedding-0.6B
    license: Apache-2.0
    role: bi-encoder
    note: |
      Alibaba/Qwen, released Jun 2025. 0.6B params, 1024-dim, 100+ langs.
      Independent Nov 2025 benchmark: +8% MMTEB vs BGE-M3; ~25ms CPU avg
      on AWS c5.2xlarge (claim, not Apple Silicon). Survey 3/4 consensus.
      Adapter may require namespace allowlist.

  - id: harrier-oss-v1-270m
    adapter: fastembed-bi-encoder
    model_name: microsoft/harrier-oss-v1-270m
    license: MIT
    role: bi-encoder
    note: |
      Microsoft, released 30 Mar 2026. 270M params, 32K context, 94 langs.
      Claimed #1 MMTEB v2 at release (66.5). Smallest of the SOTA tier.
      Loader status with fastembed unverified; benchmark may report
      legitimate load-failure if not in registry.

  - id: bge-reranker-v2-m3
    adapter: fastembed-bi-encoder  # placeholder — needs cross-encoder adapter
    model_name: BAAI/bge-reranker-v2-m3
    license: Apache-2.0
    role: reranker
    note: |
      Cross-encoder reranker. Practitioner-validated ~130ms/16-pair batch
      on CPU. ADAPTER MISMATCH: requires a cross-encoder adapter not yet
      implemented (current adapter is bi-encoder). Entry kept for license
      gate verification; harness will refuse to run it cleanly until the
      cross-encoder adapter lands. See ADR-298 §Roadmap.
