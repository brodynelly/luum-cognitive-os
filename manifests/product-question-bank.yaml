    - docs/component-sources.md
    related_claims:
    - competitor_positioning_factcheck_required
    - generic_tracing_is_not_unique
    - differentiator_behavioral_governance
    answer_short: Against adjacent tools, COS should not claim generic tracing is
      unique; it should claim evidence-backed behavioral governance for coding agents,
      with named comparisons fact-checked before publication.
    answer_long: The safer competitive frame is that observability and agent-step
      tracing are increasingly commodity, while COS focuses on whether agent work
      is verified, coordinated, cost/risk-aware, and receipt-backed before it lands.
      For tools already analyzed by COS, start from the local Tech Radar, external-tool
      adoption manifests, and vs-alternatives/component-source docs before browsing.
      Use internet research only for volatile named-competitor facts or publication-grade
      current comparisons.
    recommended_pitch: Tracing tells you what happened; Cognitive OS tells you whether
      the agent proved the work and stayed inside operational boundaries.
    unsafe_claims_to_avoid:
    - no competitor has cross-IDE observability
    - agent-step tracing is unique to COS
    - all named competitor claims are current without fresh research
    - bypassing local Tech Radar and re-researching already-analyzed tools by default
    gaps:
    - Consult the local Tech Radar and external-tool manifests before browsing for tool comparisons.
    - Run a fresh competitor fact-check before publishing volatile named comparisons.
  vanilla_usage:
    category: adoption-boundary
    aliases:
    - vanilla
    - configuracion vanilla
    - configuración vanilla
    - cuando uso vanilla
    - cuándo uso vanilla
    - cuando no uso cognitive os
    - cuándo no uso cognitive os
    - cuando uso claude code sin cos
    - when should i use vanilla
    - when not to use cognitive os
    keywords:
    - vanilla
    - default
    - sin cos
    - without cos
    - overhead
    - throwaway
    - exploratory
    approved_sources:
    - docs/business/cos-vs-vanilla-dx-review.md
    - docs/vs-alternatives.md
    - docs/adoption-tiers.md
    - docs/auto-repair-system.md
    related_claims:
    - vanilla_boundary
    - differentiator_behavioral_governance
    - claim_verification_wedge
    answer_short: Use vanilla IDE-agent setups for small, low-risk, one-agent/one-IDE, exploratory or throwaway work; use Cognitive OS when agent work creates trust, coordination, audit, cost, rollback, or cross-session risk.
    answer_long: Cognitive OS is not the right default for every repository. Vanilla Claude Code, Codex, Cursor, or similar setups usually win when a solo developer is doing a small change in one IDE/session and the cost of governance is higher than the risk. COS becomes useful when the repo has parallel agents or sessions, compliance/publication risk, fragile production code, repeated verification failures, cost/accountability concerns, or a need to remember and replay decisions across time.
    recommended_pitch: Stay vanilla for low-risk speed; add Cognitive OS when you need evidence, coordination, and recoverability.
    unsafe_claims_to_avoid:
    - COS is always better than vanilla IDE agents
    - every repository needs the full SO
    - vanilla workflows are unsafe by default
    - governance overhead is free
    gaps:
    - The exact adoption tier should be chosen from project risk and team workflow, not from a generic product claim.
  runtime_surfaces:
