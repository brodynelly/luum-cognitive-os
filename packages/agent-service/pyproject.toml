[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "agent-service"
version = "0.1.0"
description = "Agent Runtime Web Service — HTTP + SSE surface for the Luum Cognitive OS agent runtime (ADR-291)."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "FSL-1.1-MIT" }
authors = [{ name = "Luum Cognitive OS" }]
dependencies = [
    "fastapi>=0.110",
    "uvicorn[standard]>=0.27",
    "pydantic>=2.5",
]

[project.optional-dependencies]
testing = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "httpx>=0.27",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
