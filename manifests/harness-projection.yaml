  - .vscode/mcp.json
  projected_surfaces:
  - instructions
  - mcp-placeholder
  - rules-reference
  - skills-reference
  proof: temp-consumer-project-structural
  limitations:
  - Structural workspace file proof only; no GitHub account/Copilot extension runtime
    invocation in automated tests.
  - VS Code Copilot custom instructions are prompt/context surfaces, not native COS
    lifecycle hooks.
  next_action: Add optional VS Code smoke with installed Copilot extension when an
    account-backed test host exists.
  default_command:
  - python3
  - scripts/cos_init.py
  - --default
  - --harness
  - vscode-copilot
