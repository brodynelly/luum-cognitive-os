# Lane-sharded test matrix (ADR-100 §CI distribution)
#
# Each lane runs on a dedicated GitHub Actions runner so the developer's local
# machine never has to execute the full broad sweep. The lane registry
# .cognitive-os/test-lanes.yaml is the single source of truth.
#
# Optional lanes (arena, benchmark, quality) are NOT in this default matrix.
# Enable them with workflow_dispatch + the include-optional input.

name: test-lanes

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      include-optional:
        description: "Include optional lanes (arena, benchmark, quality)"
        required: false
        default: "false"
        type: boolean

concurrency:
  group: test-lanes-${{ github.ref }}
  cancel-in-progress: true

jobs:
  parallel-safe:
    name: lane (${{ matrix.lane }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        lane: [unit, audit, contract, architecture, system]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install uv
          uv pip install --system -e ".[testing]"
      - name: Build cos-test
        run: |
          cd cmd/cos-test && go build -o ../../cos-test .
      - name: Run lane
        env:
          CI: "true"
          COS_PYTEST_RERUNS: "1"
          COS_PYTEST_RERUNS_DELAY: "0"
        run: ./cos-test cluster --lane "${{ matrix.lane }}"
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-run-${{ matrix.lane }}
          path: .cognitive-os/reports/test-runs/latest/
          retention-days: 7

  serial-stateful:
    name: lane (${{ matrix.lane }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        lane: [integration, behavior, hooks, e2e, chaos]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install uv
          uv pip install --system -e ".[testing]"
      - name: Build cos-test
        run: |
          cd cmd/cos-test && go build -o ../../cos-test .
      - name: Run lane
        env:
          CI: "true"
          COS_PYTEST_RERUNS: "1"
          COS_PYTEST_RERUNS_DELAY: "0"
        run: ./cos-test cluster --lane "${{ matrix.lane }}"
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-run-${{ matrix.lane }}
          path: .cognitive-os/reports/test-runs/latest/
          retention-days: 7

  optional-lanes:
    name: optional lane (${{ matrix.lane }})
    if: github.event_name == 'workflow_dispatch' && inputs.include-optional == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        lane: [arena, benchmark, quality]
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install uv
          uv pip install --system -e ".[testing]"
      - name: Build cos-test
        run: |
          cd cmd/cos-test && go build -o ../../cos-test .
      - name: Run optional lane
        env:
          CI: "true"
          COS_RUN_ARENA: "1"
          COS_RUN_BENCHMARK: "1"
          COS_RUN_QUALITY: "1"
        run: ./cos-test cluster --lane "${{ matrix.lane }}"
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-run-${{ matrix.lane }}
          path: .cognitive-os/reports/test-runs/latest/
          retention-days: 7
