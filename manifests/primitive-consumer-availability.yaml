schema_version: primitive-consumer-availability.v1
purpose: Explicit ACC classification for lifecycle-declared consumer candidates whose consumer-project availability cannot be inferred from projection output alone.
status_values:
  projectable-needs-driver: Intended consumer-project surface, but no install/profile/harness proof exists yet; remains partial.
  maintainer-only: SO maintainer primitive; represented and documented, but not a consumer-project surface.
  so-local-only: Local-only helper or context surface; not consumer-project debt.
  shell-ci-candidate: Candidate CLI/shell surface for future shell/CI projection proof; remains partial until projected.
