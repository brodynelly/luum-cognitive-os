name: "@luum/advisor-mcp"
version: "1.0.1"
cos_version: ">=0.2.0"
description: "Optional external-advisor MCP server for mid-task strategic consultation"
authors: ["luum"]
license: "Apache-2.0"
keywords: ["mcp", "advisor", "strategic", "multi-provider", "llm"]
type: package
category: agent-coordination
provides:
    - advisor-mcp
exports:
    - source: "advisor_server.py"
      type: mcp-server
      description: "FastMCP server exposing the external consult_advisor tool"
dependencies:
    fastmcp:
        version: ">=2.0.0"
        required: true
        install: "pip install fastmcp"
    anthropic:
        version: ">=0.40.0"
        required: false
        install: "pip install anthropic"
    openai:
        version: ">=1.50.0"
        required: false
        install: "pip install openai"
    google-generativeai:
        version: ">=0.8.0"
        required: false
        install: "pip install google-generativeai"
    litellm:
        version: ">=1.0.0"
        required: false
        install: "pip install litellm"
    httpx:
        version: ">=0.27.0"
        required: false
        install: "pip install httpx"
tools:
    - name: consult_advisor
      description: "Consult a strategic advisor model for architectural guidance mid-task"
      inputs:
        - context: "What the executor has learned so far"
        - question: "Specific strategic question for the advisor"
        - provider: "auto | local | litellm | openai | google | anthropic (default: auto)"
        - model: "Override model (empty = provider default)"
        - max_tokens: "Max response tokens (default: 500)"
providers:
    auto:
        default_model: null
        env_var: null
        notes: "Safe resolver: local, explicit LiteLLM, OpenAI, Google, then policy-gated Anthropic"
    anthropic:
        default_model: "claude-opus-4-6"
        env_var: "ANTHROPIC_API_KEY"
        notes: "Requires llm_providers.claude_sdk.enabled: true"
    openai:
        default_model: "gpt-4o"
        env_var: "OPENAI_API_KEY"
    google:
        default_model: "gemini-2.5-pro"
        env_var: "GOOGLE_API_KEY"
    litellm:
        default_model: "gpt-4o"
        env_var: null
        notes: "Routes to any model via LiteLLM proxy"
    local:
        default_model: "llama3"
        env_var: "OLLAMA_URL"
        notes: "Calls Ollama at localhost:11434 by default"
metrics:
    log_file: ".cognitive-os/metrics/advisor-consultations.jsonl"
