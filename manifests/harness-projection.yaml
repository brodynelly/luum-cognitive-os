schema_version: harness-projection.v1
purpose: Declares harness/IDE projection status for Cognitive OS consumer-project
  ACC proof.
status_values:
  implemented: Projection proof exists and ACC may execute it.
  planned: Harness is in product scope but native projection proof is not implemented
    yet.
  unsupported: Harness is intentionally out of scope for now.
harnesses:
- id: claude
  display_name: Claude Code
  status: implemented
  projection_mode: native-settings
  default_command:
  - python3
  - scripts/cos_init.py
  - --default
  - --harness
  - claude
  settings_paths:
  - .claude/settings.json
  projected_surfaces:
  - hooks
  - rules
  - skills
  proof: temp-consumer-project
  limitations:
  - Proof currently covers default profile, not full profile.
  next_action: Keep default/full projection tests current and add promotion proof
    for candidate primitives.
- id: codex
  display_name: OpenAI Codex
  status: implemented
  projection_mode: settings-file
  default_command:
  - python3
  - scripts/cos_init.py
  - --default
  - --harness
  - codex
  settings_paths:
  - .codex/hooks.json
  projected_surfaces:
  - hooks
  - rules
  - skills
  proof: temp-consumer-project
  limitations:
  - Runtime parity depends on Codex-supported hook/settings semantics.
  - Proof currently covers default profile, not full profile.
  next_action: Expand Codex runtime parity proof and full-profile projection proof.
- id: cursor
  display_name: Cursor
  status: implemented
  projection_mode: cursor-project-rules-and-mcp
  settings_paths:
  - .cursor/rules/cognitive-os.mdc
  - .cursor/mcp.json
  projected_surfaces:
  - rules
  - instructions
  - mcp-placeholder
  - skills-reference
  proof: temp-consumer-project-structural
  limitations:
  - Structural project rule/MCP file proof only; no Cursor account-backed runtime
    invocation in automated tests.
  - No native COS lifecycle hook parity is claimed.
  next_action: Add optional Cursor runtime smoke once a licensed/manual test host
    is available.
  default_command:
  - python3
  - scripts/cos_init.py
  - --default
  - --harness
  - cursor
- id: windsurf
  display_name: Windsurf
  status: planned
  projection_mode: ide-rules-or-wrapper
  settings_paths:
  - .windsurf/rules
  - .windsurf/mcp.json
  projected_surfaces:
  - rules
  - skills
  - mcp
  proof: none
  limitations:
  - Native lifecycle hook semantics are not signed.
  - Projection driver has not been implemented.
  next_action: Define Windsurf settings/rules/MCP projection driver and temp-project
    proof.
