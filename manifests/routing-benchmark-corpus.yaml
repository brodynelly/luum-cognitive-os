# SCOPE: os-only
# AUTO-GENERATED seed corpus for ADR-298 routing-benchmark harness.
# English-only corpus: this benchmark measures routing over repository-approved
# English prompts, not multilingual routing capability.
# Refine prompts manually as needed — the harness measures regressions,
# not absolute truth. Stable order, deterministic hash.
#
# Regenerate (LLM-assisted, full skill surface) via:
#   scripts/cos-routing-benchmark --regenerate-corpus
#
# Schema:
#   schema_version: routing-benchmark-corpus/v1
#   skills:
#     <skill-name>:
#       description: <SKILL.md description, source of truth>
#       prompts:
#         en: [...]
schema_version: routing-benchmark-corpus/v1
skills:
  product-answer:
    description: |
      Answer COS product/commercial questions (differentiator, moat, wedge,
      ICP, pricing, competitors, pitch, positioning) from cached ADR-282
      evidence cards rather than broad repo research.
    prompts:
      en:
        - "what is our differentiator?"
        - "what's the COS moat versus competitors?"
        - "give me the product pitch"
        - "what is our ICP?"
        - "answer a product question: what's our wedge?"
  security-audit:
    description: |
      Run a security audit of the current changes: scan for secrets, injection
      risks, license-violation imports, and unsafe defaults.
    prompts:
      en:
        - "run a security audit on the current branch"
        - "scan my changes for secrets and vulnerabilities"
        - "audit this code for security issues"
        - "check for hardcoded credentials"
        - "do a security review"
  run-tests:
    description: |
      Execute the project test suite (or a focused subset) and report
      pass/fail counts, durations, and failing test names.
    prompts:
      en:
        - "run the tests"
        - "execute the unit test suite"
        - "run pytest"
        - "verify tests pass"
        - "kick off the test run"
  code-review:
    description: |
      Perform an adversarial code review of staged or recent changes: flag
      bugs, design smells, missing tests, and unsafe patterns.
    prompts:
      en:
        - "review my code"
        - "do a code review on this PR"
        - "review the staged changes"
        - "give me a critique of my latest commit"
        - "review code adversarially"
  deep-research:
    description: |
      Conduct deep, multi-source research on a topic and produce a structured
      report with citations and contradictions surfaced.
    prompts:
      en:
        - "do deep research on this topic"
        - "research how X is typically implemented"
        - "produce a deep research report"
        - "investigate this question thoroughly"
        - "build a research dossier"
  systematic-debugging:
    description: |
      Apply a systematic debugging protocol — reproduce, bisect, hypothesise,
      verify — to root-cause a bug rather than guess-fixing.
    prompts:
      en:
        - "help me systematically debug this"
        - "root-cause this bug"
        - "apply systematic debugging"
        - "bisect this regression"
        - "find the real root cause"
  pr-review:
    description: |
      Review a pull request end-to-end: change correctness, test coverage, doc
      updates, and merge readiness.
    prompts:
      en:
        - "review this PR"
        - "do a pull request review"
        - "is this PR ready to merge?"
        - "evaluate this PR for merge"
        - "review pull request"
  cos-status:
    description: |
      Show overall Cognitive OS status — active sessions, pending tasks, queue
      depth, recent errors, KPI snapshot.
    prompts:
      en:
        - "what's the COS status?"
        - "show cognitive os status"
        - "give me an OS status snapshot"
        - "current state of the cognitive OS?"
        - "cos status please"
  add-skill:
    description: |
      Create or register a new skill in the project — scaffold SKILL.md, wire
      routing, and update the registry.
    prompts:
      en:
        - "add a new skill"
        - "create a skill called foo"
        - "register a new skill"
        - "scaffold a skill"
        - "I want to add a skill"
  sdd-init:
    description: |
      Initialise Spec-Driven Development in this project — detect stack,
      conventions, and bootstrap the active persistence backend.
    prompts:
      en:
        - "initialise SDD in this project"
        - "sdd init"
        - "bootstrap spec-driven development here"
        - "set up SDD"
        - "configure SDD for this repo"
