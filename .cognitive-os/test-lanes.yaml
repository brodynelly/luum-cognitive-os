# Test lane registry — source of truth for parallelism. ADR-072. Consumers: scripts/pytest-with-summary.sh, cmd/cos-test.
lanes:
  unit:
    paths: [tests/unit/]
    parallel: true
    stateful_reason: ""
    # Exclude perf-budget tests (test_completion_gate_perf, test_efficiency_*,
    # test_rate_limit_protection, test_dispatch_gate_perf) — they measure
    # latency under tight budgets that flake under -n auto CPU contention.
    # Run them explicitly via: cos-test cluster --lane unit -m "unit and benchmark"
    marker_exclude: benchmark
  audit:
    paths: [tests/audit/]
    parallel: false
    stateful_reason: "Install-touching tests (test_install_scripts.py Layer 3-4) execute hooks/self-install.sh and cos-init.sh against COS_SOURCE_DIR=PROJECT_ROOT (the real repo). Under -n auto, multiple xdist workers walk rules/ skills/ hooks/ of the same source tree concurrently while the hooks rsync into per-worker tmp dirs — causes >20 intermittent flakes. Diagnosed 2026-04-30 (engram topic_key adr-072/install-flakes-rootcause). Surgical xdist_group fix tracked as follow-up; flipping to serial is the safety floor."
  contract:
    paths: [tests/contracts/]
    parallel: false
    stateful_reason: "test_self_install_no_container_spawn runs SessionStart hooks with cwd=_repo_root() and CLAUDE_PROJECT_DIR=_repo_root() — concurrent xdist workers race on .git/config.lock when self-install writes git config. Same root cause as audit lane (real repo root shared across workers). Diagnosed 2026-04-30."
  integration:
    paths: [tests/integration/]
    parallel: false
    stateful_reason: "Heterogeneous lane: live Engram/Phoenix/session workflows, TCP-port waits, installer subprocesses. Explicit non-Docker lane; default broad excludes it to keep CI/local defaults bounded."
    marker_exclude: docker
    optional: true
  integration-docker:
    paths: [tests/integration/]
    parallel: false
    stateful_reason: "Docker/testcontainers integration subset. Explicit only; requires COS_ALLOW_DOCKER_TESTS=1."
    marker_include: docker
    optional: true
  behavior:
    paths: [tests/behavior/]
    parallel: false
    stateful_reason: "hook chain state"
  hooks:
    paths: [tests/hooks/]
    parallel: false
    stateful_reason: ".claude/settings.json mutation"
  e2e:
    paths: [tests/e2e/]
    parallel: false
    stateful_reason: "full system"
    optional: true
  chaos:
    paths: [tests/chaos/]
    parallel: false
    stateful_reason: "fault injection"
  architecture:
    paths: [tests/architecture/]
    parallel: true
    stateful_reason: ""
  system:
    paths: [tests/system/]
    parallel: true
    stateful_reason: ""
  smoke:
    paths: [tests/smoke/]
    parallel: false
    stateful_reason: "End-to-end smoke validation: full system startup, opt-in only via cos-smoke entry point"
    optional: true

  # Opt-in lanes: not run by default, require explicit env flags or invocation.
  # smoke/arena/benchmark/quality are intentionally excluded from cos-test broad
  # unless --include-optional is passed. These entries reserve the lane name and
  # parallelism contract without committing the default broad sweep to full
  # startup, cost-bearing, or non-deterministic checks on every invocation.
  arena:
    paths: [tests/arena/]
    parallel: false
    stateful_reason: "Competitive arena benchmarks: opt-in via COS_RUN_ARENA=1, real LLM calls, non-deterministic"
    optional: true
  benchmark:
    paths: [tests/benchmark/]
    parallel: false
    stateful_reason: "Performance benchmarks: opt-in via COS_RUN_BENCHMARK=1, timing-sensitive (cannot share CPU)"
    optional: true
  quality:
    paths: [tests/quality/]
    parallel: false
    stateful_reason: "LLM-evaluated quality tests: opt-in via COS_RUN_QUALITY=1, real model calls, cost-bounded"
    optional: true
