# Cognitive OS — Verification-commands template
#
# This file is the operator-side configuration consumed by the
# `verification-before-completion` skill (and any tooling that asks
# "what command proves this service still works?"). Cognitive OS itself
# ships ZERO service inventory — the real per-service commands live
# only in your private config.
#
# === Where to install ===
#
# Copy this file to:
#
#     .cognitive-os/private/verification-commands.yaml
#
# That path is gitignored (per top-level .gitignore: `.cognitive-os/*`),
# so your service identifiers never enter git history.
#
# Override the path with COS_VERIFICATION_COMMANDS_FILE if you keep
# config elsewhere.
#
# === Format ===
#
# A list of `services` entries. Each entry has:
#   name:    canonical label for the service (used in reports)
#   path:    repo-relative path to the service directory
#   command: shell command run from `path` that exits 0 iff the
#            service's own verification passes (test/lint/build)
#   tags:    optional list — e.g. ["test"], ["lint"], ["build"]
#            (consumers can filter by tag; default = run all)
#
# === Example contents (REPLACE BEFORE USE) ===
#
# services:
#   - name: payments-api
#     path: services/payments-api
#     command: yarn test
#     tags: [test]
#
#   - name: billing-worker
#     path: workers/billing
#     command: go test ./...
#     tags: [test]
#
#   - name: web-frontend
#     path: web
#     command: yarn build && yarn test
#     tags: [test, build]
#
# === If no file is provided ===
#
# Tooling MUST fail open: emit a warning ("no verification commands
# configured") and continue. It is NOT a hard error to lack this file —
# Cognitive OS does not assume any particular service topology.
#
# === Privacy ===
#
# Service names can themselves be sensitive (internal codenames).
# Treat .cognitive-os/private/verification-commands.yaml the same as
# blocked-strings.txt: keep it out of chat logs, issue trackers, and
# LLM prompt context.
