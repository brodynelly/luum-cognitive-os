schema_version: dependency-adoption-evidence/v1
status: active
owner: platform-safety
policy:
  source: ADR-208 (Dependency Adoption Gate)
  pairs_with: manifests/feature-tool-due-diligence.yaml
  evidence_required_for: pyproject.toml additions, requirements.txt additions, packages/*/pyproject.toml additions
adoptions:
  - package: browser-use
    version_constraint: ">=0.12.6,<0.13"
    consumer: pyproject.toml ([web-automation] extra)
    owner_adr: ADR-288
    due_diligence_id: web-automation-adapter
    license: MIT
    integration_pattern: adapter (lib/browser_use_adapter.py) + router (lib/web_automation_router.py) + skill (skills/browser-task/)
    kill_switch: COS_DISABLE_WEB_AUTOMATION=1
    rationale: Industry-leading LLM-driven web automation (93.7k stars); building Playwright wrapper from scratch would reinvent accessibility-tree + replan-loop primitives.
    audit_link: docs/02-Decisions/adrs/ADR-288-web-automation-adapter-for-dispatch.md
  - package: fastapi
    version_constraint: ">=0.110"
    consumer: packages/agent-service/pyproject.toml
    owner_adr: ADR-291
    due_diligence_id: agent-runtime-web-service
    license: MIT
    integration_pattern: web service framework for agent runtime HTTP+SSE protocol facade
    rationale: De-facto Python ASGI framework with automatic OpenAPI; building HTTP+SSE+OpenAPI from stdlib is wasted effort.
    audit_link: docs/02-Decisions/adrs/ADR-291-agent-runtime-web-service.md
  - package: uvicorn
    version_constraint: ">=0.27"
    consumer: packages/agent-service/pyproject.toml
    owner_adr: ADR-291
    due_diligence_id: agent-runtime-web-service
    license: BSD-3-Clause
    integration_pattern: ASGI server for agent-service FastAPI app
    rationale: Reference ASGI server for FastAPI; no realistic alternative for production deployment.
    audit_link: docs/02-Decisions/adrs/ADR-291-agent-runtime-web-service.md
  - package: pydantic
    version_constraint: ">=2.0"
    consumer: pyproject.toml (core)
    owner_adr: trust-report-schema core dependency
    due_diligence_id: trust-report-parser-core
    license: MIT
    integration_pattern: lib/trust_report_parser.py and trust-score validator hooks import Pydantic models from the core runtime environment.
    rationale: Pydantic is already approved for ADR-291 agent-service schemas; promoting it to the root core dependency keeps self-host hooks and tests deterministic when trust-report parsing runs outside optional package extras.
    audit_link: tests/unit/test_trust_report_parser.py
  - package: pydantic
    version_constraint: ">=2.5"
    consumer: packages/agent-service/pyproject.toml
    owner_adr: ADR-291
    due_diligence_id: agent-runtime-web-service
    license: MIT
    integration_pattern: typed request/response schemas for all 26 agent-service endpoints (25 distinct paths)
    rationale: De-facto Python type-validation library bundled with FastAPI; alternative would mean rewriting all schemas from scratch.
    audit_link: docs/02-Decisions/adrs/ADR-291-agent-runtime-web-service.md
  - package: fastembed
    version_constraint: ">=0.6,<0.9"
    consumer: pyproject.toml ([semantic-routing] extra)
    owner_adr: ADR-296
    due_diligence_id: semantic-skill-routing
    license: Apache-2.0
    integration_pattern: embedding engine for lib/semantic_skill_matcher.py — multilingual ONNX (sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2) loaded lazily, catalog cached on disk under .cognitive-os/cache/semantic-router/
    kill_switch: COS_DISABLE_SEMANTIC_ROUTING=1
    rationale: |
      Replaces the prior Jaccard token-overlap matcher which silently
      returned zero signal across languages (Spanish prompt vs English
      corpus). CPU-only ONNX INT8 with no torch dependency keeps cold
      install lightweight; multilingual model covers EN/ES/PT/DE/FR/IT
      natively. The originally surveyed wrapper (aurelio-labs/semantic-router)
      is not viable on current PyPI (stuck at 0.0.3, no Route/RouteLayer
      symbols); the routing arithmetic is small enough to own.
    audit_link: docs/02-Decisions/adrs/ADR-296-language-agnostic-semantic-routing.md
  - package: rich
    version_constraint: ">=14.3.1,<15"
    consumer: pyproject.toml (core)
    owner_adr: ADR-288  # constraint relaxed because of ADR-288's browser-use pin
    due_diligence_id: rich-cli-rendering
    license: MIT
    integration_pattern: TTY rendering already in repository (status lines, panels, tables) — no NEW adoption, just constraint relaxation
    rationale: |
      browser-use==0.12.6 (latest on PyPI as of 2026-05-13) hard-pins
      rich==14.3.1, which made `uv sync --extra semantic-routing`
      unresolvable when the project advertised `rich>=15`. Dropping the
      floor to >=14.3.1 unblocks the canonical install path for ADR-296
      without changing runtime behaviour (no rich-15-exclusive features
      were in use). Ceiling lifts when browser-use ships rich-15 compat.
    audit_link: docs/02-Decisions/adrs/ADR-296-language-agnostic-semantic-routing.md
# 2026-05-13: revalidated entries above against the manifest commit landing
# (root pyproject.toml [web-automation] extra + packages/agent-service/pyproject.toml).
# Endpoint count corrected to 26 ops / 25 distinct paths after csrf-token removal
# in the security pass (see ADR-291 §Security).
  - package: pyrefly
    version_constraint: ">=1.0,<1.1"
    consumer: pyproject.toml ([typecheck] extra)
    owner_adr: radar-pyrefly-2026-05-15
    due_diligence_id: python-typecheck-agentic-loop
    license: MIT
    integration_pattern: advisory CLI gate via scripts/cos-pyrefly-pilot and make typecheck-pyrefly; no runtime import
    rationale: Fast static Python type/API-shape checker for agentic loops; COS owns advisory/enforcement policy and receipts while Pyrefly supplies commodity type analysis.
    audit_link: docs/06-Daily/reports/external-tools-radar-pyrefly-addendum-2026-05-15.md

  - package: lingua-language-detector
    version_constraint: ">=2.0"
    consumer: pyproject.toml ([audit] and [testing] extras)
    owner_adr: English-only repository policy
    due_diligence_id: english-only-content-audit-v2
    license: Apache-2.0
    integration_pattern: scripts/english_only_content_audit.py uses lazy paragraph-level language detection for Markdown, YAML, JSON, and other prose files.
    rationale: Static keyword scanning missed mixed-language repository prose; lingua provides deterministic local language detection without network calls.
    audit_link: tests/unit/test_english_only_content_audit.py
  - package: tree-sitter
    version_constraint: ">=0.23"
    consumer: pyproject.toml ([audit] and [testing] extras)
    owner_adr: English-only repository policy
    due_diligence_id: english-only-content-audit-v2
    license: MIT
    integration_pattern: scripts/english_only_content_audit.py parses source files so comments and string literals can be checked without treating identifiers as prose.
    rationale: Source-aware scanning avoids both missed non-English comments and false positives from identifier names.
    audit_link: tests/unit/test_english_only_content_audit.py
  - package: tree-sitter-python
    version_constraint: any compatible release
    consumer: pyproject.toml ([audit] and [testing] extras)
    owner_adr: English-only repository policy
    due_diligence_id: english-only-content-audit-v2
    license: MIT
    integration_pattern: Python grammar for scripts/english_only_content_audit.py source extraction.
    rationale: Required for Python comment/string scanning in the English-only audit.
    audit_link: tests/unit/test_english_only_content_audit.py
  - package: tree-sitter-typescript
    version_constraint: any compatible release
    consumer: pyproject.toml ([audit] and [testing] extras)
    owner_adr: English-only repository policy
    due_diligence_id: english-only-content-audit-v2
    license: MIT
    integration_pattern: TypeScript and TSX grammars for scripts/english_only_content_audit.py source extraction.
    rationale: Required for TypeScript/TSX comment/string scanning in the English-only audit.
    audit_link: tests/unit/test_english_only_content_audit.py
  - package: tree-sitter-javascript
    version_constraint: any compatible release
    consumer: pyproject.toml ([audit] and [testing] extras)
    owner_adr: English-only repository policy
    due_diligence_id: english-only-content-audit-v2
    license: MIT
    integration_pattern: JavaScript and JSX grammar for scripts/english_only_content_audit.py source extraction.
    rationale: Required for JavaScript/JSX comment/string scanning in the English-only audit.
    audit_link: tests/unit/test_english_only_content_audit.py
  - package: tree-sitter-go
    version_constraint: any compatible release
    consumer: pyproject.toml ([audit] and [testing] extras)
    owner_adr: English-only repository policy
    due_diligence_id: english-only-content-audit-v2
    license: MIT
    integration_pattern: Go grammar for scripts/english_only_content_audit.py source extraction.
    rationale: Required for Go comment/string scanning in the English-only audit.
    audit_link: tests/unit/test_english_only_content_audit.py
  - package: tree-sitter-bash
    version_constraint: any compatible release
    consumer: pyproject.toml ([audit] and [testing] extras)
    owner_adr: English-only repository policy
    due_diligence_id: english-only-content-audit-v2
    license: MIT
    integration_pattern: Bash grammar for scripts/english_only_content_audit.py source extraction.
    rationale: Required for shell hook comment/string scanning in the English-only audit.
    audit_link: tests/unit/test_english_only_content_audit.py

  - package: bun
    version_constraint: ">=1.3.14"
    consumer: tracked JavaScript package roots (`package.json` packageManager fields and `bun.lock` files)
    owner_adr: Bun canonical package-manager policy
    due_diligence_id: bun-canonical-js-package-manager
    license: MIT
    integration_pattern: first-party JavaScript package manager for dashboard and examples; enforced by scripts/check-bun-install-policy.py and .githooks/pre-commit
    rationale: Standardizes installs on one modern package manager, replaces npm lock drift with Bun locks, and keeps lifecycle scripts disabled by default through bunfig.toml `install.ignoreScripts = true`.
    audit_link: docs/09-Quality/security/supply-chain.md

  - package: next/react/lucide-react/express
    version_constraint: existing package.json ranges locked by bun.lock
    consumer: dashboard/package.json and examples/hello-world/package.json
    owner_adr: Bun canonical package-manager policy
    due_diligence_id: bun-lock-migration-existing-js-dependencies
    license: MIT-compatible direct dependency set; transitive review remains covered by existing JS supply-chain audit policy
    integration_pattern: existing first-party dashboard and hello-world example dependencies migrated from npm lock provenance to Bun lock provenance
    rationale: This change does not introduce new runtime JavaScript dependency intent; it records the lockfile/package-manager migration evidence required by ADR-208 for dependency-manifest changes.
    audit_link: docs/09-Quality/security/supply-chain.md
