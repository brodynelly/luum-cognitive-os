    - differentiator_behavioral_governance
    - claim_verification_wedge
    - generic_tracing_is_not_unique
    answer_short: AI agents ship faster. Cognitive OS makes them prove it.
    answer_long: 'The best first-contact pitch should be pain-first and evidence-first:
      agents are fast but opaque, and COS makes their claims verifiable before risky
      work lands. Avoid leading with platform size or architecture inventory.'
    recommended_pitch: Tu agente programa más rápido. Cognitive OS lo obliga a probarlo.
    unsafe_claims_to_avoid:
    - the only operating system for all agents
    - no competitor has any observability
    gaps:
    - A/B copy should be validated with the five-minute demo and current dogfood metrics.
  icp:
    category: go-to-market
    aliases:
    - icp
    - buyer
    - comprador
    - cliente ideal
    - vp eng
    - head of platform
    keywords:
    - icp
    - buyer
    - comprador
    - cliente
    - vp eng
    - platform
    - go-to-market
    approved_sources:
    - .cognitive-os/strategy/01-commercial-brief-v2.md
    - docs/business/value-proposition.md
    - docs/business/cos-vs-vanilla-dx-review.md
    related_claims:
    - icp_vp_engineering
    - differentiator_behavioral_governance
    answer_short: The strongest initial ICP is VP Engineering / Head of Platform at
      teams already using coding agents and feeling trust, cost, coordination, and
      audit pain.
    answer_long: Start with engineering leaders responsible for AI-assisted development
      at team scale, not individual hobby users. The buyer cares less about autocomplete
      and more about verified claims, protected landing, coordination, auditability,
      and cost/risk visibility across shared repositories.
    recommended_pitch: For teams where AI agents already touch real repos, Cognitive
      OS makes agent work governable before it reaches production.
    unsafe_claims_to_avoid:
    - validated across every buyer segment
    - individual developers are the primary payer
    gaps:
    - ICP and willingness-to-pay still need customer discovery beyond internal strategy
      evidence.
  pricing:
    category: go-to-market
    aliases:
    - pricing
    - precio
    - precios
    - packaging
    - tiers
    keywords:
    - pricing
    - precio
    - precios
    - packaging
    - tier
    - cloud
    - enterprise
    approved_sources:
    - .cognitive-os/strategy/01-commercial-brief-v2.md
    - .cognitive-os/strategy/00-first-approach.md
    related_claims:
    - pricing_strategy_internal_only
    - icp_vp_engineering
    answer_short: 'Pricing should remain an internal strategy answer: OSS core as
      adoption wedge, paid Cloud/Enterprise for hosted evidence, fleet confidence,
      audit, SSO/RBAC, and org-wide controls.'
    answer_long: The current documentation supports an open-core packaging thesis,
      but exact numbers should not be treated as public truth without fresh buyer
      validation. The safe answer is to separate OSS core adoption from Cloud/Enterprise
      monetization around hosted dashboard, cross-session/fleet evidence, audit exports,
      SSO/RBAC, and on-prem or managed control-plane needs.
    recommended_pitch: OSS proves trust locally; Cloud and Enterprise monetize governed
      evidence at team and org scale.
    unsafe_claims_to_avoid:
    - publicly guaranteed prices
    - validated willingness-to-pay without customer evidence
    gaps:
    - Pricing requires fresh buyer validation and current competitive packaging review
      before publication.
